/* ═══ PREMIUM UPGRADE PAGE ═══ */
.prem-page{min-height:calc(100vh - 100px);background:linear-gradient(180deg,#fff 0%,var(--teal3) 100%);padding:30px 20px;animation:fadeIn .4s ease;position:relative}
.prem-page::before{content:'';position:absolute;top:-60px;inset-inline-end:-80px;width:240px;height:240px;background:radial-gradient(circle,rgba(13,148,136,.12),transparent 70%);border-radius:50%;pointer-events:none}
.prem-page::after{content:'';position:absolute;bottom:120px;inset-inline-start:-100px;width:280px;height:280px;background:radial-gradient(circle,rgba(94,234,212,.18),transparent 70%);border-radius:50%;pointer-events:none}
.prem-hero{max-width:680px;margin:0 auto 28px;text-align:center;position:relative;z-index:1}
.prem-hero-badge{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,var(--teal2),#0d9488);color:#fff;padding:8px 18px;border-radius:30px;font-size:12px;font-weight:800;letter-spacing:0;margin-bottom:18px;box-shadow:0 8px 22px rgba(13,148,136,.35)}
.prem-hero-title{font-size:34px;font-weight:900;color:var(--g900);margin:0 0 12px;line-height:1.25;text-shadow:0 1px 0 rgba(255,255,255,.8)}
.prem-hero-title .accent{background:linear-gradient(135deg,var(--teal2),#0d9488);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;display:inline-block;padding:0 4px}
.prem-hero-sub{font-size:15px;color:var(--g700);line-height:1.65;max-width:540px;margin:0 auto;font-weight:500}

.prem-card-wrap{max-width:480px;margin:0 auto 24px;position:relative;z-index:1}
.prem-card{background:#fff;border-radius:24px;padding:0;overflow:hidden;box-shadow:0 24px 60px -12px rgba(15,118,110,.25),0 0 0 1px var(--teal3);position:relative}
.prem-card-glow{position:absolute;inset:0;border-radius:24px;background:linear-gradient(135deg,rgba(13,148,136,.08),transparent 60%);pointer-events:none}
.prem-card-top{background:linear-gradient(135deg,#0f766e,#0d9488);color:#fff;padding:28px 26px 22px;position:relative;overflow:hidden}
.prem-card-top::before{content:'';position:absolute;top:-40px;right:-40px;width:140px;height:140px;background:radial-gradient(circle,rgba(255,255,255,.15),transparent 70%);border-radius:50%}
.prem-card-top::after{content:'';position:absolute;bottom:-30px;left:-30px;width:100px;height:100px;background:radial-gradient(circle,rgba(255,255,255,.1),transparent 70%);border-radius:50%}
.prem-card-label{font-size:11px;font-weight:800;letter-spacing:0;color:rgba(255,255,255,.85);position:relative;z-index:1}
.prem-card-name{font-size:24px;font-weight:900;margin:6px 0 12px;position:relative;z-index:1;display:flex;align-items:center;gap:10px}
.prem-card-name .star{color:#fbbf24;font-size:22px;filter:drop-shadow(0 0 6px rgba(251,191,36,.5))}
.prem-card-price{display:flex;align-items:baseline;gap:8px;position:relative;z-index:1}
.prem-card-price .num{font-size:46px;font-weight:900;line-height:1}
.prem-card-price .cur{font-size:14px;font-weight:700;opacity:.85}
.prem-card-price .per{font-size:13px;font-weight:600;opacity:.8;margin-inline-start:6px}
.prem-card-saving{display:inline-block;margin-top:10px;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.3);padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;position:relative;z-index:1}

.prem-card-body{padding:26px 26px 22px}
.prem-feat{display:flex;align-items:flex-start;gap:12px;padding:11px 0;border-bottom:1px solid var(--g100)}
.prem-feat:last-of-type{border-bottom:none}
.prem-feat-ic{flex-shrink:0;width:24px;height:24px;border-radius:50%;background:var(--teal3);color:var(--teal2);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;margin-top:1px}
.prem-feat-txt{flex:1;font-size:13.5px;color:var(--g800);line-height:1.5}
.prem-feat-txt strong{color:var(--g900);font-weight:800}

.prem-cta{display:block;width:100%;background:linear-gradient(135deg,var(--teal2),#0d9488);color:#fff;border:none;padding:16px 22px;border-radius:14px;font-family:inherit;font-size:15px;font-weight:800;cursor:pointer;margin-top:18px;box-shadow:0 8px 22px rgba(13,148,136,.35);transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px}
.prem-cta:hover{transform:translateY(-2px);box-shadow:0 12px 28px rgba(13,148,136,.45)}
.prem-cta:active{transform:translateY(0)}
.prem-cta-mini{font-size:11px;font-weight:600;opacity:.85;margin-top:3px}

.prem-foot-note{text-align:center;font-size:11px;color:var(--g500);margin-top:14px;line-height:1.5}

/* CURRENT PLAN STATE */
.prem-active{background:linear-gradient(135deg,#10b981,#059669);color:#fff;padding:22px;border-radius:18px;margin-bottom:22px;box-shadow:0 12px 30px rgba(16,185,129,.3);display:flex;align-items:center;gap:14px}
.prem-active-ic{font-size:36px;line-height:1}
.prem-active-info{flex:1}
.prem-active-title{font-size:16px;font-weight:800;margin-bottom:3px}
.prem-active-exp{font-size:12px;opacity:.85}

/* ═══ VERIFIED BADGE ═══ */
.vbadge{display:inline-flex;align-items:center;gap:4px;background:linear-gradient(135deg,#fef3c7,#fde68a);color:#92400e;padding:2px 8px;border-radius:10px;font-size:10.5px;font-weight:800;border:1px solid #fcd34d;vertical-align:middle;line-height:1.4;flex-shrink:0}
.vbadge-lg{padding:5px 12px;font-size:12px;border-radius:14px}
.vbadge .star{color:#d97706;font-size:11px;line-height:1}
.vbadge-lg .star{font-size:13px}

/* ═══ PROMO BANNER (in-app marketing) ═══ */
.promo-banner{background:linear-gradient(135deg,#0f766e,#0d9488);color:#fff;padding:14px 16px;border-radius:14px;margin-bottom:14px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .2s;box-shadow:0 6px 18px rgba(13,148,136,.25);position:relative;overflow:hidden;border:none;width:100%;text-align:start;font-family:inherit;box-sizing:border-box}
.promo-banner::before{content:'';position:absolute;top:-30px;inset-inline-end:-30px;width:90px;height:90px;background:radial-gradient(circle,rgba(255,255,255,.15),transparent 70%);border-radius:50%}
.promo-banner:hover{transform:translateY(-2px);box-shadow:0 10px 26px rgba(13,148,136,.35)}
.promo-banner:active{transform:translateY(0)}
.promo-icon{flex-shrink:0;width:42px;height:42px;background:rgba(255,255,255,.22);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;position:relative;z-index:1}
.promo-content{flex:1;min-width:0;position:relative;z-index:1;text-align:start}
.promo-title{font-size:13.5px;font-weight:800;line-height:1.3;margin-bottom:3px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;text-align:start;justify-content:flex-start}
.promo-mini-badge{display:inline-flex;align-items:center;gap:3px;background:rgba(255,255,255,.25);padding:1px 7px;border-radius:8px;font-size:10px;font-weight:700;letter-spacing:.3px}
.promo-desc{font-size:11.5px;color:rgba(255,255,255,.9);line-height:1.4;text-align:start}
.promo-arrow{flex-shrink:0;font-size:18px;font-weight:300;opacity:.85;position:relative;z-index:1}
[dir="rtl"] .promo-arrow{transform:scaleX(-1)}

.promo-mini{background:linear-gradient(135deg,#fef3c7,#fde68a);color:#92400e;padding:10px 14px;border-radius:12px;margin-bottom:12px;display:flex;align-items:center;gap:10px;font-size:12px;font-weight:600;border:1px solid #fcd34d;cursor:pointer;transition:all .15s;width:100%;font-family:inherit;text-align:start}
.promo-mini:hover{background:linear-gradient(135deg,#fde68a,#fcd34d)}
.promo-mini-ic{font-size:18px}
.promo-mini-txt{flex:1;line-height:1.4}
.promo-mini-link{color:#0f766e;font-weight:800;text-decoration:underline}

/* ═══ NAFATH VERIFICATION SCREEN ═══ */
.nafath-overlay{position:fixed;inset:0;background:rgba(15,42,42,.78);backdrop-filter:blur(8px);z-index:1100;display:flex;align-items:center;justify-content:center;padding:18px;animation:fadeIn .3s ease}
.nafath-card{background:#fff;border-radius:24px;width:100%;max-width:440px;overflow:hidden;box-shadow:0 30px 80px -10px rgba(0,0,0,.4);animation:slideUp .35s cubic-bezier(.34,1.56,.64,1)}
@keyframes slideUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:none}}
.nafath-hdr{background:linear-gradient(135deg,#0f766e,#0d9488);color:#fff;padding:26px 22px 22px;text-align:center;position:relative;overflow:hidden}
.nafath-hdr::before{content:'';position:absolute;top:-40px;right:-40px;width:140px;height:140px;background:radial-gradient(circle,rgba(255,255,255,.15),transparent 70%);border-radius:50%}
.nafath-hdr::after{content:'';position:absolute;bottom:-30px;left:-30px;width:100px;height:100px;background:radial-gradient(circle,rgba(255,255,255,.1),transparent 70%);border-radius:50%}
.nafath-icon{position:relative;z-index:1;width:64px;height:64px;background:#fff;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;margin-bottom:12px;box-shadow:0 8px 22px rgba(0,0,0,.2)}
.nafath-icon svg{width:36px;height:36px;color:#0d9488}
.nafath-title{font-size:20px;font-weight:900;position:relative;z-index:1;margin-bottom:5px}
.nafath-sub{font-size:12.5px;opacity:.92;position:relative;z-index:1}
.nafath-bd{padding:24px 22px}
.nafath-step{display:flex;gap:14px;align-items:flex-start;padding:12px 0;border-bottom:1px solid var(--g100)}
.nafath-step:last-of-type{border-bottom:none}
.nafath-num{flex-shrink:0;width:28px;height:28px;border-radius:50%;background:var(--teal3);color:var(--teal2);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:13px}
.nafath-step-txt{flex:1;font-size:13px;color:var(--g700);line-height:1.5}
.nafath-step-txt strong{color:var(--g900);font-weight:800}
.nafath-cost{background:var(--teal3);border:1px dashed var(--teal-light);padding:11px 14px;border-radius:12px;margin:14px 0 16px;font-size:12px;color:var(--teal-dk);text-align:center;font-weight:600;line-height:1.5}
.nafath-cost strong{color:var(--teal2);font-weight:800}
.nafath-actions{display:flex;gap:8px}
.nafath-actions .btn{flex:1}

/* ═══ MOTHAQ HIGHLIGHT ON DEAL CARDS ═══ */
.deal-card.has-premium{border:1px solid #fcd34d;box-shadow:0 4px 14px rgba(217,119,6,.08)}
.deal-card.has-premium::before{content:'';position:absolute;top:0;inset-inline-start:0;width:3px;height:100%;background:linear-gradient(180deg,#fbbf24,#f59e0b);border-radius:2px 0 0 2px}

/* CLICKABLE PARTY ITEMS */
.iitem-clickable{transition:all .15s;border:1px solid transparent}
.iitem-clickable:hover{background:var(--teal3);border-color:var(--teal-light);transform:translateY(-1px)}
.iitem-clickable:active{transform:translateY(0)}

/* ═══ PUBLIC PROFILE PAGE ═══ */
.upub-page{min-height:calc(100vh - 100px);background:linear-gradient(180deg,var(--g50) 0%,#fff 50%);padding:16px 12px;animation:fadeIn .4s ease;position:relative;overflow:hidden}
.upub-page::before{content:'';position:absolute;top:-100px;inset-inline-end:-120px;width:340px;height:340px;background:radial-gradient(circle,rgba(13,148,136,.12),transparent 70%);border-radius:50%;pointer-events:none}
.upub-page::after{content:'';position:absolute;top:200px;inset-inline-start:-100px;width:280px;height:280px;background:radial-gradient(circle,rgba(94,234,212,.1),transparent 70%);border-radius:50%;pointer-events:none}

.upub-wrap{max-width:640px;margin:0 auto;position:relative;z-index:1;width:100%}

.upub-card{background:#fff;border-radius:24px;overflow:hidden;box-shadow:0 24px 60px -16px rgba(15,42,42,.18),0 0 0 1px var(--g100);margin-bottom:18px}

.upub-cover{background:linear-gradient(135deg,#0f2a2a 0%,#0f766e 50%,#0d9488 100%);padding:38px 26px 70px;text-align:center;position:relative;overflow:hidden}
.upub-cover::before{content:'';position:absolute;top:-50px;inset-inline-end:-50px;width:180px;height:180px;background:radial-gradient(circle,rgba(94,234,212,.25),transparent 70%);border-radius:50%}
.upub-cover::after{content:'';position:absolute;bottom:-40px;inset-inline-start:-30px;width:130px;height:130px;background:radial-gradient(circle,rgba(255,255,255,.1),transparent 70%);border-radius:50%}
.upub-watermark{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:.06;pointer-events:none}
.upub-watermark svg{width:280px;height:280px}

.upub-cover-content{position:relative;z-index:1}
.upub-cover-label{font-size:11px;color:rgba(94,234,212,.95);font-weight:800;letter-spacing:0;margin-bottom:14px}

.upub-avatar-wrap{display:inline-block;position:relative;margin-bottom:14px}
.upub-avatar-wrap::before{content:'';position:absolute;inset:-10px;border-radius:50%;background:radial-gradient(circle,rgba(94,234,212,.5),transparent 70%);filter:blur(14px);z-index:0;animation:avPulse 2.8s ease-in-out infinite}
@keyframes avPulse{
  0%,100%{opacity:.5;transform:scale(1)}
  50%{opacity:.85;transform:scale(1.08)}
}
.upub-avatar{
  position:relative;
  z-index:2;
  width:104px!important;
  height:104px!important;
  min-width:104px;
  min-height:104px;
  border-radius:50%!important;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  font-size:40px;
  font-weight:900;
  color:#fff;
  border:4px solid rgba(255,255,255,.45);
  box-shadow:0 12px 36px rgba(0,0,0,.3),0 0 0 2px rgba(255,255,255,.15),inset 0 -8px 20px rgba(0,0,0,.15),inset 0 8px 20px rgba(255,255,255,.2);
  overflow:hidden;
  flex-shrink:0;
  background:linear-gradient(145deg,var(--teal),var(--teal2))
}
.upub-avatar.has-color{
  color:#fff!important;
  background:linear-gradient(145deg,var(--av-color,var(--teal)),color-mix(in srgb,var(--av-color,var(--teal)) 70%,#000))!important
}
.upub-vbadge-float{position:absolute;bottom:0;inset-inline-end:0;background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#fff;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;border:3px solid #fff;box-shadow:0 4px 14px rgba(245,158,11,.55);z-index:3}

.upub-name{color:#fff;font-size:22px;font-weight:900;margin-top:6px;display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap}
.upub-name .vbadge{margin-inline-start:0}
.upub-email{color:rgba(255,255,255,.75);font-size:12px;margin-top:4px;font-family:Calibri,Arial,sans-serif}
.upub-rating{margin-top:10px;display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.15);backdrop-filter:blur(8px);padding:5px 12px;border-radius:20px;border:1px solid rgba(255,255,255,.2)}

.upub-stats{margin-top:-50px;padding:0 22px 22px;position:relative;z-index:2}
.upub-stats-grid{background:#fff;border-radius:18px;padding:18px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;box-shadow:0 8px 22px rgba(0,0,0,.08);border:1px solid var(--g100)}
.upub-stat{text-align:center}
.upub-stat-num{font-size:22px;font-weight:900;color:var(--teal2);line-height:1}
.upub-stat-lbl{font-size:10.5px;color:var(--g500);font-weight:600;margin-top:4px;letter-spacing:.3px}

.upub-body{padding:22px}
.upub-section{margin-bottom:18px}
.upub-section-title{font-size:13px;font-weight:800;color:var(--g700);margin-bottom:10px;padding-bottom:8px;border-bottom:2px solid var(--teal3);display:flex;align-items:center;gap:8px}
.upub-section-title .icon{width:24px;height:24px;border-radius:8px;background:var(--teal3);color:var(--teal2);display:inline-flex;align-items:center;justify-content:center;font-size:13px}

.upub-info-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px dashed var(--g200);font-size:13px}
.upub-info-row:last-child{border-bottom:none}
.upub-info-lbl{color:var(--g600);font-weight:600}
.upub-info-val{color:var(--g900);font-weight:700}
.upub-info-val.unverif{color:var(--g400);font-style:italic;font-weight:500}

.upub-trust{background:linear-gradient(135deg,#f0fdf4 0%,#fff 100%);border:1px solid #86efac;border-radius:14px;padding:14px;display:flex;align-items:center;gap:12px;margin-bottom:14px}
.upub-trust.unverif{background:linear-gradient(135deg,#fef3c7 0%,#fff 100%);border-color:#fcd34d}
.upub-trust-ic{font-size:28px;line-height:1}
.upub-trust-info{flex:1}
.upub-trust-title{font-size:13px;font-weight:800;color:var(--g900);margin-bottom:2px}
.upub-trust-desc{font-size:11px;color:var(--g600);line-height:1.4}

.upub-rating-card{background:linear-gradient(135deg,#fffbeb 0%,#fff 100%);border:1px solid #fcd34d;border-radius:14px;padding:18px;text-align:center;margin-bottom:14px}
.upub-rating-big{font-size:36px;font-weight:900;color:#d97706;line-height:1;margin-bottom:6px}
.upub-rating-stars{margin-bottom:6px}
.upub-rating-count{font-size:11px;color:var(--g600)}

.upub-empty{text-align:center;padding:24px 16px;color:var(--g500);font-size:12px}

.upub-foot-note{font-size:10.5px;color:var(--g500);text-align:center;line-height:1.5;padding:14px;background:var(--g50);border-radius:12px}

@media(max-width:380px){
  .upub-stats-grid{padding:14px;gap:8px}
  .upub-stat-num{font-size:18px}
  .upub-name{font-size:18px}
  .upub-avatar{width:80px;height:80px;font-size:32px}
}

/* MULTI-PAY FLOATING BAR */
.mp-bar{position:fixed;bottom:75px;left:50%;transform:translateX(-50%);background:#fff;border-radius:18px;padding:12px 16px;box-shadow:0 12px 32px rgba(15,42,42,.18),0 0 0 1px var(--g200);display:flex;align-items:center;gap:14px;z-index:90;animation:slideUp .25s ease;max-width:calc(100vw - 32px);min-width:280px}
@media(min-width:768px){.mp-bar{bottom:30px}}
.mp-bar-info{flex:1;min-width:0}
.mp-bar-count{font-size:11px;color:var(--g500);font-weight:600;margin-bottom:2px}
.mp-bar-total{font-size:18px;font-weight:900;color:var(--teal2)}
.mp-bar.hidden{display:none}

/* MULTI-PAY checkboxes */
.ptbl input[type="checkbox"].mp-check{margin:0;display:block}
.ptbl tr td:first-child{text-align:center;padding:8px 4px}

/* PAYMENT MODAL — Luxury login-style */
.pmodal{background:#fff;border-radius:var(--r24);box-shadow:0 24px 60px rgba(0,0,0,.2);width:100%;max-width:420px;animation:pi .3s ease;overflow:hidden;max-height:92vh;display:flex;flex-direction:column}
.pmod-hdr{background:linear-gradient(145deg,#0f2a2a,#0f766e 60%,#0d9488);padding:32px 26px 26px;text-align:center;color:#fff;position:relative;overflow:hidden;flex-shrink:0}
.pmod-hdr::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 20%,rgba(13,148,136,.4),transparent 60%);pointer-events:none}
.pmod-hdr-content{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:6px}
.pmod-close{position:absolute;top:12px;inset-inline-end:12px;width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .15s;z-index:5}
.pmod-close:hover{background:rgba(255,255,255,.25);transform:rotate(90deg)}
.pmod-logo{display:inline-flex;align-items:center;justify-content:center;margin-bottom:4px}
.pmod-brand{font-size:22px;font-weight:900;color:#fff;letter-spacing:0;line-height:1.2}
.pmod-sub{font-size:11.5px;color:rgba(255,255,255,.7);margin-top:2px}
.pmod-bd{padding:20px 22px;overflow-y:auto;flex:1}
.psandbox{background:linear-gradient(135deg,#fef3c7,#fde68a);border:1px solid #f59e0b;border-radius:8px;padding:8px 12px;font-size:11px;color:#92400e;font-weight:700;text-align:center;margin-bottom:14px;display:flex;align-items:center;justify-content:center;gap:6px}
.pamt-box{background:linear-gradient(135deg,var(--teal3),#e0f2fe);border:1.5px solid #99f6e4;border-radius:14px;padding:18px;margin-bottom:18px;text-align:center}
.pamt-lbl{font-size:11px;color:var(--teal2);font-weight:700;margin-bottom:4px;letter-spacing:.4px}
.pamt-val{font-size:30px;font-weight:900;color:var(--teal2);line-height:1.05;direction:ltr}
.pamt-val .cur{font-size:14px;font-weight:700;color:var(--teal2);margin-inline-start:4px}
.pbreakdown{background:var(--g50);border-radius:10px;padding:11px 13px;margin-bottom:18px;font-size:12px;border:1px solid var(--g200)}
.pbreakdown .row{display:flex;justify-content:space-between;padding:3px 0;color:var(--g600)}
.pbreakdown .row.tot{border-top:1.5px dashed var(--g300);margin-top:5px;padding-top:7px;font-weight:800;color:var(--g900);font-size:13px}

/* PAYMENT METHODS — vertical list */
.pm-section-title{font-size:11.5px;font-weight:700;color:var(--g700);margin-bottom:9px;letter-spacing:.3px;display:flex;align-items:center;gap:6px}
.pm-section-title::before{content:'';width:3px;height:13px;background:var(--teal);border-radius:2px}
.pm-list{display:flex;flex-direction:column;gap:8px;margin-bottom:6px}
.pm-row{background:#fff;border:1.5px solid var(--g200);border-radius:12px;padding:12px 14px;cursor:pointer;transition:all .18s;display:flex;align-items:center;gap:11px;font-family:inherit;width:100%;text-align:inherit;position:relative}
.pm-row:hover{border-color:#86efac;background:#f0fdfa}
.pm-row.active{border-color:var(--teal);background:linear-gradient(135deg,var(--teal3) 0%,#fff 100%);box-shadow:0 0 0 3px rgba(13,148,136,.12)}
.pm-row .pm-logo{width:48px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:#fff;border:1px solid var(--g200);overflow:hidden;padding:3px}
.pm-row.active .pm-logo{border-color:var(--teal);background:#fff}
.pm-row .pm-info{flex:1;min-width:0}
.pm-row .pm-name{font-size:13px;font-weight:700;color:var(--g800);line-height:1.2}
.pm-row .pm-desc{font-size:10.5px;color:var(--g500);margin-top:2px}
.pm-row .pm-radio{width:20px;height:20px;border-radius:50%;border:2px solid var(--g300);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.pm-row.active .pm-radio{border-color:var(--teal);background:var(--teal)}
.pm-row.active .pm-radio::after{content:'';width:8px;height:8px;background:#fff;border-radius:50%}

/* CARD INPUT FIELDS (collapsed by default) */
.pm-card-fields{margin-top:10px;padding:13px;background:var(--g50);border-radius:10px;border:1px solid var(--g200);display:none}
.pm-card-fields.show{display:block;animation:pi .25s ease}
.pcard-input{width:100%;padding:11px 14px;border:1.5px solid var(--g300);border-radius:8px;font-size:14px;font-family:inherit;letter-spacing:1.5px;text-align:start;direction:ltr;margin-bottom:8px;outline:none;transition:all .14s}
.pcard-input:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(13,148,136,.12)}
.pcard-input::placeholder{color:var(--g400);letter-spacing:1px}
.pcard-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}

.pmod-foot{padding:14px 20px;border-top:1px solid var(--g100);background:#fff;display:flex;gap:8px}

/* SECURITY BADGES */
.pm-security{display:flex;align-items:center;justify-content:center;gap:14px;padding:12px 0 4px;font-size:10.5px;color:var(--g400);font-weight:600}
.pm-security .sec-item{display:flex;align-items:center;gap:4px}
.pm-security .sec-icon{font-size:11px}

/* FEE INFO BOX in form */
.feebox{background:linear-gradient(135deg,#dbeafe,#e0e7ff);border:1.5px solid #93c5fd;border-radius:var(--r10);padding:11px 13px;margin-top:8px;display:flex;align-items:center;gap:9px}
.feebox .ico{font-size:22px}
.feebox .txt{flex:1;font-size:11.5px;color:#1e40af;line-height:1.5;font-weight:600}

/* SAMA STATUS BADGE */
.samabadge{display:inline-flex;align-items:center;gap:5px;background:linear-gradient(135deg,#1e3a8a,#1e40af);color:#fff;padding:4px 10px;border-radius:99px;font-size:10px;font-weight:700;border:1.5px solid #3b82f6}
.samabadge::before{content:'🛡️';font-size:11px}

/* AUDIT LOG */
.audit-list{max-height:240px;overflow-y:auto}
.audit-item{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--g100);align-items:flex-start}
.audit-item:last-child{border-bottom:none}
.audit-icon{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;background:var(--teal3)}
.audit-body{flex:1;min-width:0}
.audit-action{font-size:12.5px;font-weight:700;color:var(--g800)}
.audit-meta{font-size:10.5px;color:var(--g500);margin-top:2px}

@media(max-width:768px){
  .sidebar{display:none}.page{padding:13px;padding-bottom:90px}
  .frow{grid-template-columns:1fr}.sgrid{grid-template-columns:1fr 1fr}
  .igrid,.igrid3,.cwpar,.cwfin,.cwsig{grid-template-columns:1fr}.tabbar{width:100%}
  .topbar{padding:0 13px}
  .mobile-show{display:flex!important}
  .mobile-hide{display:none!important}
}
@media(max-width:480px){.sgrid{grid-template-columns:1fr}}
@media(min-width:769px){
  .mobile-show{display:none!important}
  .bottom-nav{display:none!important}
}

/* BOTTOM NAV (mobile) */
.bottom-nav{position:fixed;bottom:0;inset-inline-start:0;inset-inline-end:0;background:#fff;border-top:1px solid var(--g200);box-shadow:0 -4px 16px rgba(0,0,0,.08);z-index:50;display:flex;justify-content:space-around;padding:8px 0 max(8px,env(safe-area-inset-bottom));align-items:stretch}
.bn-item{flex:1 1 0;min-width:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:4px 2px;border:none;background:none;cursor:pointer;font-family:inherit;color:var(--g500);transition:color .15s;position:relative;-webkit-tap-highlight-color:transparent;font-size:inherit}
.bn-item.active{color:var(--teal2)}
.bn-item.active .bn-ico{transform:scale(1.12)}
.bn-ico{font-size:22px;line-height:1.4;transition:transform .2s;display:block;text-align:center;flex-shrink:0;font-family:'Apple Color Emoji','Segoe UI Emoji','Noto Color Emoji',system-ui,sans-serif}
.bn-lbl{font-size:10px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;line-height:1.3;flex-shrink:0;font-family:'Tajawal',sans-serif}
.bn-badge{position:absolute;top:0;inset-inline-end:18%;background:var(--r500);color:#fff;font-size:9px;font-weight:700;min-width:15px;height:15px;padding:0 3px;border-radius:99px;display:flex;align-items:center;justify-content:center;border:1.5px solid #fff}
.bn-fab{background:var(--teal);color:#fff;width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;line-height:1;box-shadow:0 4px 12px rgba(13,148,136,.4);margin-top:-14px;transition:all .15s;flex-shrink:0}
.bn-fab:active{transform:scale(.92)}
.bn-item.fab-wrap{flex-direction:column;gap:2px;justify-content:flex-start;padding-top:0}
.bn-item.fab-wrap.active .bn-fab{background:var(--teal2)}
.bn-item.fab-wrap .bn-lbl{font-size:9.5px;margin-top:2px}

/* BACK BUTTON in topbar */
.back-btn{display:none;align-items:center;justify-content:center;width:32px;height:32px;border-radius:8px;border:none;background:var(--g100);color:var(--g700);cursor:pointer;font-size:16px;transition:all .15s;margin-inline-end:6px}
.back-btn:hover{background:var(--g200)}
.back-btn:active{transform:scale(.92)}
.back-btn.show{display:flex}

/* HAMBURGER MENU BUTTON */
.hamb-btn{display:flex;align-items:center;justify-content:center;width:38px;height:38px;border-radius:10px;border:none;background:var(--teal3);color:var(--teal2);cursor:pointer;transition:all .15s;flex-direction:column;gap:3px;padding:0}
.hamb-btn:hover{background:#a7f3d0;transform:scale(1.05)}
.hamb-btn:active{transform:scale(.95)}
.hamb-btn span{display:block;width:18px;height:2px;background:var(--teal2);border-radius:2px;transition:all .2s}
.hamb-btn:hover span:nth-child(1){width:14px}
.hamb-btn:hover span:nth-child(3){width:14px}

/* MENU MODAL */
.menu-overlay{position:fixed;inset:0;background:rgba(15,23,42,.55);backdrop-filter:blur(5px);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.menu-modal{background:#fff;border-radius:var(--r20);box-shadow:var(--shl);width:100%;max-width:380px;max-height:90vh;overflow-y:auto;animation:slideUp .3s ease;position:relative}
@keyframes slideUp{from{opacity:0;transform:translateY(20px) scale(.96)}to{opacity:1;transform:none}}
.menu-hdr{background:linear-gradient(135deg,#0f2a2a,var(--teal2));padding:24px 22px;color:#fff;position:relative;border-radius:var(--r20) var(--r20) 0 0}
.menu-close{position:absolute;top:12px;inset-inline-start:12px;width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;transition:all .2s;line-height:1;z-index:10}
.menu-close:hover{background:rgba(255,255,255,.28);transform:scale(1.08)}
.menu-user{display:flex;align-items:center;gap:11px;margin-top:6px}
.menu-av{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;color:#fff;border:2px solid rgba(255,255,255,.3);flex-shrink:0}
.menu-uname{font-size:15px;font-weight:800;color:#fff;line-height:1.2;margin-bottom:3px}
.menu-uemail{font-size:11px;color:rgba(255,255,255,.7);word-break:break-all}
.menu-body{padding:14px 0}
.menu-section{padding:0 16px 6px;font-size:11px;font-weight:700;color:var(--g400);letter-spacing:0}
.menu-item{display:flex;align-items:center;gap:11px;padding:11px 18px;cursor:pointer;border:none;background:none;width:100%;font-family:inherit;text-align:inherit;transition:all .14s;color:var(--g700);font-size:13px;font-weight:500}
.menu-item:hover{background:var(--teal3);color:var(--teal2);padding-inline-start:22px}
.menu-item .micon{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;background:var(--g100);transition:all .14s}
.menu-item:hover .micon{background:var(--teal);color:#fff;transform:scale(1.05)}
.menu-item .mtxt{flex:1;min-width:0}
.menu-item .mlbl{font-size:13px;font-weight:700;color:var(--g800);line-height:1.2}
.menu-item:hover .mlbl{color:var(--teal2)}
.menu-item .msub{font-size:10.5px;color:var(--g500);margin-top:2px}
.menu-item.danger{color:var(--r600)}
.menu-item.danger .micon{background:var(--r50);color:var(--r600)}
.menu-item.danger:hover{background:var(--r50);color:var(--r600)}
.menu-item.danger:hover .micon{background:var(--r600);color:#fff}
.menu-item.danger:hover .mlbl{color:var(--r600)}
.menu-divider{height:1px;background:var(--g100);margin:8px 16px}
.menu-foot{padding:12px 18px;background:var(--g50);border-top:1px solid var(--g100);font-size:10.5px;color:var(--g400);text-align:center;line-height:1.6;border-radius:0 0 var(--r20) var(--r20)}

/* SUGGESTION FORM */
.sugg-form{padding:18px 20px}
.sugg-types{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:14px}
.sugg-type{padding:10px 6px;border:1.5px solid var(--g300);border-radius:10px;background:#fff;cursor:pointer;font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:4px;transition:all .15s}
.sugg-type:hover{border-color:var(--teal)}
.sugg-type.active{border-color:var(--teal);background:var(--teal3)}
.sugg-type .ico{font-size:20px}
.sugg-type .lbl{font-size:11px;font-weight:700;color:var(--g700)}
.sugg-type.active .lbl{color:var(--teal2)}

/* ABOUT QASTNI */
.about-card{padding:0}
.about-hero{background:linear-gradient(135deg,var(--teal3),#e0f2fe);padding:24px 20px;text-align:center;border-radius:var(--r12) var(--r12) 0 0}
.about-body{padding:18px 20px}
.about-feature{display:flex;gap:12px;padding:11px 0;border-bottom:1px solid var(--g100);align-items:flex-start}
.about-feature:last-child{border-bottom:none}
.about-feature .fico{width:38px;height:38px;border-radius:10px;background:var(--teal3);color:var(--teal2);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.about-feature .ftxt{flex:1}
.about-feature .ftit{font-size:13px;font-weight:800;color:var(--g800);margin-bottom:2px}
.about-feature .fdesc{font-size:11.5px;color:var(--g500);line-height:1.55}

/* ═══════════════════════════════════════════════════════════
   MOBILE RESPONSIVENESS ENHANCEMENTS — non-destructive
   كل التحسينات هنا تنطبق فقط على الجوال (max-width:768px)
   ولا تؤثر على شاشات الكمبيوتر
   ═══════════════════════════════════════════════════════════ */
@media(max-width:768px){
  /* الصفحات بشكل عام */
  .page{padding:12px 12px 100px}
  .pi{padding:0!important}

  /* العناوين الكبيرة — تصغير لتناسب الشاشة */
  .ptit{font-size:22px!important;line-height:1.3}
  .psub{font-size:13px!important;margin-bottom:14px}

  /* البطاقات — هوامش وحشوات أقل */
  .card{border-radius:14px;margin-bottom:12px}
  .cbody{padding:14px 14px}
  .chdr{padding:12px 14px}
  .chdr h2,.chdr h3{font-size:14.5px!important}
  .cfoot{padding:11px 14px}

  /* الجداول — تمرير أفقي ناعم */
  .tscroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .ptbl{min-width:520px;font-size:12px}
  .ptbl th,.ptbl td{padding:9px 8px}
  .ptbl th{font-size:10.5px}

  /* مربعات الإحصائيات — 2x2 على الجوال */
  .sgrid{grid-template-columns:1fr 1fr;gap:9px}
  .scard{padding:13px 11px}
  .sval{font-size:18px!important}
  .slbl{font-size:10.5px!important}
  .sico{width:28px;height:28px;font-size:14px}

  /* مربعات تفاصيل العقد المالية */
  .cwfin{grid-template-columns:1fr 1fr;gap:8px}
  .cwfi{padding:9px 10px}
  .cwfl{font-size:9px}
  .cwfv{font-size:13px}

  /* أطراف الاتفاقية والتواقيع */
  .cwpar{grid-template-columns:1fr;gap:8px}
  .cwsig{grid-template-columns:1fr;gap:14px}

  /* الحقول والنماذج */
  .frow{grid-template-columns:1fr;gap:0}
  .fg{margin-bottom:13px}
  .fl{font-size:12px;margin-bottom:5px}
  .fc{padding:10px 13px;font-size:14px}
  .fhint{font-size:10.5px}

  /* الأزرار */
  .btn{padding:10px 16px;font-size:13px}
  .btn.bsm{padding:7px 12px;font-size:11.5px}
  .btn.blg{padding:13px 20px;font-size:14px}

  /* الحوارية (modals) */
  .menu-overlay{padding:0;align-items:flex-end}
  .menu-modal,.faq-modal,.pmodal,.nafath-card{
    max-width:100%!important;
    border-radius:18px 18px 0 0!important;
    max-height:88vh
  }

  /* صفحة بيع بالتقسيط — مربع القسط الإجمالي */
  .calcbox{padding:11px 13px;flex-direction:column;align-items:flex-start;gap:6px}
  .calclbl{font-size:11px}
  .calcval{font-size:18px}

  /* العروض الواردة (inbox) */
  .igrid{grid-template-columns:1fr 1fr;gap:8px}
  .iitem{padding:9px 11px}
  .ilbl{font-size:9.5px}
  .ival{font-size:12.5px}

  /* الملف العام — كامل العرض على الجوال */
  .upub-page{padding:12px 8px}
  .upub-wrap{padding:0;max-width:100%}
  .upub-card{padding:0;border-radius:20px;margin-bottom:14px}
  .upub-cover{padding:32px 20px 60px}
  .upub-name{font-size:19px}
  .upub-avatar{width:90px!important;height:90px!important;min-width:90px;min-height:90px;font-size:36px}
  .upub-stats{padding:0 16px 18px}
  .upub-stats-grid{padding:14px;gap:8px}
  .upub-stat-num{font-size:20px}
  .upub-body{padding:18px 16px}
  .upub-info-grid{grid-template-columns:1fr;gap:0}

  /* صفحة الاشتراك المميز */
  .prem-card{margin:14px 12px}
  .prem-card-hdr{padding:18px 16px}
  .prem-card-body{padding:14px 16px}

  /* شريط الدفع المتعدد */
  .mp-bar{
    bottom:75px;
    padding:10px 14px;
    gap:10px;
    max-width:calc(100vw - 20px);
    min-width:0;
    width:calc(100vw - 20px)
  }
  .mp-bar-total{font-size:16px}

  /* القائمة الجانبية للهامبرغر */
  .menu-modal{padding-bottom:env(safe-area-inset-bottom,0px)}
  .menu-item{padding:12px 16px}
  .micon{width:34px;height:34px;font-size:17px}
  .mlbl{font-size:13.5px}
  .msub{font-size:11px}

  /* صفحة FAQ */
  .faq-modal{padding-bottom:env(safe-area-inset-bottom,0px)}
  .faq-hero{padding:24px 18px 28px}
  .faq-hero h2{font-size:18px}
  .faq-hero p{font-size:11.5px}
  .faq-search{margin:-20px 14px 12px;padding:9px 14px}
  .faq-cats{padding:0 14px 12px}
  .faq-cat{padding:5px 11px;font-size:11px}
  .faq-list{margin:0 14px}
  .faq-q{padding:12px 14px}
  .faq-q-text{font-size:12.5px}
  .faq-cta{margin:14px}

  /* الشريط العلوي */
  .topbar{height:54px}
  .tb-title{font-size:14px}
  .topbar svg[width="28"]{width:24px!important;height:24px!important}

  /* صفحة Nafath */
  .nafath-card{padding:0!important}

  /* Payment Modal محسّن */
  .pmod-hdr{padding:24px 20px 20px}
  .pmod-brand{font-size:19px}
  .pmod-bd{padding:16px 18px}
  .pamt-box{padding:14px;margin-bottom:14px}
  .pamt-val{font-size:26px}
  .pm-row{padding:11px 13px;gap:10px}
  .pm-row .pm-name{font-size:12.5px}
  .pm-row .pm-desc{font-size:10px}
  .pmod-foot{padding:12px 16px}

  /* تفاصيل الصفقة */
  .deal-hero{padding:18px 16px}
  .deal-num{font-size:11px}

  /* العناوين والنصوص بشكل عام */
  h1{font-size:22px!important}
  h2{font-size:18px!important}
  h3{font-size:15px!important}

  /* تحسين منع الـ horizontal scroll للموقع كاملاً */
  body{overflow-x:hidden}
  .topbar,.bottom-nav{max-width:100vw}

  /* تحسين الزر العائم في الـ bottom-nav */
  .bn-fab{font-size:22px}
  .bn-lbl{font-size:9.5px}
  .bn-ico{font-size:18px}

  /* دفع متعدد — رسالة التلميح */
  .multipay-tip{font-size:11.5px;padding:9px 14px}

  /* أزرار stepper الأرقام */
  .num-wrap .num-step{width:22px;height:17px;font-size:10px}
  .num-wrap input[type="number"]{padding-inline-end:32px!important}
}

/* شاشات صغيرة جداً — أقل من 380px */
@media(max-width:380px){
  .ptit{font-size:20px!important}
  .scard{padding:11px 9px}
  .sval{font-size:16px!important}
  .slbl{font-size:9.5px!important}
  .igrid{grid-template-columns:1fr}
  .cwfin{grid-template-columns:1fr}
  .pamt-val{font-size:22px}
  .faq-hero h2{font-size:16px}
  .faq-q-text{font-size:12px}
  .pmod-brand{font-size:17px}
  .btn{padding:9px 14px;font-size:12.5px}
}

/* Landscape mode على الجوال — تحسينات */
@media(max-width:768px) and (orientation:landscape){
  .menu-modal,.faq-modal,.pmodal{max-height:94vh}

function valEmailStrong(e){
  if(!valEmail(e))return{ok:false,msg:isAr()?'صيغة البريد الإلكتروني غير صحيحة':'Invalid email format'}
  const domain=e.split('@')[1].toLowerCase()
  // فحص الدومينات المؤقتة
  if(DISPOSABLE_DOMAINS.some(d=>domain===d||domain.endsWith('.'+d))){
    return{ok:false,msg:isAr()?'⚠️ البريد المؤقت غير مسموح. استخدم بريد حقيقي مثل Gmail أو Outlook':'⚠️ Disposable emails not allowed. Use a real email like Gmail or Outlook'}
  }
  // فحص الطول
  if(e.length<6||e.length>254){
    return{ok:false,msg:isAr()?'طول البريد غير صحيح':'Invalid email length'}
  }
  // فحص النطاق الفرعي (TLD) — لازم يكون حقيقي (.com, .sa, .net, etc.)
  const parts=domain.split('.')
  if(parts.length<2||parts[parts.length-1].length<2){
    return{ok:false,msg:isAr()?'نطاق البريد غير صحيح':'Invalid email domain'}
  }
  // فحص للأحرف العشوائية في الجزء قبل @
  const localPart=e.split('@')[0]
  // لو فيه أحرف متكررة أكثر من 4 مرات أو كلها أرقام
  if(/^\d+$/.test(localPart)&&localPart.length<6){
    return{ok:false,msg:isAr()?'البريد يبدو غير حقيقي':'Email looks suspicious'}
  }
  return{ok:true}
}

const salaryDate=(startDate,monthOffset)=>{
  const start=new Date(startDate)
  // أول قسط: إذا تاريخ البداية قبل أو يوم 27 من نفس الشهر، أول قسط يكون 27 من الشهر اللي بعده
  // إذا البداية بعد يوم 27، أول قسط يكون 27 من الشهر اللي بعده بشهرين
  let firstMonth=start.getMonth()+1  // الشهر التالي
  const firstYear=start.getFullYear()
  if(start.getDate()>27){firstMonth+=1}
  const target=new Date(firstYear,firstMonth+(monthOffset-1),27)
  return target.toISOString().split('T')[0]
}

function applyLang(){
  document.documentElement.dir=isAr()?'rtl':'ltr'
  document.documentElement.lang=lang
  document.body.classList.toggle('en',!isAr())
  document.querySelectorAll('.ar-t').forEach(el=>el.classList.toggle('hidden',!isAr()))
  document.querySelectorAll('.en-t').forEach(el=>el.classList.toggle('hidden',isAr()))
  document.querySelectorAll('[data-lb]').forEach(btn=>btn.textContent=isAr()?'English':'عربي')
  localStorage.setItem('ql',lang)
}
window.toggleLang=()=>{lang=isAr()?'en':'ar';applyLang();rerender()}

// ═══ NUMBER INPUT STEPPER (custom +/- buttons) ═══
window.numStep=(id,delta,callback,min,max)=>{
  const el=$(id);if(!el)return
  let v=parseFloat(el.value)||0
  v+=delta
  if(min!==undefined&&v<min)v=min
  if(max!==undefined&&v>max)v=max
  if(min===undefined&&v<0)v=0
  el.value=v
  if(callback&&typeof window[callback]==='function')window[callback]()
}

// تطبيق الـ theme المحفوظ عند فتح الموقع
function loadTheme(){
  try{
    const saved=localStorage.getItem('qastni_theme')
    if(saved==='dark'){
      document.documentElement.classList.add('dark')
    }
  }catch(e){}
}

window.switchAT=tab=>{
  $('fl')?.classList.toggle('hidden',tab!=='login')
  $('fr')?.classList.toggle('hidden',tab!=='register')

  $('tr')?.classList.toggle('active',tab==='register')
}

function showErr(id,msg){const el=$(id);if(el){el.textContent='⚠️ '+msg;el.classList.remove('hidden')}}

window.doLogin=async()=>{
  if(!checkRL('login',2000))return
  const em=$('l-em')?.value.trim().toLowerCase(),pw=$('l-pw')?.value
  $('lerr')?.classList.add('hidden')
  if(!em||!pw){showErr('lerr',isAr()?'يرجى ملء الحقول':'Fill fields');return}
  if(!valEmail(em)){showErr('lerr',isAr()?'البريد غير صالح':'Invalid email');return}
  const btn=$('lbtn')
  const originalHTML=btn.innerHTML
  btn.innerHTML=qLoader('sm','w')+' <span style="margin-inline-start:8px">'+(isAr()?'جاري الدخول...':'Signing in...')+'</span>'
  btn.disabled=true

  const timeoutId=setTimeout(()=>{
    btn.innerHTML=originalHTML
    btn.disabled=false
    showErr('lerr',isAr()?'⚠️ انقطع الاتصال. تأكد من الإنترنت':'⚠️ Connection timeout')
  },15000)

  try{
    const{error}=await sb.auth.signInWithPassword({email:em,password:pw})
    clearTimeout(timeoutId)
    if(error){
      let msg=isAr()?'البريد أو كلمة المرور غير صحيحة':'Wrong email or password'
      if(error.message&&error.message.includes('Email not confirmed')){
        msg=isAr()?'⚠️ يجب تأكيد البريد الإلكتروني أولاً. تحقق من بريدك':'⚠️ Email not confirmed. Check your inbox'
      }
      showErr('lerr',msg)
      btn.innerHTML=originalHTML
      btn.disabled=false
    }
    // النجاح — auth state listener يلتقطه
  }catch(e){
    clearTimeout(timeoutId)
    console.error('[login] error:',e)
    showErr('lerr',isAr()?'⚠️ خطأ في الاتصال':'⚠️ Network error')
    btn.innerHTML=originalHTML
    btn.disabled=false
  }
}

window.doRegister=async()=>{
  if(!checkRL('reg',3000))return
  const nm=$('r-nm')?.value.trim(),em=$('r-em')?.value.trim().toLowerCase()
  const ph=$('r-ph')?.value.trim(),ni=$('r-ni')?.value.trim()
  const pw=$('r-pw')?.value,pw2=$('r-pw2')?.value
  $('rerr')?.classList.add('hidden')
  if(!nm||!em||!pw){showErr('rerr',isAr()?'يرجى ملء الحقول المطلوبة':'Fill required fields');return}

  // ═══ فحص قوي للبريد الإلكتروني ═══
  const emCheck=valEmailStrong(em)
  if(!emCheck.ok){showErr('rerr',emCheck.msg);return}

  if(pw.length<8){showErr('rerr',isAr()?'كلمة المرور 8 أحرف على الأقل':'Min 8 chars');return}
  if(pw!==pw2){showErr('rerr',isAr()?'كلمتا المرور غير متطابقتان':'Passwords do not match');return}
  if(nm.length<2||nm.length>100){showErr('rerr',isAr()?'الاسم غير صالح':'Invalid name');return}

  const btn=$('rbtn')
  // نخزّن النص الأصلي للزر عشان نرجعه
  const originalBtnHTML=btn.innerHTML
  btn.innerHTML=qLoader('sm','w')+' <span style="margin-inline-start:8px">'+(isAr()?'جاري الإنشاء...':'Creating...')+'</span>'
  btn.disabled=true

  // Timeout — إذا ما رد السيرفر خلال 20 ثانية، نعرض خطأ
  const timeoutId=setTimeout(()=>{
    btn.innerHTML=originalBtnHTML
    btn.disabled=false
    showErr('rerr',isAr()?'⚠️ انقطع الاتصال. تأكد من الإنترنت وحاول مرة ثانية':'⚠️ Connection timeout. Check your internet and try again')
  },20000)

  try{
    Q.log('[register] Attempting signUp for:',em)
    const{data,error}=await sb.auth.signUp({
      email:em,
      password:pw,
      options:{
        data:{full_name:san(nm),phone:san(ph),national_id:san(ni)},
        emailRedirectTo:window.location.origin
      }
    })

    clearTimeout(timeoutId)
    Q.log('[register] Result:',{hasUser:!!data?.user,hasSession:!!data?.session,error:error?.message})

    if(error){
      btn.innerHTML=originalBtnHTML
      btn.disabled=false
      // ترجمة الأخطاء الشائعة
      let msg=error.message
      if(msg.includes('already registered')||msg.includes('already been')){
        msg=isAr()?'⚠️ هذا البريد مسجّل من قبل. سجّل دخول بدلاً من ذلك':'⚠️ Email already registered. Sign in instead'
      }else if(msg.includes('rate limit')||msg.includes('Email rate limit')){
        msg=isAr()?'⚠️ تم تجاوز حد الإرسال. انتظر دقيقة وجرّب':'⚠️ Rate limit. Wait a minute and retry'
      }else if(msg.includes('invalid')){
        msg=isAr()?'⚠️ البريد الإلكتروني غير صالح':'⚠️ Invalid email'
      }
      showErr('rerr',msg)
      return
    }

    // ═══ Supabase نجح ═══
    if(data?.user&&!data?.session){
      // Email confirmation مفعّل — المستخدم محتاج يأكد بريده
      btn.innerHTML=originalBtnHTML
      btn.disabled=false
      showEmailConfirmModal(em)
      return
    }

    if(data?.session){
      // Email confirmation مو مفعّل — المستخدم دخل مباشرة
      btn.innerHTML=originalBtnHTML
      btn.disabled=false
      // الـ auth state listener راح يلتقط هذا تلقائياً
      return
    }

    // حالة غريبة — ما رد بأي شي
    btn.innerHTML=originalBtnHTML
    btn.disabled=false
    showErr('rerr',isAr()?'⚠️ خطأ غير متوقع. حاول مرة ثانية':'⚠️ Unexpected error. Try again')

  }catch(e){
    clearTimeout(timeoutId)
    console.error('[register] Exception:',e)
    btn.innerHTML=originalBtnHTML
    btn.disabled=false
    showErr('rerr',isAr()?'⚠️ خطأ في الاتصال. تأكد من الإنترنت':'⚠️ Network error. Check internet')
  }
}

// ═══ Pagination state ═══
const DEALS_PER_PAGE=20
let _dealsPage=0,_dealsHasMore=true,_dealsLoading=false

async function loadDeals(reset=true){
  if(_dealsLoading)return
  _dealsLoading=true
  try{
    if(reset){
      _dealsPage=0
      _dealsHasMore=true
      DEALS=[]
    }
    if(!_dealsHasMore){_dealsLoading=false;return}

    const from=_dealsPage*DEALS_PER_PAGE
    const to=from+DEALS_PER_PAGE-1

    // نجيب الصفقات بـ pagination — أداء أفضل بكثير لـ 10K+ مستخدم
    const{data,error,count}=await sb.from('deals')
      .select('*,payments(*)',{count:'exact'})
      .or(`buyer_id.eq.${CU.id},buyer_email.eq.${CU.email},seller_id.eq.${CU.id},seller_email.eq.${CU.email}`)
      .order('created_at',{ascending:false})
      .range(from,to)

    if(error){Q.warn('loadDeals error:',error);_dealsLoading=false;return}

    const newDeals=data||[]
    if(reset){
      DEALS=newDeals
    }else{
      DEALS=[...DEALS,...newDeals]
    }

    _dealsHasMore=newDeals.length===DEALS_PER_PAGE
    _dealsPage++
    Q.log(`Loaded ${newDeals.length} deals (page ${_dealsPage}, total: ${DEALS.length})`)
  }catch(e){
    Q.warn('loadDeals exception:',e)
    if(reset)DEALS=[]
  }finally{
    _dealsLoading=false
  }
}

window.calcI=()=>{
  const pr=parseFloat($('c-price')?.value)||0,dn=parseFloat($('c-down')?.value)||0,mo=parseInt($('c-mo')?.value)||0
  const v=$('cval'),b=$('cbrk');if(!v)return
  if(pr>0&&mo>0&&dn<pr){
    const r=pr-dn
    const baseInst=r/mo
    // 7% إجمالي = 3.5% من البائع + 3.5% من المشتري
    const feeBuyer=Math.round(r*0.035*100)/100
    const feeSeller=Math.round(r*0.035*100)/100
    const feePerPay=Math.round(feeBuyer/mo*100)/100
    const totalInst=baseInst+feePerPay
    const sellerNet=pr-feeSeller
    v.textContent=fmtSAR(totalInst)
    if(b){
      b.innerHTML=isAr()
        ?`<div style="font-size:12px;line-height:1.7">
          <div>القسط ${fmtSAR(baseInst)} + رسوم سعي ${fmtSAR(feePerPay)} = <strong>${fmtSAR(totalInst)}</strong> شهرياً</div>
          <div style="margin-top:6px;padding-top:6px;border-top:1px dashed var(--g300);color:var(--g600)">
            البائع يستلم: <strong style="color:var(--teal2)">${fmtSAR(sellerNet)}</strong> (السعر ${fmtSAR(pr)} − رسوم 3.5% ${fmtSAR(feeSeller)})
          </div>
        </div>`
        :`<div style="font-size:12px;line-height:1.7">
          <div>Installment ${fmtSAR(baseInst)} + fee ${fmtSAR(feePerPay)} = <strong>${fmtSAR(totalInst)}</strong>/mo</div>
          <div style="margin-top:6px;padding-top:6px;border-top:1px dashed var(--g300);color:var(--g600)">
            Seller receives: <strong style="color:var(--teal2)">${fmtSAR(sellerNet)}</strong> (Price ${fmtSAR(pr)} − 3.5% fee ${fmtSAR(feeSeller)})
          </div>
        </div>`
    }
  }
  else{v.textContent='—';if(b)b.innerHTML=''}
}

window.submitDeal=async()=>{
  const be=$('c-sel')?.value.trim().toLowerCase(),it=$('c-item')?.value
  const de=$('c-desc')?.value.trim(),pr=parseFloat($('c-price')?.value)
  const dn=parseFloat($('c-down')?.value)||0,mo=parseInt($('c-mo')?.value)
  const no=$('c-notes')?.value.trim(),sd=$('c-date')?.value||today()
  if(!be||!it||!pr||!mo){toast(isAr()?'⚠️ يرجى ملء الحقول المطلوبة':'⚠️ Fill required fields','e');return}
  if(!valEmail(be)){toast(isAr()?'⚠️ البريد الإلكتروني للمشتري غير صالح':'⚠️ Invalid buyer email','e');return}
  // فحص قوي للبريد المؤقت
  const beCheck=valEmailStrong(be)
  if(!beCheck.ok){toast(beCheck.msg,'e');return}
  if(mo<1||mo>24){toast(isAr()?'⚠️ الأشهر بين 1 و24':'⚠️ Months 1-24','e');return}
  if(pr>100000){toast(isAr()?'⚠️ الحد الأقصى للسعر 100,000 ر.س':'⚠️ Max price 100,000 SAR','e');return}
  if(!valSAR(pr)){toast(isAr()?'⚠️ السعر غير صالح':'⚠️ Invalid price','e');return}
  if(dn>=pr){toast(isAr()?'⚠️ الدفعة الأولى يجب أن تكون أقل من السعر':'⚠️ Down < total','e');return}
  if(be===CU.email){toast(isAr()?'⚠️ لا يمكنك إرسال عرض لنفسك':'⚠️ Cannot send to yourself','e');return}

  // ═══ فحص الحد الأقصى للصفقات النشطة (مع تحديث من السيرفر) ═══
  // نحدّث البيانات قبل الفحص للتأكد من العدد الصحيح
  await loadDeals()

  const activeStatuses=['pending','approved','active']
  const myActiveCount=DEALS.filter(d=>
    activeStatuses.includes(d.status)&&
    (d.buyer_email===CU.email||d.seller_email===CU.email||d.buyer_id===CU.id||d.seller_id===CU.id)
  ).length

  const isPrem=PRF?.is_premium===true
  const premExp=PRF?.premium_expires_at?new Date(PRF.premium_expires_at):null
  const isPremExpired=premExp&&premExp<new Date()
  const wasPrem=PRF?.premium_expires_at!=null  // كان موثَّق سابقاً
  const limit=(isPrem&&!isPremExpired)?5:3

  Q.log('[Qastni] Active deals count:',myActiveCount,'/ Limit:',limit,'/ Premium:',isPrem)

  if(myActiveCount>=limit){
    showLimitReachedModal(myActiveCount,limit,isPrem,isPremExpired,wasPrem)
    return
  }

  // ═══ فحص حد القسط الشهري للمشتري (33% من الراتب أو 5000 افتراضياً) ═══
  // الأقساط الحالية اللي عليه كمشتري (نشطة فقط)
  const myActiveBuyerDeals=DEALS.filter(d=>
    (d.status==='active'||d.status==='approved')&&
    (d.buyer_email===CU.email||d.buyer_id===CU.id)
  )
  const currentMonthlyBurden=myActiveBuyerDeals.reduce((s,d)=>{
    const inst=d.installment||0
    const fee=d.platform_fee_per_payment||0
    return s+inst+fee
  },0)

  const newMonthlyInst=(pr-dn)/mo
  const newMonthlyFee=Math.round(((pr-dn)*0.035/mo)*100)/100
  const newMonthlyTotal=newMonthlyInst+newMonthlyFee

  const monthlyLimit=PRF?.monthly_salary?Math.round(PRF.monthly_salary*0.33):5000
  const totalAfter=currentMonthlyBurden+newMonthlyTotal

  // ملاحظة: أنا البائع في هذي العملية، فهذا الفحص لا ينطبق عليّ
  // الفحص الحقيقي للحد الشهري يصير على المشتري لما يقبل الصفقة
  // لكن يمكن إضافة تحذير إذا البائع يعرف المشتري

  Q.log('[Qastni] Monthly burden:',currentMonthlyBurden,'/ Limit:',monthlyLimit,'/ New:',newMonthlyTotal)

  // ═══ Nafath check ═══ — لو ما تحقّق من نافذ، نعرض شاشة نافذ أولاً
  if(!PRF?.nafath_verified){
    openNafath({be,it,de,pr,dn,mo,no,sd},()=>{
      _submitDealAfterNafath(be,it,de,pr,dn,mo,no,sd)
    })
    return
  }

  await _submitDealAfterNafath(be,it,de,pr,dn,mo,no,sd)
}

  const isExpiredCase=wasPrem&&isPremExpired
  const o=$('nafath-overlay')
  if(!o)return

  let title,desc,perks,ctaText,ctaIcon

  if(isExpiredCase){
    // الحالة "أ" — اشتراكه انتهى وعنده صفقات أكثر من الحد المجاني

async function _submitDealAfterNafath(be,it,de,pr,dn,mo,no,sd){
  const btn=$('sbtn');btn.innerHTML=qLoader();btn.disabled=true
  const inst=Math.round(((pr-dn)/mo)*100)/100
  // المستخدم الحالي هو البائع، be هو ايميل المشتري
  // نحفظ buyer_id فاضي حتى يقبل المشتري ويتعبّى تلقائياً
  const{data:deal,error}=await sb.from('deals').insert({
    contract_num:genCN(),
    buyer_email:be,
    buyer_name:'',  // يتعبّى لما المشتري يقبل
    seller_email:CU.email,
    seller_id:CU.id,
    seller_name:san(PRF?.full_name||CU.email.split('@')[0]),
    item:it,description:san(de),price:pr,down_payment:dn,
    months:mo,installment:inst,notes:san(no),start_date:sd,status:'pending'
  }).select().single()
  if(error){
    btn.innerHTML='📤 '+(isAr()?'إرسال العرض':'Send');btn.disabled=false
    const m=error.message||''
    if(m.includes('EXCEEDED_MONTHLY_LIMIT')){
      const parts=m.split(':')
      const cur=parseFloat(parts[1]||0),newAmt=parseFloat(parts[2]||0)
      const remaining=Math.max(5000-cur,0)
      toast(isAr()
        ?`⚠️ تجاوز الحد الشهري! أقساطك الحالية: ${fmtSAR(cur)} | المتبقي لك: ${fmtSAR(remaining)}`
        :`⚠️ Monthly limit exceeded! Current: ${fmtSAR(cur)} | Available: ${fmtSAR(remaining)}`,'e')
      return
    }
    if(m.includes('ACTIVE_DEAL_EXISTS_WITH_SELLER')||m.includes('ACTIVE_DEAL_EXISTS')){
      toast(isAr()
        ?'⚠️ لديك صفقة نشطة أو معلقة مع هذا المشتري. أكمل الصفقة الحالية أولاً'
        :'⚠️ You have an active/pending deal with this buyer. Complete it first','e')
      return
    }
    toast('⚠️ '+m,'e')
    return
  }
  // إنشاء الأقساط — العمولة تتحسب في السيرفر عبر trigger
  const sch=Array.from({length:mo},(_,i)=>({deal_id:deal.id,month_num:i+1,due_date:salaryDate(sd,i+1),amount:inst,is_paid:false}))
  await sb.from('payments').insert(sch)
  // audit log
  try{
    await sb.from('audit_log').insert({deal_id:deal.id,user_id:CU.id,user_email:CU.email,action:'offer_sent_to_buyer',details:{price:pr,months:mo,buyer:be}})
  }catch(e){}
  ;['c-sel','c-desc','c-price','c-notes'].forEach(id=>{const el=$(id);if(el)el.value=''})
  $('c-item').value='';$('c-down').value='0';$('c-mo').value='';$('c-date').value=today();$('cval').textContent='—'
  toast(isAr()?'✅ تم إرسال العرض للمشتري بنجاح!':'✅ Offer sent to buyer!','s')
  await loadDeals();nav('dash')
}

function bCard(d){
  const iB=d.buyer_id===CU.id||d.buyer_email===CU.email
  const iS=d.seller_id===CU.id||d.seller_email===CU.email
  const pay=d.payments||[],paid=pay.filter(p=>p.is_paid).length,tot=d.months||1,pct=Math.round((paid/tot)*100)
  // الجهة الأخرى من الصفقة
  const ot=iB?(d.seller_name||d.seller_email):(d.buyer_name||d.buyer_email)
  const rl=iB?(isAr()?'البائع:':'Seller:'):(isAr()?'المشتري:':'Buyer:')
  // البائع يقدر يلغي العرض قبل القبول

  return`<div class="dcard" onclick="nav('detail',{id:'${d.id}'})" role="button" tabindex="0" style="position:relative">

    <div class="dico">${ico(d.item)}</div>
    <div class="dbody">
      <div class="dtit">${san(d.item)}${d.description?' — '+san(d.description):''}</div>
      <div class="dmeta">${rl} <strong>${san(ot)}</strong> • ${fmtD(d.created_at)}</div>
      ${d.status==='active'?`<div class="plbl"><span>${paid}/${tot}</span><span>${pct}%</span></div><div class="ptrack"><div class="pfill" style="width:${pct}%"></div></div>`:''}
    </div>
    <div class="dright"${canDelete?' style="margin-inline-end:32px"':''}><div class="dprice">${fmtSAR(d.price)}</div><div class="dpsub">${fmtSAR(d.installment)}/${isAr()?'شهر':'mo'}</div><div style="margin-top:6px">${sbdg(d.status)}</div></div>

function rDash(){
  const nm=PRF?.full_name||CU.email.split('@')[0]
  const dw=$('dwelcome');if(dw)dw.textContent=isAr()?`مرحباً، ${nm}`:`Welcome, ${nm}`

  const activeCount=DEALS.filter(d=>d.status==='active').length
  const completedCount=DEALS.filter(d=>d.status==='completed').length

  // حساب المستحق لي (كبائع) و عليّ (كمشتري) — يستثني الصفقات المكتملة والأقساط المدفوعة
  let owedToMe=0,iOwe=0
  DEALS.forEach(d=>{
    if(d.status!=='active'&&d.status!=='approved')return
    const iAmBuyer=d.buyer_id===CU.id||d.buyer_email===CU.email
    const iAmSeller=d.seller_email===CU.email
    const unpaidPays=(d.payments||[]).filter(p=>!p.is_paid)
    const unpaidTotal=unpaidPays.reduce((s,p)=>{
      const fee=p.platform_fee||(d.platform_fee_per_payment||0)
      return s+p.amount+fee
    },0)
    if(iAmSeller){
      const unpaidSellerAmt=unpaidPays.reduce((s,p)=>s+p.amount,0)
      owedToMe+=unpaidSellerAmt
    }
    if(iAmBuyer){
      iOwe+=unpaidTotal
    }
  })

  // 🎬 Counter animations — الأرقام تعد من 0 بشكل سينمائي
  setTimeout(()=>{
    animateCounter($('sa'),activeCount,1000)
    animateCounter($('sd'),completedCount,1100)
    animateCounter($('srecv'),Math.round(owedToMe),1300)
    animateCounter($('sowe'),Math.round(iOwe),1500)
  },300)

  // عرض الصفقات النشطة والمعلقة فقط
  const activeDeals=DEALS.filter(d=>['active','approved','pending'].includes(d.status))
  const dl=$('dl')
  if(dl){
    dl.innerHTML=activeDeals.slice(0,5).map(bCard).join('')||`<div class="cinema-empty">
      <div class="cinema-empty-icon">📄</div>
      <div class="cinema-empty-title">${isAr()?'لا توجد صفقات نشطة':'No active deals'}</div>
      <div class="cinema-empty-desc">${isAr()?'ابدأ رحلتك بإنشاء أول صفقة تقسيط الآن':'Start your journey by creating your first deal'}</div>
    </div>`
  }

  // ═══ Premium expiry reminder ═══
  const remSlot=$('dash-prem-reminder')
  if(remSlot){
    remSlot.innerHTML=buildPremReminder()
  }

  // ═══ 🚀 Seller Onboarding ═══
  const onbSlot=$('dash-seller-onb')
  if(onbSlot){
    onbSlot.innerHTML=renderSellerOnboarding()
  }

  // ═══ 📰 Activity Feed ═══
  const feedSlot=$('dash-activity-feed')
  if(feedSlot){
    feedSlot.innerHTML=renderActivityFeed()
  }

  // 🎨 تفعيل 3D tilt على البطاقات
  setTimeout(()=>attachTiltEffects(),100)
}

function buildPremReminder(){
  const isPrem=PRF?.is_premium===true
  const expDate=PRF?.premium_expires_at?new Date(PRF.premium_expires_at):null
  if(!isPrem||!expDate)return ''

  const now=new Date()
  const daysLeft=Math.floor((expDate-now)/(1000*60*60*24))

  // الاشتراك منتهي
  if(daysLeft<0){
    const daysAgo=Math.abs(daysLeft)
    return `
      <button class="promo-banner" style="background:linear-gradient(135deg,#dc2626,#b91c1c);margin-bottom:14px" onclick="nav('prem')">
        <div class="promo-icon" style="background:rgba(255,255,255,.25)">⏰</div>
        <div class="promo-content">
          <div class="promo-title">
            ${isAr()?'انتهى اشتراكك في موثَّق':'Your Verified subscription expired'}
            <span class="promo-mini-badge" style="background:rgba(255,255,255,.3)">${isAr()?`قبل ${daysAgo} ${daysAgo===1?'يوم':'أيام'}`:`${daysAgo}d ago`}</span>
          </div>
          <div class="promo-desc">${isAr()?'صفقاتك الحالية محفوظة. جدّد لإنشاء صفقات جديدة':'Your deals are safe. Renew to create new ones'}</div>
        </div>
        <div class="promo-arrow">›</div>
      </button>`
  }

  // أقل من 7 أيام
  if(daysLeft<=7){
    return `
      <button class="promo-banner" style="background:linear-gradient(135deg,#f59e0b,#d97706);margin-bottom:14px" onclick="nav('prem')">
        <div class="promo-icon" style="background:rgba(255,255,255,.25)">⏰</div>
        <div class="promo-content">
          <div class="promo-title">
            ${isAr()?'اشتراكك يقارب على الانتهاء':'Subscription ending soon'}
            <span class="promo-mini-badge" style="background:rgba(255,255,255,.3)">${isAr()?`${daysLeft} ${daysLeft===1?'يوم':'أيام'}`:`${daysLeft}d left`}</span>
          </div>
          <div class="promo-desc">${isAr()?'جدّد الآن للحفاظ على شارة موثَّق ومميزاتها':'Renew now to keep your Verified ⭐ badge'}</div>
        </div>
        <div class="promo-arrow">›</div>
      </button>`
  }

  return ''
}

window.updateSalary=async()=>{
  const cur=PRF?.monthly_salary||''
  const val=prompt(isAr()?'أدخل راتبك الشهري بالريال السعودي:':'Enter your monthly salary in SAR:',cur)
  if(val===null)return
  const n=parseFloat(val)
  if(!n||n<1000||n>200000){
    toast(isAr()?'⚠️ أدخل راتب صحيح (1,000 - 200,000)':'⚠️ Enter valid salary (1,000-200,000)','e')
    return
  }
  const{error}=await sb.from('profiles').upsert({id:CU.id,monthly_salary:n},{onConflict:'id'})
  if(error){toast('⚠️ '+error.message,'e');return}
  PRF.monthly_salary=n
  toast(isAr()?'✅ تم تحديث الراتب':'✅ Salary updated','s')
  rProfile()
}

window.respond=async(id,status)=>{
  const up={status}

  if(status==='active'){
    // ═══ فحوص الحدود قبل قبول العرض (المشتري) ═══
    await loadDeals()

    const deal=DEALS.find(d=>d.id===id)
    if(!deal){toast(isAr()?'⚠️ الصفقة غير موجودة':'⚠️ Deal not found','e');return}

    // 1. فحص عدد الصفقات النشطة للمشتري
    const activeStatuses=['pending','approved','active']
    const myActiveCount=DEALS.filter(d=>
      d.id!==id&&  // استثني الصفقة الحالية
      activeStatuses.includes(d.status)&&
      (d.buyer_email===CU.email||d.seller_email===CU.email||d.buyer_id===CU.id||d.seller_id===CU.id)
    ).length

    const isPrem=PRF?.is_premium===true
    const premExp=PRF?.premium_expires_at?new Date(PRF.premium_expires_at):null
    const isPremExpired=premExp&&premExp<new Date()
    const wasPrem=PRF?.premium_expires_at!=null
    const limit=(isPrem&&!isPremExpired)?5:3

    if(myActiveCount>=limit){
      showLimitReachedModal(myActiveCount,limit,isPrem,isPremExpired,wasPrem)
      return
    }

    // 2. فحص الحد الشهري (33% من الراتب أو 5000 افتراضياً)
    const myActiveBuyerDeals=DEALS.filter(d=>
      d.id!==id&&
      (d.status==='active'||d.status==='approved')&&
      (d.buyer_email===CU.email||d.buyer_id===CU.id)
    )
    const currentMonthlyBurden=myActiveBuyerDeals.reduce((s,d)=>{
      return s+(d.installment||0)+(d.platform_fee_per_payment||0)
    },0)

    const newMonthlyTotal=(deal.installment||0)+(deal.platform_fee_per_payment||0)
    const monthlyLimit=PRF?.monthly_salary?Math.round(PRF.monthly_salary*0.33):5000
    const totalAfter=currentMonthlyBurden+newMonthlyTotal

    if(totalAfter>monthlyLimit){
      const remaining=Math.max(monthlyLimit-currentMonthlyBurden,0)
      toast(isAr()
        ?`⚠️ تجاوز الحد الشهري! حدّك: ${fmtSAR(monthlyLimit)} | الحالي: ${fmtSAR(currentMonthlyBurden)} | المتبقي: ${fmtSAR(remaining)} | هذا القسط: ${fmtSAR(newMonthlyTotal)}`
        :`⚠️ Monthly limit exceeded! Limit: ${fmtSAR(monthlyLimit)} | Current: ${fmtSAR(currentMonthlyBurden)} | Available: ${fmtSAR(remaining)}`,'e')
      return
    }

    up.accepted_at=new Date().toISOString()
    // المشتري يقبل العرض — نحفظ بياناته
    up.buyer_id=CU.id
    up.buyer_name=san(PRF?.full_name||CU.email.split('@')[0])
  }
  else up.rejected_at=new Date().toISOString()

  const{error}=await sb.from('deals').update(up).eq('id',id)
  if(error){toast('⚠️ '+error.message,'e');return}
  await loadDeals()
  toast(status==='active'?(isAr()?'✅ تم قبول العرض، سيتم تفعيل الصفقة':'✅ Offer accepted, deal activated'):(isAr()?'❌ تم رفض العرض':'❌ Offer rejected'),status==='active'?'s':'e')
  updBadge();rInc()
}

window.deleteDeal=async(id,e)=>{
  if(e){e.stopPropagation();e.preventDefault()}
  const deal=DEALS.find(d=>d.id===id)
  if(!deal){toast(isAr()?'⚠️ الصفقة غير موجودة':'⚠️ Deal not found','e');return}
  if(deal.status!=='pending'){toast(isAr()?'⚠️ لا يمكن حذف الصفقة بعد قبولها':'⚠️ Cannot delete after acceptance','e');return}
  // البائع هو اللي يقدر يلغي العرض
  if(deal.seller_id!==CU.id&&deal.seller_email!==CU.email){toast(isAr()?'⚠️ لا تملك صلاحية الحذف':'⚠️ Not allowed','e');return}
  const ok=confirm(isAr()
    ?`هل أنت متأكد من إلغاء العرض؟\n\nالسلعة: ${deal.item}${deal.description?' — '+deal.description:''}\nالمشتري: ${deal.buyer_email}\n\nلا يمكن التراجع عن هذا الإجراء.`
    :`Cancel this offer?\n\nItem: ${deal.item}\nBuyer: ${deal.buyer_email}\n\nThis cannot be undone.`)
  if(!ok)return
  // الأقساط بتنحذف تلقائياً بسبب CASCADE
  const{error}=await sb.from('deals').delete().eq('id',id)
  if(error){toast('⚠️ '+error.message,'e');return}
  try{
    await sb.from('audit_log').insert({user_id:CU.id,user_email:CU.email,action:'deal_deleted',details:{deal_id:id,item:deal.item,seller:deal.seller_email}})
  }catch(e){}
  await loadDeals()
  toast(isAr()?'🗑️ تم حذف الطلب بنجاح':'🗑️ Request deleted','s')
  // لو كنا في صفحة التفاصيل، نرجع لصفقاتي
  if(page==='detail')nav('deals')
  else if(page==='deals')rDeals()
  else if(page==='dash')rDash()
}

async function rUpub(){
  const c=$('upubc');if(!c)return
  const email=(_upubData?.email||'').trim().toLowerCase()
  const fallbackName=(_upubData?.name||'').trim()

  if(!email){
    c.innerHTML=`<div class="upub-page"><div class="upub-wrap"><div class="upub-empty">${isAr()?'لا يوجد معلومات':'No data'}</div></div></div>`
    return
  }

  // عرض حالة تحميل
  c.innerHTML=`<div class="upub-page"><div class="upub-wrap" style="text-align:center;padding:40px;display:flex;justify-content:center">${qLoader('lg','t')}</div></div>`

  // محاولة جلب الملف الشخصي عبر بيانات صفقة سابقة
  let profile=null
  try{
    // أولاً نشوف لو فيه عمود email في profiles
    const{data}=await sb.from('profiles').select('full_name,avatar_color,is_premium,premium_expires_at,nafath_verified,created_at').eq('email',email).maybeSingle()
    profile=data
  }catch(e){
    // عمود email غير متاح أو RLS يمنعه
    Q.warn('Direct profile lookup failed, falling back to deals data',e)
  }

  // Fallback: نجيب الاسم من بيانات الصفقات إذا الملف الشخصي غير متاح
  if(!profile||!profile.full_name){
    const dealMatch=DEALS.find(d=>(d.buyer_email===email&&d.buyer_name)||d.seller_email===email)
    if(dealMatch&&dealMatch.buyer_email===email&&dealMatch.buyer_name){
      profile=profile||{}
      if(!profile.full_name)profile.full_name=dealMatch.buyer_name

  }

  // جلب التقييمات
  let ratings=[]
  try{
    const{data}=await sb.from('ratings').select('stars,comment,created_at,from_email').eq('to_email',email).order('created_at',{ascending:false}).limit(20)

window.processPMPremium=async()=>{
  const btn=document.querySelector('[data-pay-btn]')
  if(!btn)return
  btn.innerHTML=qLoader()
  btn.disabled=true

  try{
    // محاكاة معالجة
    await new Promise(r=>setTimeout(r,1500))

    // تحديث الـ profile
    const expDate=new Date()
    expDate.setFullYear(expDate.getFullYear()+1)

    const{error}=await sb.from('profiles').update({
      is_premium:true,
      premium_expires_at:expDate.toISOString()
    }).eq('id',CU.id)

    if(error)throw error

    // audit log
    try{
      await sb.from('audit_log').insert({
        user_id:CU.id,user_email:CU.email,
        action:'premium_activated',
        details:{amount:150,method:_PS.method,sandbox:true,expires_at:expDate.toISOString()}
      })
    }catch(e){}

    // تحديث PRF محلياً
    PRF.is_premium=true
    PRF.premium_expires_at=expDate.toISOString()

    closePM()
    toast(isAr()?'⭐ مبروك! حسابك الآن موثَّق 🎉':'⭐ Congrats! You\'re now Verified 🎉','s')

    // إعادة عرض الصفحة
    rerender()
  }catch(e){
    btn.innerHTML='⭐ '+(isAr()?'فعّل الاشتراك':'Activate')+' 150 '+(isAr()?'ر.س':'SAR')
    btn.disabled=false
    toast(isAr()?'⚠️ فشل التفعيل، حاول مرة ثانية':'⚠️ Activation failed','e')
    console.error(e)
  }
}

window.markPMulti=(did)=>{

  if(checks.length===0)return
  if(checks.length===1){
    // واحد فقط، نستخدم الدفع العادي

  }

  const deal=DEALS.find(d=>d.id===did)
  if(!deal){toast(isAr()?'⚠️ خطأ':'⚠️ Error','e');return}

  const paymentIds=[],paymentList=[]
  let total=0,totalFee=0,totalSellerAmt=0
  checks.forEach(c=>{
    const pid=c.dataset.pid
    const pay=(deal.payments||[]).find(p=>p.id===pid)
    if(pay){
      const fee=pay.platform_fee||(deal.platform_fee_per_payment||Math.round(deal.installment*0.035*100)/100)
      paymentIds.push(pid)
      paymentList.push({...pay,fee,total:pay.amount+fee})
      total+=pay.amount+fee
      totalFee+=fee
      totalSellerAmt+=pay.amount
    }
  })

  _PS={dealId:did,paymentId:null,amount:total,fee:totalFee,sellerAmount:totalSellerAmt,method:'apple',multi:true,paymentIds,paymentList}

      await sb.from('payments').update({
        is_paid:true,

      }).eq('id',pid)

      // تسجيل العملية
      try{
        const pay=_PS.paymentList.find(p=>p.id===pid)

          payment_id:pid,

          status:'completed',

    const{data:remaining}=await sb.from('payments').select('id,is_paid').eq('deal_id',_PS.dealId)

    if(allPaid){

window.processPM=async()=>{
  const btn=document.querySelector('[data-pay-btn]')
  if(!btn)return
  btn.innerHTML=qLoader('sm','w')+' '+(isAr()?'جاري المعالجة...':'Processing...')
  btn.disabled=true
  
  // محاكاة Moyasar Sandbox
  await new Promise(r=>setTimeout(r,1800))
  
  try{
    // تحديد القسط كمدفوع
    await sb.from('payments').update({is_paid:true,paid_at:new Date().toISOString()}).eq('id',_PS.paymentId)
    
    // تسجيل عملية الدفع
    await sb.from('payment_transactions').insert({
      deal_id:_PS.dealId,
      payment_id:_PS.paymentId,
      buyer_id:CU.id,
      amount:_PS.amount,
      platform_fee:_PS.fee,
      seller_amount:_PS.sellerAmount,
      payment_method:_PS.method,
      is_sandbox:true,
      moyasar_id:'sandbox_'+Date.now()
    })
    
    // audit log
    try{
      await sb.from('audit_log').insert({deal_id:_PS.dealId,user_id:CU.id,user_email:CU.email,action:'payment_completed',details:{amount:_PS.amount,method:_PS.method,sandbox:true}})
    }catch(e){}
    
    // تحقق من اكتمال الصفقة
    const{data:ap}=await sb.from('payments').select('is_paid').eq('deal_id',_PS.dealId)
    const done=ap?.every(p=>p.is_paid)
    if(done){
      await sb.from('deals').update({status:'completed',completed_at:new Date().toISOString()}).eq('id',_PS.dealId)
      try{await sb.from('audit_log').insert({deal_id:_PS.dealId,user_id:CU.id,user_email:CU.email,action:'deal_completed'})}catch(e){}
    }
    
    closePM()
    await loadDeals()
    toast(done?(isAr()?'🎉 اكتملت الصفقة بالكامل!':'🎉 Deal fully completed!'):(isAr()?'✅ تم الدفع بنجاح':'✅ Payment successful'),'s')
    rDetail(_PS.dealId)
  }catch(e){
    btn.innerHTML='🔒 '+(isAr()?'دفع':'Pay')+' '+fmtSAR(_PS.amount)
    btn.disabled=false
    toast('⚠️ '+e.message,'e')
  }
}

// SWIPE TO DISMISS (Bottom Sheets)
// ═══════════════════════════════════════════════
function attachSwipeDismiss(overlayId,onClose){
  const ov=document.getElementById(overlayId)
  if(!ov||ov.dataset.swipeAttached==='1')return
  ov.dataset.swipeAttached='1'

  let startY=0,currentY=0,isDragging=false,sheet=null

  function getSheet(){
    return ov.querySelector('.menu-modal,.faq-modal,.pmodal,.nafath-card,.modal')
  }

  function resetSwipeState(){
    isDragging=false
    if(sheet){
      sheet.style.transform=''
      sheet.style.transition=''
    }
    ov.style.background=''
    sheet=null
    startY=0
    currentY=0
  }

  ov.addEventListener('touchstart',(e)=>{
    // الحرس الأول: لو الـ overlay مخفي، لا تتدخل أبداً
    if(ov.classList.contains('hidden')){resetSwipeState();return}
    sheet=getSheet()
    if(!sheet){resetSwipeState();return}
    const t=e.touches[0]
    const r=sheet.getBoundingClientRect()
    // اسمح بالسحب فقط من رأس الـ sheet (أعلى 60px) أو من الخلفية فوقه
    const isInTopArea=t.clientY>=r.top&&t.clientY<=r.top+60
    const isAboveSheet=t.clientY<r.top
    if(!isInTopArea&&!isAboveSheet){
      // اللمس داخل المحتوى — لا تتدخل، اترك السكرول طبيعي
      resetSwipeState()
      return
    }
    startY=t.clientY
    currentY=startY
    isDragging=true
    sheet.style.transition='none'
  },{passive:true})

  ov.addEventListener('touchmove',(e)=>{
    if(!isDragging||!sheet||ov.classList.contains('hidden'))return
    currentY=e.touches[0].clientY
    const dy=currentY-startY
    if(dy>0){
      sheet.style.transform=`translateY(${dy}px)`
      const op=Math.max(.2,1-(dy/400))
      ov.style.background=`rgba(15,23,42,${.55*op})`
    }
  },{passive:true})

  ov.addEventListener('touchend',()=>{
    if(!isDragging||!sheet){resetSwipeState();return}
    const dy=currentY-startY
    sheet.style.transition='transform .25s cubic-bezier(.32,.72,0,1)'
    ov.style.background=''
    if(dy>120){
      sheet.style.transform='translateY(100%)'
      setTimeout(()=>{
        resetSwipeState()
        if(onClose)onClose()
        else ov.classList.add('hidden')
      },230)
    }else{
      sheet.style.transform=''
      isDragging=false
    }
  },{passive:true})

  // إعادة تعيين الحالة في حال الإلغاء (مكالمة، إشعار، إلخ)
  ov.addEventListener('touchcancel',()=>resetSwipeState(),{passive:true})
}

            <span class="ico">⚠️</span><span class="lbl">${isAr()?'شكوى':'Complaint'}</span>
          </button>
          <button class="sugg-type" data-t="bug" onclick="selSuggType('bug')">
            <span class="ico">🐛</span><span class="lbl">${isAr()?'مشكلة':'Bug'}</span>
          </button>
        </div>
        
        <label class="fl">${isAr()?'رسالتك':'Your Message'} <span class="req">*</span></label>
        <textarea class="fc" id="sugg-msg" rows="5" maxlength="1000" placeholder="${isAr()?'اكتب رأيك هنا... كل تعليق يهمنا':'Write your feedback here...'}"></textarea>
        <div class="text-xs text-m mt8">${isAr()?'💬 سيتم الرد عليك على بريدك الإلكتروني المسجّل':"💬 We'll reply to your registered email"}</div>
      </div>
      <div class="mfoot" style="padding:13px 20px">
        <button class="btn bg" onclick="backToMenu('sugg-overlay')" style="flex:1">${isAr()?'رجوع':'Back'}</button>
        <button class="btn bp" id="sugg-send" onclick="submitSugg()" style="flex:2">📨 ${isAr()?'إرسال':'Send'}</button>
      </div>
    </div>`
  $('sugg-overlay').classList.remove('hidden')
  applyLang()
}

window.closeSugg=()=>$('sugg-overlay').classList.add('hidden')

window.selSuggType=t=>{
  _SUGG_TYPE=t
  document.querySelectorAll('.sugg-type').forEach(b=>b.classList.toggle('active',b.dataset.t===t))
}

window.submitSugg=async()=>{
  const msg=$('sugg-msg')?.value.trim()
  if(!msg||msg.length<10){
    toast(isAr()?'⚠️ الرسالة قصيرة جداً (10 أحرف على الأقل)':'⚠️ Message too short (min 10 chars)','e')
    return
  }
  const btn=$('sugg-send')
  btn.innerHTML=qLoader();btn.disabled=true
  const{error}=await sb.from('suggestions').insert({
    user_id:CU.id,
    user_email:CU.email,
    user_name:san(PRF?.full_name||CU.email.split('@')[0]),
    type:_SUGG_TYPE,
    message:san(msg)
  })
  if(error){
    toast('⚠️ '+error.message,'e')
    btn.innerHTML='📨 '+(isAr()?'إرسال':'Send');btn.disabled=false
    return
  }
  closeSugg()
  closeMenu()
  openThanks()
}

  ov.classList.remove('hidden')

  renderFAQ()
}
window.closeFAQ=()=>{
  const ov=$('faq-overlay');if(!ov)return
  ov.classList.add('hidden')
  document.body.style.overflow=''
  _faqFilter='all';_faqSearch=''
}
window.faqFilter=(c)=>{_faqFilter=c;renderFAQ()}
window.faqSearch=(v)=>{_faqSearch=v.toLowerCase();renderFAQList()}
window.faqToggle=(idx)=>{
  const it=document.querySelectorAll('.faq-item')[idx]

  ov.innerHTML=`<div class="faq-modal" onclick="event.stopPropagation()">

      <span class="faq-search-ico">🔍</span>
      <input type="text" placeholder="${isAr()?'ابحث في الأسئلة...':'Search questions...'}" oninput="faqSearch(this.value)" value="${_faqSearch}"/>

      ${cats.map(c=>`<button class="faq-cat ${c===_faqFilter?'active':''}" onclick="faqFilter('${c}')">${catLabels[c]}</button>`).join('')}

    c.innerHTML=`<div class="faq-list"><div class="faq-empty">🔍 ${isAr()?'لا توجد نتائج':'No results found'}</div></div>`

    <div class="faq-item">
      <button class="faq-q" onclick="faqToggle(${i})">

window.openOnboarding=()=>{
  const ov=$('onb-overlay');if(!ov)return
  _onbStep=0
  ov.classList.remove('hidden')
  document.body.style.overflow='hidden'
  // particles
  const particles=Array.from({length:20},(_,i)=>{
    const left=Math.random()*100
    const dur=8+Math.random()*7
    const delay=Math.random()*8
    const px=(Math.random()-.5)*200
    return `<div class="onb-particle" style="left:${left}%;bottom:0;animation:particleFloat ${dur}s linear ${delay}s infinite;--px:${px}px"></div>`
  }).join('')
  ov.innerHTML=`<div class="onb-bg"></div><div class="onb-particles">${particles}</div><div class="onb-progress"><div class="onb-progress-fill" id="onb-progress-fill" style="width:25%"></div></div><button class="onb-skip" onclick="closeOnboarding()">${isAr()?'تخطي':'Skip'}</button><div id="onb-content-wrap"></div>`
  renderOnbScreen()
}

function renderOnbScreen(){
  const wrap=$('onb-content-wrap');if(!wrap)return
  const screen=ONB_SCREENS[_onbStep]
  const total=ONB_SCREENS.length
  const isFinal=_onbStep===total-1
  const isFirst=_onbStep===0

  // تحديث شريط التقدم
  const fill=$('onb-progress-fill')
  if(fill)fill.style.width=`${((_onbStep+1)/total)*100}%`

  let logoHTML=''
  if(screen.showLogo){
    logoHTML=`<div class="onb-hero"><div class="onb-logo"><div class="onb-logo-glow"></div>${LOGO_W(160).replace('width="160" height="160"','width="160" height="160" style="filter:drop-shadow(0 0 30px rgba(94,234,212,.7))"')}</div></div>`
  }

  let shieldsHTML=''
  if(screen.shields){
    shieldsHTML=`<div class="onb-shields">
      <div class="onb-shield"><span class="onb-shield-icon">🏛️</span>${isAr()?'قيد الترخيص من ساما':'SAMA Pending'}</div>
      <div class="onb-shield"><span class="onb-shield-icon">🔐</span>${isAr()?'تحقق نافذ':'Nafath Verified'}</div>
      <div class="onb-shield"><span class="onb-shield-icon">🛡️</span>${isAr()?'متوافق شرعاً':'Sharia Compliant'}</div>
    </div>`
  }

  let cardsHTML=''
  if(screen.cards){
    cardsHTML=`<div class="onb-cards">${screen.cards.map((card,i)=>`
      <div class="onb-card" style="animation:onbTextReveal .8s ease-out ${.7+i*.15}s both">
        <div class="onb-card-ico">${card.ic}</div>
        <div class="onb-card-text">
          <div class="onb-card-title">${isAr()?card.titleAr:card.titleEn}</div>
          <div class="onb-card-desc">${isAr()?card.descAr:card.descEn}</div>
        </div>
      </div>
    `).join('')}</div>`
  }

  // الأزرار
  let actionsHTML=''
  if(isFinal){
    actionsHTML=`<div class="onb-actions">
      <button class="onb-btn onb-btn-final" onclick="closeOnboarding()">
        <span>${isAr()?'يلا نبدأ':"Let's start"}</span>
        <span style="font-size:18px">✨</span>
      </button>
    </div>`
  }else{
    actionsHTML=`<div class="onb-actions">
      ${!isFirst?`<button class="onb-btn onb-btn-back" onclick="prevOnbStep()">${isAr()?'← رجوع':'← Back'}</button>`:''}
      <button class="onb-btn onb-btn-primary" onclick="nextOnbStep()">
        <span>${isAr()?'التالي':'Next'}</span>
        <span style="font-size:14px">${isAr()?'←':'→'}</span>
      </button>
    </div>`

  wrap.innerHTML=`<div class="onb-content" key="${_onbStep}">
    ${logoHTML}
    <div class="onb-title">${screen.title(isAr())}</div>
    <div class="onb-subtitle">${screen.subtitle(isAr())}</div>
    ${shieldsHTML}
    ${cardsHTML}
    ${actionsHTML}
    ${dotsHTML}

}

// 🔔 NOTIFICATIONS SYSTEM
// ═══════════════════════════════════════════════
const NOTIFS_KEY='qastni_notifs_v1'
const NOTIF_READ_KEY='qastni_notif_read_v1'
let _notifs=[]

function loadNotifs(){
  try{
    _notifs=JSON.parse(localStorage.getItem(NOTIFS_KEY)||'[]')
  }catch(e){_notifs=[]}
}
function saveNotifs(){
  try{
    // نحتفظ بـ آخر 30 إشعار
    if(_notifs.length>30)_notifs=_notifs.slice(0,30)
    localStorage.setItem(NOTIFS_KEY,JSON.stringify(_notifs))
  }catch(e){}
}
function addNotif(text,type='info',ico='🔔'){
  _notifs.unshift({
    id:Date.now()+Math.random(),
    text,type,ico,
    time:Date.now(),
    read:false
  })
  saveNotifs()
  updNotifBadge()
}
function getUnreadCount(){
  return _notifs.filter(n=>!n.read).length
}
function updNotifBadge(){
  const dot=$('notif-dot')
  if(dot){
    const cnt=getUnreadCount()
    dot.classList.toggle('hidden',cnt===0)
  }
}
function markAllNotifsRead(){
  _notifs.forEach(n=>n.read=true)
  saveNotifs()
  updNotifBadge()
  renderNotifDropdown()
}
function fmtTimeAgo(ts){
  const now=Date.now()
  const diff=Math.floor((now-ts)/1000)
  if(diff<60)return isAr()?'الآن':'now'
  if(diff<3600){const m=Math.floor(diff/60);return isAr()?`قبل ${m} ${m===1?'دقيقة':'دقائق'}`:`${m}m ago`}
  if(diff<86400){const h=Math.floor(diff/3600);return isAr()?`قبل ${h} ${h===1?'ساعة':'ساعات'}`:`${h}h ago`}
  const d=Math.floor(diff/86400)
  return isAr()?`قبل ${d} ${d===1?'يوم':'أيام'}`:`${d}d ago`
}
