<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>قسطني | Qastni</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --b50:#eff6ff;--b100:#dbeafe;--b200:#bfdbfe;--b500:#3b82f6;--b600:#2563eb;--b700:#1d4ed8;--b800:#1e40af;
  --g50:#f8fafc;--g100:#f1f5f9;--g200:#e2e8f0;--g300:#cbd5e1;--g400:#94a3b8;--g500:#64748b;--g600:#475569;--g700:#334155;--g800:#1e293b;--g900:#0f172a;
  --gr50:#f0fdf4;--gr100:#dcfce7;--gr600:#16a34a;--gr700:#15803d;
  --r50:#fef2f2;--r100:#fee2e2;--r500:#ef4444;--r600:#dc2626;
  --am50:#fffbeb;--am100:#fef3c7;--am500:#f59e0b;--am600:#d97706;
  --teal:#0d9488;--white:#fff;
  --sh:0 1px 3px rgba(0,0,0,.08);--shm:0 4px 16px rgba(0,0,0,.08);--shl:0 12px 32px rgba(0,0,0,.1);
  --r8:8px;--r10:10px;--r12:12px;--r16:16px;--r20:20px;--r24:24px;
}
html{font-size:16px}
body{font-family:'Tajawal',sans-serif;background:var(--g50);color:var(--g900);min-height:100vh;direction:rtl;-webkit-font-smoothing:antialiased}
body.en{direction:ltr}
.hidden{display:none!important}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--g300);border-radius:10px}

/* LOGO SVG */
.logo-svg{flex-shrink:0}

/* SPLASH */
#splash{position:fixed;inset:0;background:#f0fafa;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:9999;transition:opacity .4s}
#splash p{font-size:13px;color:var(--g400);font-family:'Tajawal',sans-serif}
@keyframes spinDots{to{transform:rotate(360deg)}}
.spin{animation:spinDots 3s linear infinite}

/* LAYOUT */
.shell{display:flex;min-height:100vh}
.sidebar{width:248px;min-width:248px;background:var(--white);border-inline-end:1px solid var(--g200);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;z-index:20}
.main{flex:1;overflow-x:hidden;display:flex;flex-direction:column}
.topbar{background:var(--white);border-bottom:1px solid var(--g200);padding:0 24px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:15}
.page{padding:26px;flex:1}
.pi{animation:pi .2s ease}
@keyframes pi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}

/* SIDEBAR */
.sb-top{padding:18px 16px 14px;border-bottom:1px solid var(--g100);display:flex;align-items:center;gap:10px}
.sb-name{font-size:17px;font-weight:900;color:var(--teal)}
.sb-tag{font-size:10px;color:var(--g400);margin-top:1px}
.sb-nav{padding:10px 8px;flex:1}
.ni{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:var(--r8);font-size:13.5px;font-weight:500;color:var(--g600);cursor:pointer;transition:all .14s;border:none;background:none;width:100%;text-align:inherit;margin-bottom:2px;position:relative}
.ni:hover{background:var(--g100);color:var(--g900)}
.ni.active{background:var(--b50);color:var(--b700);font-weight:700}
.ni.active::before{content:'';position:absolute;inset-inline-start:0;top:6px;bottom:6px;width:3px;background:var(--b600);border-radius:0 3px 3px 0}
.nic{font-size:15px;width:20px;text-align:center;flex-shrink:0}
.nbadge{background:var(--r500);color:#fff;font-size:10px;font-weight:700;min-width:18px;height:18px;padding:0 5px;border-radius:99px;display:flex;align-items:center;justify-content:center;margin-inline-start:auto}
.sb-foot{padding:10px 8px;border-top:1px solid var(--g100)}
.sb-user{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:var(--r10);background:var(--g50);border:1px solid var(--g200);margin-bottom:8px}
.sb-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0;color:#fff}
.sb-uname{font-size:12px;font-weight:700;color:var(--g800)}
.sb-uemail{font-size:11px;color:var(--g400);margin-top:1px}

/* CARD */
.card{background:var(--white);border:1px solid var(--g200);border-radius:var(--r16);box-shadow:var(--sh);overflow:hidden}
.chdr{padding:15px 20px 13px;border-bottom:1px solid var(--g100);display:flex;align-items:center;justify-content:space-between;gap:12px}
.chdr h2,.chdr h3{flex:1;font-size:14px;font-weight:700;color:var(--g800)}
.cbody{padding:18px 20px}
.cfoot{padding:13px 20px;border-top:1px solid var(--g100);background:var(--g50);border-radius:0 0 var(--r16) var(--r16)}

/* BTNS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:8px 16px;border-radius:var(--r8);font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;border:none;transition:all .14s;white-space:nowrap;line-height:1.4}
.btn:disabled{opacity:.45;cursor:not-allowed;pointer-events:none}
.bp{background:var(--b600);color:#fff}.bp:hover{background:var(--b700)}
.bsec{background:var(--b50);color:var(--b700);border:1.5px solid var(--b200)}.bsec:hover{background:var(--b100)}
.bg{background:transparent;color:var(--g600);border:1.5px solid var(--g300)}.bg:hover{background:var(--g100)}
.bd{background:var(--r50);color:var(--r600);border:1.5px solid #fca5a5}.bd:hover{background:var(--r100)}
.bs{background:var(--gr50);color:var(--gr700);border:1.5px solid #86efac}.bs:hover{background:var(--gr100)}
.bsm{padding:5px 11px;font-size:12px;border-radius:6px}
.blg{padding:11px 22px;font-size:14px;border-radius:var(--r10)}
.bfull{width:100%;justify-content:center}
.lbtn{padding:5px 12px;border-radius:99px;font-size:11px;font-weight:700;cursor:pointer;border:1.5px solid var(--b200);background:var(--b50);color:var(--b700);transition:all .14s;font-family:inherit}

/* FORMS */
.fg{margin-bottom:15px}
.fl{display:block;font-size:12px;font-weight:700;color:var(--g700);margin-bottom:5px}
.req{color:var(--r600);margin-inline-start:2px}
.fc{width:100%;padding:9px 13px;border:1.5px solid var(--g300);border-radius:var(--r8);font-size:13px;font-family:inherit;color:var(--g900);background:var(--white);transition:all .14s;outline:none}
.fc:focus{border-color:var(--b500);box-shadow:0 0 0 3px rgba(59,130,246,.12)}
.fc::placeholder{color:var(--g400)}
textarea.fc{resize:vertical;min-height:70px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fhint{font-size:11px;color:var(--g400);margin-top:3px}
.calcbox{background:linear-gradient(135deg,var(--b50),#eef2ff);border:1.5px solid var(--b200);border-radius:var(--r10);padding:13px 16px;margin-top:5px;display:flex;align-items:center;justify-content:space-between}
.calclbl{font-size:12px;font-weight:700;color:var(--b700)}
.calcval{font-size:20px;font-weight:900;color:var(--b700)}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:700}
.bdot{width:5px;height:5px;border-radius:50%}
.b-blue{background:var(--b100);color:var(--b800)}.b-blue .bdot{background:var(--b500)}
.b-green{background:var(--gr100);color:var(--gr700)}.b-green .bdot{background:var(--gr600)}
.b-red{background:var(--r100);color:var(--r600)}.b-red .bdot{background:var(--r500)}
.b-amber{background:var(--am100);color:var(--am600)}.b-amber .bdot{background:var(--am500)}
.b-gray{background:var(--g100);color:var(--g600)}.b-gray .bdot{background:var(--g400)}

/* STATS */
.sgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:13px;margin-bottom:24px}
.scard{background:var(--white);border:1px solid var(--g200);border-radius:var(--r16);padding:16px 18px;box-shadow:var(--sh)}
.sico{width:38px;height:38px;border-radius:var(--r10);display:flex;align-items:center;justify-content:center;font-size:17px;margin-bottom:10px}
.sval{font-size:26px;font-weight:900;color:var(--g900);line-height:1}
.slbl{font-size:11px;color:var(--g500);margin-top:3px;font-weight:500}

/* DEAL CARD */
.dcard{background:var(--white);border:1px solid var(--g200);border-radius:var(--r16);padding:16px 18px;display:flex;align-items:flex-start;gap:13px;cursor:pointer;transition:all .15s;box-shadow:var(--sh);margin-bottom:10px}
.dcard:hover{border-color:var(--b300);box-shadow:var(--shm);transform:translateY(-1px)}
.dico{width:44px;height:44px;border-radius:var(--r10);background:linear-gradient(135deg,var(--b50),var(--b100));display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;border:1px solid var(--b200)}
.dbody{flex:1;min-width:0}
.dtit{font-size:14px;font-weight:700;color:var(--g900);margin-bottom:2px}
.dmeta{font-size:11px;color:var(--g400);margin-bottom:5px}
.dright{text-align:end;flex-shrink:0}
.dprice{font-size:15px;font-weight:800;color:var(--b700)}
.dpsub{font-size:10px;color:var(--g400);margin-top:2px}
.ptrack{height:5px;background:var(--g100);border-radius:99px;overflow:hidden;margin-top:5px}
.pfill{height:100%;border-radius:99px;transition:width .5s}
.pf-b{background:linear-gradient(90deg,var(--b300),var(--b600))}
.pf-g{background:linear-gradient(90deg,var(--gr600),var(--gr700))}
.plbl{display:flex;justify-content:space-between;font-size:10px;margin-top:3px;color:var(--g500)}

/* INFO */
.igrid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.igrid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px}
.iitem{background:var(--g50);border-radius:var(--r10);padding:11px 13px;border:1px solid var(--g200)}
.ilbl{font-size:10px;font-weight:700;color:var(--g400);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
.ival{font-size:14px;font-weight:700;color:var(--g900)}
.ival.blue{color:var(--b700)}
.isub{font-size:11px;color:var(--g400);margin-top:2px}

/* TABLE */
.ptbl{width:100%;border-collapse:collapse}
.ptbl th{text-align:start;padding:9px 13px;font-size:11px;font-weight:700;color:var(--g500);background:var(--g50);border-bottom:1.5px solid var(--g200)}
.ptbl td{padding:11px 13px;font-size:12.5px;color:var(--g700);border-bottom:1px solid var(--g100);vertical-align:middle}
.ptbl tr:last-child td{border-bottom:none}
.ptbl tr.rpaid{background:linear-gradient(90deg,var(--gr50),var(--white))}
.ptbl tr.rov{background:linear-gradient(90deg,var(--am50),var(--white))}

/* TABS */
.tabbar{display:flex;gap:2px;background:var(--g100);padding:3px;border-radius:var(--r10);margin-bottom:18px;width:fit-content}
.tbn{padding:6px 14px;font-size:12px;font-weight:600;border:none;background:transparent;border-radius:var(--r8);cursor:pointer;color:var(--g500);transition:all .14s;font-family:inherit}
.tbn.active{background:var(--white);color:var(--b700);box-shadow:var(--sh)}

/* AUTH */
.auth-screen{min-height:100vh;background:linear-gradient(145deg,#0f172a,#1e3a5f 40%,#1d4ed8);display:flex;align-items:center;justify-content:center;padding:20px}
.auth-card{background:var(--white);border-radius:var(--r24);box-shadow:0 24px 48px rgba(0,0,0,.15);width:100%;max-width:420px;overflow:hidden}
.ahdr{background:linear-gradient(135deg,var(--b600),var(--b800));padding:30px 30px 26px;text-align:center}
.atitle{font-size:22px;font-weight:900;color:#fff;margin-top:6px}
.asub{font-size:12px;color:rgba(255,255,255,.65);margin-top:3px}
.atabs{display:flex;background:rgba(0,0,0,.25);border-radius:var(--r8);padding:3px;margin-top:16px}
.atab{flex:1;padding:7px;font-size:12px;font-weight:700;border:none;background:transparent;color:rgba(255,255,255,.55);border-radius:6px;cursor:pointer;transition:all .14s;font-family:inherit}
.atab.active{background:rgba(255,255,255,.2);color:#fff}
.abody{padding:26px 28px}
.afoot{padding:13px 28px;background:var(--g50);border-top:1px solid var(--g200);text-align:center;font-size:11px;color:var(--g400);line-height:1.5}
.alert{padding:11px 14px;border-radius:var(--r8);font-size:12px;font-weight:600;margin-bottom:14px;border:1px solid transparent}
.alert-d{background:var(--r50);color:var(--r600);border-color:#fca5a5}

/* MODAL */
.moverlay{position:fixed;inset:0;background:rgba(15,23,42,.55);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
.modal{background:var(--white);border-radius:var(--r20);box-shadow:var(--shl);width:100%;max-width:420px;animation:pi .2s ease}
.mhdr{padding:18px 22px 14px;border-bottom:1px solid var(--g100);display:flex;align-items:center;justify-content:space-between}
.mclose{font-size:17px;cursor:pointer;color:var(--g400);border:none;background:none;padding:4px;border-radius:6px}
.mclose:hover{background:var(--g100)}
.mbody{padding:18px 22px}
.mfoot{padding:14px 22px;border-top:1px solid var(--g100);display:flex;gap:9px;justify-content:flex-end}
.srate{font-size:30px;cursor:pointer;transition:transform .1s;opacity:.35;filter:grayscale(1)}
.srate.active,.srate:hover{opacity:1;filter:none;transform:scale(1.15)}

/* CONTRACT */
.cw{background:var(--white);border:2px solid var(--g200);border-radius:var(--r16);overflow:hidden}
.cwh{background:linear-gradient(135deg,var(--g900),var(--g800));padding:24px 28px;text-align:center;color:#fff}
.cwb{padding:24px 28px}
.cwst{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--g400);margin-bottom:10px;padding-bottom:7px;border-bottom:1.5px solid var(--g100)}
.cwpar{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.cwp{background:var(--g50);border:1px solid var(--g200);border-radius:var(--r10);padding:12px 14px}
.cwpr{font-size:10px;font-weight:700;text-transform:uppercase;color:var(--g400);margin-bottom:5px}
.cwpn{font-size:14px;font-weight:700;color:var(--g900)}
.cwfin{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.cwfi{background:var(--b50);border:1px solid var(--b200);border-radius:var(--r8);padding:11px 13px}
.cwfl{font-size:10px;font-weight:700;text-transform:uppercase;color:var(--b500);margin-bottom:3px}
.cwfv{font-size:15px;font-weight:800;color:var(--b800)}
.cwterms{background:var(--g50);border:1px solid var(--g200);border-radius:var(--r10);padding:14px 16px;font-size:12px;color:var(--g600);line-height:1.85}
.cwterms ol{padding-inline-start:16px}
.cwsig{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:20px}
.cwsg{border-top:1.5px solid var(--g300);padding-top:8px;text-align:center;font-size:11px;color:var(--g400)}
.cwft{padding:14px 28px;background:var(--g50);border-top:2px solid var(--g200);text-align:center;font-size:11px;color:var(--g400);line-height:1.55}

/* TOAST */
.tc{position:fixed;bottom:22px;inset-inline-end:22px;z-index:300;display:flex;flex-direction:column;gap:7px;pointer-events:none}
.toast{display:flex;align-items:center;gap:9px;padding:11px 17px;border-radius:var(--r10);font-size:13px;font-weight:600;box-shadow:var(--shl);pointer-events:auto;min-width:220px;animation:pi .25s ease}
.t-exit{animation:tex .22s ease forwards}
@keyframes tex{to{opacity:0;transform:translateY(8px)}}
.t-s{background:linear-gradient(135deg,var(--gr700),var(--gr600));color:#fff}
.t-e{background:linear-gradient(135deg,var(--r600),#b91c1c);color:#fff}
.t-i{background:linear-gradient(135deg,var(--b700),var(--b600));color:#fff}

/* UTILS */
.disc{background:var(--am50);border:1px solid #fde68a;border-radius:var(--r8);padding:9px 14px;font-size:11px;font-weight:500;color:var(--am600);margin-bottom:18px;display:flex;align-items:center;gap:7px}
.empty{text-align:center;padding:48px 20px;display:flex;flex-direction:column;align-items:center;gap:8px}
.eico{font-size:36px;opacity:.3}
.etit{font-size:15px;font-weight:700;color:var(--g700)}
.divider{height:1px;background:var(--g100);margin:14px 0}
.flex{display:flex}.aic{align-items:center}.jsb{justify-content:space-between}.jce{justify-content:flex-end}
.gap8{gap:8px}.gap10{gap:10px}.gap12{gap:12px}
.mt8{margin-top:8px}.mt12{margin-top:12px}.mt16{margin-top:16px}.mt20{margin-top:20px}
.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}.mb16{margin-bottom:16px}.mb20{margin-bottom:20px}
.text-sm{font-size:12px}.text-xs{font-size:11px}.text-m{color:var(--g500)}.fw7{font-weight:700}
.ptit{font-size:21px;font-weight:800;color:var(--g900);margin-bottom:3px}
.psub{font-size:13px;color:var(--g500);margin-bottom:22px;line-height:1.5}
.shdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:13px;gap:12px}
.stit{font-size:14px;font-weight:700;color:var(--g900)}
.tscroll{overflow-x:auto}
.spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spinDots .7s linear infinite;display:inline-block}

@media(max-width:768px){
  .sidebar{display:none}.page{padding:14px}
  .frow{grid-template-columns:1fr}.sgrid{grid-template-columns:1fr 1fr}
  .igrid,.igrid3,.cwpar,.cwfin,.cwsig{grid-template-columns:1fr}.tabbar{width:100%}
}
@media(max-width:480px){.sgrid{grid-template-columns:1fr}}
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <svg class="spin" viewBox="0 0 120 120" width="100" height="100">
    <g transform="translate(60,60)">
      <rect x="-6" y="-46" width="12" height="12" rx="3" fill="#0d9488"/>
      <rect x="-6" y="-46" width="12" height="12" rx="3" fill="#0d9488" transform="rotate(30)"/>
      <rect x="-6" y="-46" width="12" height="12" rx="3" fill="#0d9488" transform="rotate(60)"/>
      <rect x="-6" y="-46" width="12" height="12" rx="3" fill="#0d9488" transform="rotate(90)"/>
      <rect x="-6" y="-46" width="12" height="12" rx="3" fill="#0d9488" transform="rotate(120)"/>
      <rect x="-6" y="-46" width="12" height="12" rx="3" fill="#0d9488" transform="rotate(150)"/>
      <rect x="-6" y="-46" width="12" height="12" rx="3" fill="#0d9488" transform="rotate(180)"/>
      <rect x="-6" y="-46" width="12" height="12" rx="3" fill="#0d9488" transform="rotate(210)"/>
      <rect x="-6" y="-46" width="12" height="12" rx="3" fill="#0d9488" transform="rotate(240)"/>
      <rect x="-6" y="-46" width="12" height="12" rx="3" fill="#0d9488" transform="rotate(270)"/>
      <rect x="-6" y="-46" width="12" height="12" rx="3" fill="#0d9488" transform="rotate(300)"/>
      <rect x="-6" y="-46" width="12" height="12" rx="3" fill="#0d9488" transform="rotate(330)"/>
    </g>
  </svg>
  <p>جاري التحميل...</p>
</div>

<!-- APP -->
<div id="app"></div>

<!-- RATING MODAL -->
<div class="moverlay hidden" id="rmodal">
  <div class="modal" style="max-width:400px">
    <div class="mhdr"><h3>⭐ تقييم الطرف الآخر</h3><button class="mclose" onclick="closeRM()">✕</button></div>
    <div class="mbody" style="text-align:center">
      <p class="text-m mb12">كيف كانت تجربتك؟</p>
      <div style="display:flex;gap:6px;justify-content:center;margin:14px 0">
        <span class="srate" onclick="setSR(1)" data-v="1">⭐</span>
        <span class="srate" onclick="setSR(2)" data-v="2">⭐</span>
        <span class="srate" onclick="setSR(3)" data-v="3">⭐</span>
        <span class="srate" onclick="setSR(4)" data-v="4">⭐</span>
        <span class="srate" onclick="setSR(5)" data-v="5">⭐</span>
      </div>
      <div class="fg mt12"><textarea class="fc" id="rcomment" rows="2" placeholder="تعليق اختياري..."></textarea></div>
    </div>
    <div class="mfoot">
      <button class="btn bg bsm" onclick="closeRM()">إلغاء</button>
      <button class="btn bp bsm" onclick="submitR()">⭐ إرسال التقييم</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="tc" id="tc"></div>

<script>

function toast(msg,type='i'){
  const el=document.createElement('div')

// ═══ LANG ═══
function applyLang(){
  document.documentElement.dir=isAr()?'rtl':'ltr'
  document.documentElement.lang=lang
  document.body.classList.toggle('en',!isAr())
  document.querySelectorAll('.ar-t').forEach(el=>el.classList.toggle('hidden',!isAr()))
  document.querySelectorAll('.en-t').forEach(el=>el.classList.toggle('hidden',isAr()))
  document.querySelectorAll('[data-lb]').forEach(btn=>btn.textContent=isAr()?'English':'عربي')
  localStorage.setItem('ql',lang)
}
window.toggleLang=()=>{lang=isAr()?'en':'ar';applyLang();rerender()}

window.switchAT=tab=>{
  $('fl')?.classList.toggle('hidden',tab!=='login')
  $('fr')?.classList.toggle('hidden',tab!=='register')
  $('tl')?.classList.toggle('active',tab==='login')
  $('tr')?.classList.toggle('active',tab==='register')
}

function showErr(id,msg){const el=$(id);if(el){el.textContent='⚠️ '+msg;el.classList.remove('hidden')}}

window.doLogin=async()=>{
  const em=$('l-em')?.value.trim().toLowerCase(),pw=$('l-pw')?.value
  $('lerr')?.classList.add('hidden')
  if(!em||!pw){showErr('lerr',isAr()?'يرجى ملء الحقول':'Fill fields');return}
  const btn=$('lbtn');btn.innerHTML='<span class="spinner"></span>';btn.disabled=true
  const{error}=await sb.auth.signInWithPassword({email:em,password:pw})
  if(error){showErr('lerr',isAr()?'البريد أو كلمة المرور غير صحيحة':'Wrong email or password');btn.innerHTML=isAr()?'تسجيل الدخول':'Sign In';btn.disabled=false}
}

window.doRegister=async()=>{
  const nm=$('r-nm')?.value.trim(),em=$('r-em')?.value.trim().toLowerCase()
  const ph=$('r-ph')?.value.trim(),ni=$('r-ni')?.value.trim()
  const pw=$('r-pw')?.value,pw2=$('r-pw2')?.value
  $('rerr')?.classList.add('hidden')
  if(!nm||!em||!pw){showErr('rerr',isAr()?'يرجى ملء الحقول المطلوبة':'Fill required fields');return}
  if(!em.includes('@')){showErr('rerr',isAr()?'البريد غير صالح':'Invalid email');return}
  if(pw.length<6){showErr('rerr',isAr()?'كلمة المرور 6 أحرف على الأقل':'Min 6 chars');return}
  if(pw!==pw2){showErr('rerr',isAr()?'كلمتا المرور غير متطابقتان':'Passwords do not match');return}
  const btn=$('rbtn');btn.innerHTML='<span class="spinner"></span>';btn.disabled=true
  const{data,error}=await sb.auth.signUp({email:em,password:pw,options:{data:{full_name:nm,phone:ph,national_id:ni}}})
  if(error){showErr('rerr',error.message);btn.innerHTML=isAr()?'إنشاء الحساب':'Create Account';btn.disabled=false;return}
  // Auto login after register
  const{error:e2}=await sb.auth.signInWithPassword({email:em,password:pw})
  if(e2){showErr('rerr',isAr()?'تم إنشاء الحساب، سجّل دخول':'Account created, please sign in');btn.innerHTML=isAr()?'إنشاء الحساب':'Create Account';btn.disabled=false}
}

window.doLogout=async()=>{_started=false;await sb.auth.signOut()}

// ═══ NAV ═══
const PT={dash:{ar:'الرئيسية',en:'Dashboard'},create:{ar:'طلب جديد',en:'New Request'},incoming:{ar:'الطلبات الواردة',en:'Incoming'},deals:{ar:'صفقاتي',en:'My Deals'},detail:{ar:'تفاصيل الصفقة',en:'Deal Details'},profile:{ar:'ملفي الشخصي',en:'My Profile'}}
const PAGES=['dash','create','incoming','deals','detail','profile']
let _pp={}

window.nav=async(p,pp={})=>{
  page=p;_pp=pp
  PAGES.forEach(x=>{document.getElementById('pg-'+x)?.classList.add('hidden');document.getElementById('ni-'+x)?.classList.remove('active')})
  document.getElementById('pg-'+p)?.classList.remove('hidden')
  document.getElementById('ni-'+p)?.classList.add('active')
  const tb=$('ptbar');if(tb)tb.textContent=isAr()?(PT[p]?.ar||p):(PT[p]?.en||p)
  updBadge()
  if(p==='dash')rDash()
  if(p==='incoming')rInc()
  if(p==='deals')rDeals()
  if(p==='detail')rDetail(pp.id)
  if(p==='profile')rProfile()
  if(p==='create'){const cd=$('c-date');if(cd&&!cd.value)cd.value=today()}
}

function rerender(){
  applyLang()
  const tb=$('ptbar');if(tb)tb.textContent=isAr()?(PT[page]?.ar||page):(PT[page]?.en||page)
  if(page==='dash')rDash()
  if(page==='incoming')rInc()
  if(page==='deals')rDeals()
  if(page==='profile')rProfile()
  if(page==='detail'&&_pp.id)rDetail(_pp.id)
}

function updBadge(){
  const n=DEALS.filter(d=>d.seller_email===CU?.email&&d.status==='pending').length
  const b=$('ibadge');if(b){b.textContent=n;b.classList.toggle('hidden',n===0)}
}

async function loadSBStars(){
  const{data}=await sb.from('ratings').select('stars').eq('to_email',CU.email)
  const el=$('sbstars');if(!el)return
  if(!data?.length){el.innerHTML=`<span style="font-size:11px;color:var(--g400)">${isAr()?'لا تقييمات':'No ratings'}</span>`;return}
  const avg=Math.round(data.reduce((s,r)=>s+r.stars,0)/data.length*10)/10
  el.innerHTML=stars(avg,data.length,12)
}

async function loadDeals(){
  const{data}=await sb.from('deals').select('*,payments(*)').or(`buyer_id.eq.${CU.id},seller_email.eq.${CU.email}`).order('created_at',{ascending:false})
  DEALS=data||[]
}

// ═══ CALC ═══
window.calcI=()=>{
  const pr=parseFloat($('c-price')?.value)||0,dn=parseFloat($('c-down')?.value)||0,mo=parseInt($('c-mo')?.value)||0
  const v=$('cval'),b=$('cbrk');if(!v)return
  if(pr>0&&mo>0&&dn<pr){const r=pr-dn;v.textContent=fmtSAR(r/mo);if(b)b.textContent=`(${fmtSAR(r)} ÷ ${mo})`}
  else{v.textContent='—';if(b)b.textContent=''}
}

// ═══ SUBMIT ═══
window.submitDeal=async()=>{
  const se=$('c-sel')?.value.trim().toLowerCase(),it=$('c-item')?.value,de=$('c-desc')?.value.trim()
  const pr=parseFloat($('c-price')?.value),dn=parseFloat($('c-down')?.value)||0,mo=parseInt($('c-mo')?.value)
  const no=$('c-notes')?.value.trim(),sd=$('c-date')?.value||today()
  if(!se||!it||!pr||!mo){toast(isAr()?'⚠️ يرجى ملء الحقول المطلوبة':'⚠️ Fill required fields','e');return}
  if(mo<1||mo>60){toast(isAr()?'⚠️ الأشهر بين 1 و60':'⚠️ Months 1-60','e');return}
  if(dn>=pr){toast(isAr()?'⚠️ الدفعة الأولى أقل من السعر':'⚠️ Down < total','e');return}
  if(se===CU.email){toast(isAr()?'⚠️ لا يمكنك إرسال لنفسك':'⚠️ Cannot send to yourself','e');return}
  const btn=$('sbtn');btn.innerHTML='<span class="spinner"></span>';btn.disabled=true
  const inst=Math.round(((pr-dn)/mo)*100)/100
  const{data:deal,error}=await sb.from('deals').insert({contract_num:genCN(),buyer_id:CU.id,buyer_email:CU.email,buyer_name:PRF?.full_name||CU.email.split('@')[0],seller_email:se,item:it,description:de,price:pr,down_payment:dn,months:mo,installment:inst,notes:no,start_date:sd,status:'pending'}).select().single()
  if(error){toast('⚠️ '+error.message,'e');btn.innerHTML='📤 '+(isAr()?'إرسال الطلب':'Send');btn.disabled=false;return}
  const sch=Array.from({length:mo},(_,i)=>({deal_id:deal.id,month_num:i+1,due_date:addM(sd,i+1),amount:inst,is_paid:false}))
  await sb.from('payments').insert(sch)
  ;['c-sel','c-desc','c-price','c-notes'].forEach(id=>{const el=$(id);if(el)el.value=''})
  $('c-item').value='';$('c-down').value='0';$('c-mo').value='';$('c-date').value=today();$('cval').textContent='—'
  toast(isAr()?'✅ تم إرسال الطلب بنجاح!':'✅ Request sent!','s')
  await loadDeals();nav('dash')
}

  const el=$('prfc');if(!el)return
  el.innerHTML=`
    <div class="card mb20">
      <div style="background:linear-gradient(135deg,var(--b600),var(--b800));padding:30px 26px;text-align:center;border-radius:var(--r16) var(--r16) 0 0">
        <div style="width:70px;height:70px;border-radius:50%;background:${color};border:3px solid rgba(255,255,255,.3);display:inline-flex;align-items:center;justify-content:center;font-size:24px;font-weight:900;color:#fff;margin-bottom:11px">${ini(nm)}</div>
        <h2 style="color:#fff;font-size:19px;font-weight:800">${nm}</h2>
        <div style="color:rgba(255,255,255,.65);font-size:12px;margin-top:3px">${CU.email}</div>
        <div style="margin-top:9px">${avg?stars(avg,rats.length,15):`<span style="color:rgba(255,255,255,.5);font-size:11px">${isAr()?'لا تقييمات بعد':'No ratings yet'}</span>`}</div>
      </div>
      <div class="cbody">
        <div class="igrid">
          ${PRF?.phone?`<div class="iitem"><div class="ilbl">${isAr()?'الجوال':'Phone'}</div><div class="ival">${PRF.phone}</div></div>`:''}
          ${PRF?.national_id?`<div class="iitem"><div class="ilbl">${isAr()?'الهوية':'ID'}</div><div class="ival">${PRF.national_id}</div></div>`:''}
          <div class="iitem"><div class="ilbl">${isAr()?'تاريخ الانضمام':'Since'}</div><div class="ival">${fmtD(CU.created_at)}</div></div>
          <div class="iitem"><div class="ilbl">${isAr()?'البريد':'Email'}</div><div class="ival" style="font-size:12px">${CU.email}</div></div>
        </div>
      </div>
    </div>
    <div class="igrid3 mb20">
      <div class="scard"><div class="sico" style="background:#dbeafe">📊</div><div class="sval">${DEALS.length}</div><div class="slbl ar-t">إجمالي الصفقات</div><div class="slbl en-t hidden">Total</div></div>
      <div class="scard"><div class="sico" style="background:#dcfce7">✅</div><div class="sval">${DEALS.filter(d=>d.status==='completed').length}</div><div class="slbl ar-t">مكتملة</div><div class="slbl en-t hidden">Completed</div></div>
      <div class="scard"><div class="sico" style="background:#fef3c7">⭐</div><div class="sval">${avg||'—'}</div><div class="slbl ar-t">متوسط التقييم</div><div class="slbl en-t hidden">Avg Rating</div></div>
    </div>
    <div class="card mb20">
      <div class="chdr"><h2>⭐ ${isAr()?'التقييمات المستلمة':'Reviews'}</h2><span class="badge b-blue">${rats.length}</span></div>
      <div class="cbody">${rats.length?rats.map(r=>`<div style="padding:11px 0;border-bottom:1px solid var(--g100)"><div class="flex aic jsb mb8"><strong class="text-sm">${r.from_name}</strong>${stars(r.stars,1)}</div>${r.comment?`<p class="text-sm text-m">"${r.comment}"</p>`:''}<div class="text-xs text-m mt8">${fmtD(r.created_at)}</div></div>`).join(''):empt('⭐',isAr()?'لا تقييمات بعد':'No reviews yet')}</div>
    </div>
    <div class="disc">⚠️ <span class="ar-t">قسطني منصة وساطة فقط — لا تُجري معاملات مالية</span><span class="en-t hidden">Qastni is mediation only</span></div>`
  applyLang()
}

// ═══ ACTIONS ═══
window.respond=async(id,status)=>{
  const up={status};if(status==='active'){up.accepted_at=new Date().toISOString();up.seller_id=CU.id}else up.rejected_at=new Date().toISOString()
  await sb.from('deals').update(up).eq('id',id)
  await loadDeals();toast(status==='active'?(isAr()?'✅ تمت الموافقة':'✅ Accepted'):(isAr()?'❌ تم الرفض':'❌ Rejected'),status==='active'?'s':'e')
  updBadge();rInc()
}

window.markP=async(did,pid)=>{
  await sb.from('payments').update({is_paid:true,paid_at:new Date().toISOString()}).eq('id',pid)
  const{data:ap}=await sb.from('payments').select('is_paid').eq('deal_id',did)
  const done=ap?.every(p=>p.is_paid)
  if(done)await sb.from('deals').update({status:'completed',completed_at:new Date().toISOString()}).eq('id',did)
  await loadDeals();toast(done?(isAr()?'🎉 اكتملت الصفقة!':'🎉 Completed!'):(isAr()?'💰 تم تسجيل الدفعة':'💰 Payment recorded'),'s')
  rDetail(did)
}

window.printC=id=>{
  const el=document.getElementById('cw-'+id);if(!el)return
  const w=window.open('','_blank','width=800,height=700')
  w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Contract</title><style>body{font-family:Tajawal,sans-serif;direction:${isAr()?'rtl':'ltr'};padding:20px;color:#0f172a}</style></head><body>${el.outerHTML}</body></html>`)
  w.document.close();w.focus();setTimeout(()=>w.print(),500)
}

window.openRM=(did,email)=>{RS={dealId:did,email,stars:0};document.querySelectorAll('.srate').forEach(s=>s.classList.remove('active'));$('rcomment').value='';$('rmodal').classList.remove('hidden')}
window.closeRM=()=>$('rmodal').classList.add('hidden')
window.setSR=val=>{RS.stars=val;document.querySelectorAll('.srate').forEach(s=>s.classList.toggle('active',parseInt(s.dataset.v)<=val))}
window.submitR=async()=>{
  if(!RS.stars){toast(isAr()?'⚠️ اختر عدد النجوم':'⚠️ Select stars','e');return}
  await sb.from('ratings').insert({deal_id:RS.dealId,from_user_id:CU.id,from_email:CU.email,from_name:PRF?.full_name||CU.email.split('@')[0],to_email:RS.email,stars:RS.stars,comment:$('rcomment').value.trim()||null})
  closeRM();toast(isAr()?'⭐ شكراً! تم إرسال تقييمك':'⭐ Rating submitted!','s')
  rDetail(RS.dealId);loadSBStars()
}

// ═══ BOOT ═══
async function startApp(session){
  if(_started)return
  _started=true
  try{
    if(session){
      CU=session.user
      const{data:p}=await sb.from('profiles').select('*').eq('id',CU.id).single()
      PRF=p||{}
      await loadDeals()
      buildShell()
      await nav('dash')
      // Realtime
      sb.channel('qastni-rt').on('postgres_changes',{event:'*',schema:'public',table:'deals'},async()=>{
        await loadDeals();updBadge()
        if(page==='incoming')rInc()
        if(page==='dash')rDash()
        if(page==='deals')rDeals()
      }).subscribe()
    }else{
      $('app').innerHTML=getAuthHTML()
      applyLang()
    }
  }catch(e){
    console.error('Boot error:',e)
    $('app').innerHTML=getAuthHTML()
    applyLang()
  }
  hideSplash()
}

sb.auth.onAuthStateChange(async(event,session)=>{
  if(event==='SIGNED_IN'&&!_started) await startApp(session)
  if(event==='SIGNED_OUT'){_started=false;CU=null;PRF=null;DEALS=[];$('app').innerHTML=getAuthHTML();applyLang()}
  if(event==='TOKEN_REFRESHED'&&session) CU=session.user
})

// Page refresh handler with 5s safety timeout
lang=localStorage.getItem('ql')||'ar'
sb.auth.getSession().then(({data:{session}})=>startApp(session)).catch(()=>startApp(null))
setTimeout(()=>{if(!_started)startApp(null)},5000)
</script>
</body>
</html>
