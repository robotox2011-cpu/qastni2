const PT={dash:{ar:'الرئيسية',en:'Dashboard'},create:{ar:'طلب جديد',en:'New Request'},incoming:{ar:'الطلبات الواردة',en:'Incoming'},deals:{ar:'صفقاتي',en:'My Deals'},detail:{ar:'تفاصيل الصفقة',en:'Deal Details'},profile:{ar:'ملفي الشخصي',en:'My Profile'}}
const PAGES=['dash','create','incoming','deals','detail','profile']
let _pp={}

window.nav=async(p,pp={})=>{
  page=p;_pp=pp
  PAGES.forEach(x=>{document.getElementById('pg-'+x)?.classList.add('hidden');document.getElementById('ni-'+x)?.classList.remove('active')})
  const pgEl=document.getElementById('pg-'+p)
  if(pgEl)pgEl.classList.remove('hidden')
  const niEl=document.getElementById('ni-'+p)
  if(niEl)niEl.classList.add('active')
  const tb=$('ptbar');if(tb)tb.textContent=isAr()?(PT[p]?.ar||p):(PT[p]?.en||p)
  updBadge()
  if(p==='dash')await rDash()
  if(p==='incoming')await rInc()
  if(p==='deals')await rDeals()
  if(p==='detail')await rDetail(pp.id)
  if(p==='profile')await rProfile()
}

function rerender(){
  applyLang()
  const tb=$('ptbar');if(tb)tb.textContent=isAr()?(PT[page]?.ar||page):(PT[page]?.en||page)
  if(page==='dash')rDash()
  if(page==='incoming')rInc()
  if(page==='deals')rDeals()
  if(page==='detail'&&_pp.id)rDetail(_pp.id)
  if(page==='profile')rProfile()
}

function updBadge(){
  const n=DEALS.filter(d=>d.seller_email===CU?.email&&d.status==='pending').length
  const b=$('ibadge');if(b){b.textContent=n;b.classList.toggle('hidden',n===0)}
}

async function loadSBStars(){
  const{data}=await sb.from('ratings').select('stars').eq('to_email',CU.email)
  const el=$('sbstars');if(!el)return
  if(!data?.length){el.innerHTML=`<span style="font-size:11px;color:var(--g400)">${isAr()?'لا تقييمات':'No ratings'}</span>`;return}
  const avg=Math.round(data.reduce((s,r)=>s+r.stars,0)/data.length*10)/10
  el.innerHTML=stars(avg,data.length,12)
}

async function loadDeals(){
  const{data}=await sb.from('deals').select('*,payments(*)').or(`buyer_id.eq.${CU.id},seller_email.eq.${CU.email}`).order('created_at',{ascending:false})
  DEALS=data||[]
}

window.calcI=()=>{
  const pr=parseFloat($('c-price')?.value)||0,dn=parseFloat($('c-down')?.value)||0,mo=parseInt($('c-months')?.value)||0
  const v=$('cval'),b=$('cbrk');if(!v)return
  if(pr>0&&mo>0&&dn<pr){const r=pr-dn;v.textContent=fmtSAR(r/mo);if(b)b.textContent=`(${fmtSAR(r)} ÷ ${mo})`}
  else{v.textContent='—';if(b)b.textContent=''}
}

window.submitDeal=async()=>{
  const se=$('c-seller')?.value.trim().toLowerCase(),it=$('c-item')?.value,de=$('c-desc')?.value.trim()
  const pr=parseFloat($('c-price')?.value),dn=parseFloat($('c-down')?.value)||0,mo=parseInt($('c-months')?.value)
  const no=$('c-notes')?.value.trim(),sd=$('c-date')?.value||today()
  if(!se||!it||!pr||!mo){toast(isAr()?'⚠️ يرجى ملء الحقول المطلوبة':'⚠️ Fill required fields','error');return}
  if(mo<1||mo>60){toast(isAr()?'⚠️ الأشهر بين 1 و60':'⚠️ Months 1-60','error');return}
  if(dn>=pr){toast(isAr()?'⚠️ الدفعة الأولى أقل من السعر':'⚠️ Down < total','error');return}
  if(se===CU.email){toast(isAr()?'⚠️ لا يمكنك إرسال لنفسك':'⚠️ Cannot send to yourself','error');return}
  const btn=$('sbtn');btn.innerHTML='<span class="spinner"></span>';btn.disabled=true
  const inst=Math.round(((pr-dn)/mo)*100)/100
  const{data:deal,error}=await sb.from('deals').insert({contract_num:genCN(),buyer_id:CU.id,buyer_email:CU.email,buyer_name:PRF?.full_name||CU.email.split('@')[0],seller_email:se,item:it,description:de,price:pr,down_payment:dn,months:mo,installment:inst,notes:no,start_date:sd,status:'pending'}).select().single()
  if(error){toast('⚠️ '+error.message,'error');btn.innerHTML='📤 '+(isAr()?'إرسال الطلب':'Send Request');btn.disabled=false;return}
  const sch=Array.from({length:mo},(_,i)=>({deal_id:deal.id,month_num:i+1,due_date:addM(sd,i+1),amount:inst,is_paid:false}))
  await sb.from('payments').insert(sch)
  ;['c-seller','c-desc','c-price','c-notes'].forEach(id=>{const el=$(id);if(el)el.value=''})
  $('c-item').value='';$('c-down').value='0';$('c-months').value='';$('c-date').value=today();$('cval').textContent='—'
  toast(isAr()?'✅ تم إرسال الطلب بنجاح!':'✅ Request sent!','success')
  await loadDeals();await nav('dash')
}

function empt(e,t){return`<div class="empty"><div class="eico">${e}</div><div class="etit">${t}</div></div>`}

function bCard(d){
  const iB=d.buyer_id===CU.id||d.buyer_email===CU.email
  const pay=d.payments||[],paid=pay.filter(p=>p.is_paid).length,tot=d.months||1,pct=Math.round((paid/tot)*100)
  const ot=iB?d.seller_email:d.buyer_name,rl=iB?(isAr()?'إلى:':'To:'):(isAr()?'من:':'From:')
  const pc=pct>=100?'pf-green':'pf-blue'
  return`<div class="dcard" onclick="nav('detail',{id:'${d.id}'})">
    <div class="dicon">${ico(d.item)}</div>
    <div class="dbody">
      <div class="dtitle">${d.item}${d.description?' — '+d.description:''}</div>
      <div class="dmeta">${rl} <strong>${ot}</strong> • ${fmtD(d.created_at)}</div>
      ${d.status==='active'?`<div class="plbl"><span>${paid}/${tot}</span><span>${pct}%</span></div><div class="ptrack"><div class="pfill ${pc}" style="width:${pct}%"></div></div>`:''}
    </div>
    <div class="dright"><div class="dprice">${fmtSAR(d.price)}</div><div class="dpsub">${fmtSAR(d.installment)}/${isAr()?'شهر':'mo'}</div><div style="margin-top:8px">${sbdg(d.status)}</div></div>
  </div>`
}

async function rDash(){
  const nm=PRF?.full_name||CU.email.split('@')[0]
  $('dwelcome').textContent=isAr()?`مرحباً، ${nm} 👋`:`Welcome, ${nm} 👋`
  $('sa').textContent=DEALS.filter(d=>d.status==='active').length
  $('sd').textContent=DEALS.filter(d=>d.status==='completed').length
  $('sp').textContent=DEALS.filter(d=>d.status==='pending').length
  const tv=DEALS.filter(d=>['active','completed'].includes(d.status)).reduce((s,d)=>s+d.price,0)
  $('sv').textContent=tv>=1000?(tv/1000).toFixed(1)+'K':tv
  const r=[...DEALS].slice(0,5)
  $('dl').innerHTML=r.length?r.map(bCard).join(''):empt('📄',isAr()?'لا توجد صفقات بعد':'No deals yet')
}

window.filtD=f=>{
  filt=f;['all','active','pending','completed'].forEach(x=>document.getElementById('t'+x.slice(0,2))?.classList.toggle('active',x===f));rDeals()
}

}

  const nm=PRF?.full_name||CU.email.split('@')[0],color=PRF?.avatar_color||avc(CU.email)
  const{data:rats=[]}=await sb.from('ratings').select('*').eq('to_email',CU.email)
  const avg=rats.length?Math.round(rats.reduce((s,r)=>s+r.stars,0)/rats.length*10)/10:null
  const el=$('prfc');if(!el)return
  el.innerHTML=`<div class="card mb20">
    <div style="background:linear-gradient(135deg,var(--b600),var(--b800));padding:32px 28px;text-align:center;border-radius:var(--r16) var(--r16) 0 0">
      <div style="width:72px;height:72px;border-radius:50%;background:${color};border:3px solid rgba(255,255,255,.3);display:inline-flex;align-items:center;justify-content:center;font-size:26px;font-weight:900;color:#fff;margin-bottom:12px">${ini(nm)}</div>
      <h2 style="color:#fff;font-size:20px;font-weight:800">${nm}</h2>
      <div style="color:rgba(255,255,255,.65);font-size:13px;margin-top:4px">${CU.email}</div>
      <div style="margin-top:10px">${avg?stars(avg,rats.length,16):`<span style="color:rgba(255,255,255,.5);font-size:12px">${isAr()?'لا تقييمات بعد':'No ratings yet'}</span>`}</div>
    </div>
    <div class="cbody"><div class="igrid">
      ${PRF?.phone?`<div class="iitem"><div class="ilbl">${isAr()?'الجوال':'Phone'}</div><div class="ival">${PRF.phone}</div></div>`:''}
      ${PRF?.national_id?`<div class="iitem"><div class="ilbl">${isAr()?'الهوية':'ID'}</div><div class="ival">${PRF.national_id}</div></div>`:''}
      <div class="iitem"><div class="ilbl">${isAr()?'تاريخ الانضمام':'Since'}</div><div class="ival">${fmtD(CU.created_at)}</div></div>
    </div></div>
  </div>
  <div class="igrid3 mb20">
    <div class="scard"><div class="sicon" style="background:#dbeafe">📊</div><div class="sval">${DEALS.length}</div><div class="slbl ar-t">إجمالي الصفقات</div><div class="slbl en-t hidden">Total</div></div>
    <div class="scard"><div class="sicon" style="background:#dcfce7">✅</div><div class="sval">${DEALS.filter(d=>d.status==='completed').length}</div><div class="slbl ar-t">مكتملة</div><div class="slbl en-t hidden">Completed</div></div>
    <div class="scard"><div class="sicon" style="background:#fef3c7">⭐</div><div class="sval">${avg||'—'}</div><div class="slbl ar-t">متوسط التقييم</div><div class="slbl en-t hidden">Avg Rating</div></div>
  </div>
  <div class="card"><div class="chdr"><h2>⭐ ${isAr()?'التقييمات المستلمة':'Reviews'}</h2><span class="badge b-blue">${rats.length}</span></div>
  <div class="cbody">${rats.length?rats.map(r=>`<div style="padding:12px 0;border-bottom:1px solid var(--g100)"><div class="flex aic jsb mb8"><strong class="text-sm">${r.from_name}</strong>${stars(r.stars,1)}</div>${r.comment?`<p class="text-sm text-m">"${r.comment}"</p>`:''}<div class="text-xs text-m mt8">${fmtD(r.created_at)}</div></div>`).join(''):empt('⭐',isAr()?'لا تقييمات بعد':'No reviews yet')}</div></div>`
  applyLang()
}

window.respond=async(id,status)=>{
  const up={status};if(status==='active'){up.accepted_at=new Date().toISOString();up.seller_id=CU.id}else up.rejected_at=new Date().toISOString()
  await sb.from('deals').update(up).eq('id',id)
  await loadDeals();toast(status==='active'?(isAr()?'✅ تمت الموافقة':'✅ Accepted'):(isAr()?'❌ تم الرفض':'❌ Rejected'),status==='active'?'success':'error')
  updBadge();rInc()
}

window.markP=async(did,pid)=>{
  await sb.from('payments').update({is_paid:true,paid_at:new Date().toISOString()}).eq('id',pid)
  const{data:ap}=await sb.from('payments').select('is_paid').eq('deal_id',did)
  const done=ap?.every(p=>p.is_paid)
  if(done)await sb.from('deals').update({status:'completed',completed_at:new Date().toISOString()}).eq('id',did)
  await loadDeals();toast(done?(isAr()?'🎉 اكتملت الصفقة!':'🎉 Deal completed!'):(isAr()?'💰 تم تسجيل الدفعة':'💰 Payment recorded'),'success')
  await rDetail(did)
}

window.printC=id=>{
  const el=document.getElementById('cw-'+id);if(!el)return
  const w=window.open('','_blank','width=800,height=700')
  w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Contract</title><style>body{font-family:Tajawal,sans-serif;direction:${isAr()?'rtl':'ltr'};padding:20px;color:#0f172a}</style></head><body>${el.outerHTML}</body></html>`)
  w.document.close();w.focus();setTimeout(()=>w.print(),500)
}

window.openRM=(did,email)=>{RS={dealId:did,email,stars:0};document.querySelectorAll('.srate').forEach(s=>s.classList.remove('active'));$('rcomment').value='';$('rmodal').classList.remove('hidden')}
window.closeRM=()=>$('rmodal').classList.add('hidden')
window.setSR=val=>{RS.stars=val;document.querySelectorAll('.srate').forEach(s=>s.classList.toggle('active',parseInt(s.dataset.v)<=val))}
window.submitR=async()=>{
  if(!RS.stars){toast(isAr()?'⚠️ اختر عدد النجوم':'⚠️ Select stars','error');return}
  await sb.from('ratings').insert({deal_id:RS.dealId,from_user_id:CU.id,from_email:CU.email,from_name:PRF?.full_name||CU.email.split('@')[0],to_email:RS.email,stars:RS.stars,comment:$('rcomment').value.trim()||null})
  closeRM();toast(isAr()?'⭐ شكراً! تم إرسال تقييمك':'⭐ Rating submitted!','success')
  await rDetail(RS.dealId);loadSBStars()
}

// ════════ BOOT ════════
let _started=false

function hideSplash(){
  const sp=$('splash')
  if(sp){sp.style.opacity='0';setTimeout(()=>{if(sp.parentNode)sp.remove()},400)}
}

async function startApp(session){
  if(_started)return
  _started=true
  try{
    if(session){
      CU=session.user
      const{data:p}=await sb.from('profiles').select('*').eq('id',CU.id).single()
      PRF=p||{}
      await loadDeals()
      buildShell()
      await nav('dash')
      sb.channel('qrt').on('postgres_changes',{event:'*',schema:'public',table:'deals'},async()=>{
        await loadDeals();updBadge()
        if(page==='incoming')rInc()
        if(page==='dash')rDash()
        if(page==='deals')rDeals()
      }).subscribe()
    }else{
      $('app').innerHTML=getAuthHTML()
      applyLang()
    }
  }catch(e){
    $('app').innerHTML=getAuthHTML()
    applyLang()
  }
  hideSplash()
}

// FIX 1: Handle registration - SIGNED_IN fires after signUp
sb.auth.onAuthStateChange(async(event,session)=>{
  if(event==='SIGNED_IN'&&!_started) await startApp(session)
  if(event==='SIGNED_OUT'){
    _started=false;CU=null;PRF=null;DEALS=[]
    $('app').innerHTML=getAuthHTML()
    applyLang()
  }
  if(event==='TOKEN_REFRESHED'&&session) CU=session.user
})

// FIX 2: Handle page refresh
// Boot with timeout fallback
sb.auth.getSession().then(({data:{session}})=>{
  startApp(session)
}).catch(()=>{
  startApp(null)
})
setTimeout(()=>{
  if(!_started) startApp(null)
},4000)([
  sb.auth.getSession(),
  new Promise(resolve=>setTimeout(()=>resolve({data:{session:null}}),5000))
]).then(({data:{session}})=>startApp(session))(({data:{session}})=>startApp(session))
</script>
