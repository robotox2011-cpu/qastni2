<script>
// Register service worker for offline support
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js').then((reg) => {
      Q.log('[Qastni] Service Worker registered:', reg.scope);
    }).catch((err) => {
      Q.warn('[Qastni] Service Worker failed:', err);
    });
  });
}

// ═══ APP MODE: منع التكبير/التصغير (يخلي الموقع كأنه تطبيق native) ═══
// منع pinch zoom على iOS Safari
document.addEventListener('gesturestart',e=>e.preventDefault(),{passive:false});
document.addEventListener('gesturechange',e=>e.preventDefault(),{passive:false});
document.addEventListener('gestureend',e=>e.preventDefault(),{passive:false});

// منع double-tap zoom
let _lastTap=0;
document.addEventListener('touchend',e=>{
  const now=Date.now();
  if(now-_lastTap<350){
    e.preventDefault();
  }
  _lastTap=now;
},{passive:false});
</script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --teal:#0d9488;--teal2:#0f766e;--teal3:#ccfbf1;
  --b600:#2563eb;--b700:#1d4ed8;--b800:#1e40af;--b50:#eff6ff;--b100:#dbeafe;--b200:#bfdbfe;--b500:#3b82f6;
  --g50:#f8fafc;--g100:#f1f5f9;--g200:#e2e8f0;--g300:#cbd5e1;--g400:#94a3b8;--g500:#64748b;--g600:#475569;--g700:#334155;--g800:#1e293b;--g900:#0f172a;
  --gr50:#f0fdf4;--gr100:#dcfce7;--gr600:#16a34a;--gr700:#15803d;
  --r50:#fef2f2;--r100:#fee2e2;--r500:#ef4444;--r600:#dc2626;
  --am50:#fffbeb;--am100:#fef3c7;--am500:#f59e0b;--am600:#d97706;
  --white:#fff;
  /* Surfaces — adapt for dark mode */
  --bg-page:#f8fafc;
  --bg-card:#fff;
  --bg-elevated:#fff;
  --bg-input:#fff;
  --bg-hover:#f1f5f9;
  --border:#e2e8f0;
  --border-soft:#f1f5f9;
  --text-primary:#0f172a;
  --text-secondary:#475569;
  --text-muted:#94a3b8;
  --sh:0 1px 3px rgba(0,0,0,.07);--shm:0 4px 16px rgba(0,0,0,.09);--shl:0 12px 32px rgba(0,0,0,.11);
  --r8:8px;--r10:10px;--r12:12px;--r16:16px;--r20:20px;--r24:24px;
}
html.dark{
  --teal3:#134e4a;
  --bg-page:#0a1414;
  --bg-card:#0f1f1f;
  --bg-elevated:#162a2a;
  --bg-input:#0f1f1f;
  --bg-hover:#1a3030;
  --border:#1f3838;
  --border-soft:#16282a;
  --text-primary:#f0fdfa;
  --text-secondary:#a7c4c2;
  --text-muted:#6b8888;
  --g50:#0a1414;
  --g100:#162a2a;
  --g200:#1f3838;
  --g300:#2d4848;
  --g400:#5d7878;
  --g500:#7a9595;
  --g600:#a0bdbd;
  --g700:#c0d8d8;
  --g800:#dceaea;
  --g900:#f0fdfa;
  --white:#0f1f1f;
  --sh:0 1px 3px rgba(0,0,0,.4);--shm:0 4px 16px rgba(0,0,0,.5);--shl:0 12px 32px rgba(0,0,0,.6);
}
html.dark body{background:var(--bg-page);color:var(--text-primary)}
html.dark .card,html.dark .menu-modal,html.dark .pmodal,html.dark .nafath-card,html.dark .scard{background:var(--bg-card);border-color:var(--border)}
html.dark .fc,html.dark .pcard-input,html.dark .iitem,html.dark .pm-row{background:var(--bg-input);border-color:var(--border);color:var(--text-primary)}
html.dark .fc:focus,html.dark .pcard-input:focus{background:var(--bg-elevated)}
html.dark .menu-item:hover,html.dark .pm-row:hover{background:var(--bg-hover)}
html.dark .menu-divider{background:var(--border-soft)}
html.dark .badge,html.dark .b-gray{background:var(--bg-hover);color:var(--text-secondary)}
html.dark .ptbl thead{background:var(--bg-hover)}
html.dark .ptbl td,html.dark .ptbl th{border-color:var(--border-soft)}
html.dark .ptbl tr.rpaid{background:rgba(22,163,74,.08)}
html.dark .ptbl tr.rov{background:rgba(220,38,38,.08)}
html.dark .upub-page{background:linear-gradient(180deg,var(--bg-page) 0%,var(--bg-card) 50%)}
html.dark .upub-stats-grid,html.dark .upub-card{background:var(--bg-card);border-color:var(--border)}
html.dark .upub-info-row{border-color:var(--border-soft)}
html.dark .prem-page{background:linear-gradient(180deg,var(--bg-page) 0%,#0d2424 100%)}
html.dark .prem-card,html.dark .prem-card-body{background:var(--bg-card)}
html.dark .prem-card-body .prem-feat{border-color:var(--border-soft)}
html.dark .promo-mini{background:linear-gradient(135deg,#3a2d12,#2a2010);color:#fde68a;border-color:#5c4520}
html.dark .vbadge{background:linear-gradient(135deg,#3a2d12,#2a2010);color:#fde68a;border-color:#5c4520}
html.dark .pm-section-title,html.dark .pamt-lbl{color:var(--text-secondary)}
html.dark .pamt-box{background:var(--bg-elevated);border-color:var(--border)}
html.dark .pbreakdown{background:var(--bg-elevated);border-color:var(--border)}
html.dark .psandbox{background:#3a2d12;color:#fde68a;border-color:#5c4520}
html.dark .pm-security{background:var(--bg-elevated);border-color:var(--border-soft)}
html.dark .sec-item{color:var(--text-muted)}
html.dark .nafath-cost{background:#0d2828;color:#a7c4c2;border-color:var(--border)}
html.dark .nafath-step{border-color:var(--border-soft)}
html.dark .upub-foot-note{background:var(--bg-elevated);color:var(--text-muted)}
html.dark .upub-rating-card{background:var(--bg-elevated);border-color:var(--border)}
html.dark .upub-rating-card[style*="background:var(--g50)"]{background:var(--bg-elevated)!important}
html.dark .upub-trust{background:linear-gradient(135deg,#0a2818 0%,var(--bg-card) 100%);border-color:#1a4a30}
html.dark .upub-trust.unverif{background:linear-gradient(135deg,#2a2010 0%,var(--bg-card) 100%);border-color:#5c4520}
html.dark .deal-card.has-premium{background:linear-gradient(135deg,#2a2010 0%,var(--bg-card) 100%);border-color:#5c4520}
html.dark input[type="checkbox"].mp-check{accent-color:var(--teal)}
html.dark .qshine{background:radial-gradient(circle,rgba(94,234,212,.85) 0%,rgba(13,148,136,.4) 40%,transparent 70%)}
html.dark .splash-screen{background:var(--bg-page)}
html.dark .ihdr,html.dark .ptit,html.dark h1,html.dark h2,html.dark h3,html.dark .mlbl{color:var(--text-primary)}
html.dark .psub,html.dark .text-m,html.dark .msub{color:var(--text-secondary)}
html.dark .mp-bar{background:var(--bg-elevated);box-shadow:0 12px 32px rgba(0,0,0,.5),0 0 0 1px var(--border)}

/* Number input arrows — styled for both light and dark modes */
.fc[type="number"]::-webkit-inner-spin-button,
.fc[type="number"]::-webkit-outer-spin-button{
  -webkit-appearance:none;
  appearance:none;
  margin:0
}
.fc[type="number"]{-moz-appearance:textfield}

/* Custom number stepper wrapper — applied via JS or just hide native */
.num-wrap{position:relative}
.num-wrap input[type="number"]{padding-inline-end:36px!important}
.num-wrap .num-steppers{
  position:absolute;
  top:50%;transform:translateY(-50%);
  inset-inline-end:6px;
  display:flex;flex-direction:column;
  gap:2px;
  pointer-events:none
}
.num-wrap .num-step{
  width:24px;height:18px;
  background:var(--g100);
  color:var(--g600);
  border:none;
  border-radius:6px;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:900;
  line-height:1;
  transition:all .12s;
  pointer-events:auto;
  font-family:inherit
}
.num-wrap .num-step:hover{background:var(--teal3);color:var(--teal2)}
.num-wrap .num-step:active{transform:scale(.92)}
html.dark .num-wrap .num-step{background:var(--bg-elevated);color:var(--text-secondary);border:1px solid var(--border)}
html.dark .num-wrap .num-step:hover{background:rgba(20,184,166,.15);color:#5eead4;border-color:rgba(20,184,166,.3)}

/* Calc box — adapt to dark, no harsh glow */
html.dark .calcbox{background:linear-gradient(135deg,rgba(20,184,166,.12) 0%,rgba(13,148,136,.06) 100%)!important;border-color:rgba(20,184,166,.25)!important}
html.dark .calclbl{color:#5eead4!important}
html.dark .calcval{color:#5eead4!important}
html.dark .calcbox div[style*="color:var(--teal)"]{color:#5eead4!important}

/* Multi-pay tip banner */
.multipay-tip{background:#f0fdfa;color:#115e59}
html.dark .multipay-tip{background:rgba(20,184,166,.08);color:#5eead4;border-color:rgba(20,184,166,.2)!important}

/* Contract — Financial details boxes (السلعة، السعر، الدفعة، القسط) */
html.dark .cwfi{background:rgba(20,184,166,.08);border-color:rgba(20,184,166,.18)}
html.dark .cwfl{color:#5eead4!important}
html.dark .cwfv{color:#5eead4!important}

/* Contract — Header & body backgrounds */
html.dark .cw{background:var(--bg-card);border-color:var(--border)}
html.dark .cwh{background:linear-gradient(135deg,#0a1f1f 0%,#0d2828 100%)}
html.dark .cwb{background:var(--bg-card);color:var(--text-primary)}
html.dark .cwst{color:#5eead4}
html.dark .cwp{background:var(--bg-elevated);border-color:var(--border)}
html.dark .cwpr{color:var(--text-muted)}
html.dark .cwpn{color:var(--text-primary)}
html.dark .cwterms{color:var(--text-secondary)}
html.dark .cwsig{border-color:var(--border-soft)}
html.dark .cwsg{color:var(--text-secondary)}
html.dark .cwft{background:var(--bg-elevated);color:var(--text-muted);border-color:var(--border-soft)}

/* Teal value text — readable in dark mode */
html.dark .ival.teal{color:#5eead4!important}

/* iitem cards — soft teal background in dark mode */
html.dark .iitem{background:rgba(20,184,166,.06);border-color:rgba(20,184,166,.18)}

/* Multi-pay checkboxes — round, soft, larger */
.ptbl input[type="checkbox"].mp-check{
  -webkit-appearance:none;appearance:none;
  width:22px!important;height:22px!important;
  border-radius:7px!important;
  border:2px solid var(--g300)!important;
  background:#fff!important;
  cursor:pointer;
  display:inline-block;vertical-align:middle;
  position:relative;
  transition:all .15s;
  margin:0;
  flex-shrink:0
}
.ptbl input[type="checkbox"].mp-check:hover{border-color:var(--teal)!important}
.ptbl input[type="checkbox"].mp-check:checked{
  background:var(--teal)!important;
  border-color:var(--teal)!important
}
.ptbl input[type="checkbox"].mp-check:checked::after{
  content:'';
  position:absolute;
  top:3px;left:7px;
  width:5px;height:10px;
  border:solid #fff;
  border-width:0 2.5px 2.5px 0;
  transform:rotate(45deg)
}
html.dark .ptbl input[type="checkbox"].mp-check{
  background:var(--bg-elevated)!important;
  border-color:var(--border)!important
}
html.dark .ptbl input[type="checkbox"].mp-check:hover{border-color:#5eead4!important}
html.dark .ptbl input[type="checkbox"].mp-check:checked{
  background:#5eead4!important;
  border-color:#5eead4!important
}
html.dark .ptbl input[type="checkbox"].mp-check:checked::after{
  border-color:#0a1414
}

/* ═══════════════════════════════════════════════════════════
   🎬 ONBOARDING TUTORIAL — السينمائي الفخم بطابع قسطني
   ═══════════════════════════════════════════════════════════ */
.onb-overlay{position:fixed;inset:0;z-index:99999;background:#0a1414;display:flex;align-items:center;justify-content:center;overflow:hidden;animation:onbFadeIn .6s ease}
@keyframes onbFadeIn{from{opacity:0}to{opacity:1}}

/* الخلفية المتحركة الفخمة */
.onb-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 20% 30%,rgba(13,148,136,.4) 0%,transparent 50%),radial-gradient(ellipse at 80% 70%,rgba(94,234,212,.25) 0%,transparent 50%),linear-gradient(135deg,#051818 0%,#0a1414 50%,#0d2828 100%);animation:onbBgShift 20s ease-in-out infinite}
@keyframes onbBgShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}

/* Particles ذهبية متحركة */
.onb-particles{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.onb-particle{position:absolute;width:6px;height:6px;background:radial-gradient(circle,rgba(251,191,36,.95) 0%,rgba(251,191,36,.3) 50%,transparent 100%);border-radius:50%;filter:blur(.5px);box-shadow:0 0 10px rgba(251,191,36,.6)}
@keyframes particleFloat{
  0%{transform:translate(0,0) scale(0);opacity:0}
  10%{opacity:1;transform:translate(0,-20px) scale(1)}
  90%{opacity:.8}
  100%{transform:translate(var(--px),-100vh) scale(.5);opacity:0}
}

/* شريط التقدم السينمائي */
.onb-progress{position:absolute;top:0;left:0;right:0;height:3px;background:rgba(255,255,255,.08);z-index:5}
.onb-progress-fill{height:100%;background:linear-gradient(90deg,#5eead4,#fbbf24,#5eead4);background-size:200% 100%;transition:width .6s cubic-bezier(.34,1.56,.64,1);animation:onbProgressShine 2s linear infinite;box-shadow:0 0 12px rgba(94,234,212,.6)}
@keyframes onbProgressShine{0%{background-position:0% 50%}100%{background-position:200% 50%}}

/* زر التخطي */
.onb-skip{position:absolute;top:18px;inset-inline-end:18px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.7);padding:7px 16px;border-radius:99px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;backdrop-filter:blur(8px);z-index:10;transition:all .2s}
.onb-skip:hover{background:rgba(255,255,255,.15);color:#fff}

/* المحتوى الرئيسي */
.onb-content{position:relative;width:100%;max-width:520px;padding:28px;text-align:center;z-index:3;animation:onbContentFloat 4s ease-in-out infinite}
@keyframes onbContentFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

/* الرسوم التوضيحية */
.onb-hero{display:flex;align-items:center;justify-content:center;margin-bottom:32px;position:relative;height:200px}

/* الشعار السينمائي */
.onb-logo{position:relative;width:160px;height:160px;animation:onbLogoEntry 1.5s cubic-bezier(.34,1.56,.64,1)}
@keyframes onbLogoEntry{
  0%{transform:scale(0) rotate(-180deg);opacity:0}
  60%{transform:scale(1.15) rotate(20deg);opacity:1}
  100%{transform:scale(1) rotate(0);opacity:1}
}
.onb-logo svg{width:100%;height:100%;filter:drop-shadow(0 0 24px rgba(94,234,212,.5))}
.onb-logo-glow{position:absolute;inset:-20px;background:radial-gradient(circle,rgba(94,234,212,.4) 0%,transparent 70%);filter:blur(20px);animation:onbGlowPulse 3s ease-in-out infinite;z-index:-1}
@keyframes onbGlowPulse{0%,100%{transform:scale(1);opacity:.6}50%{transform:scale(1.2);opacity:1}}

/* النصوص */
.onb-title{font-family:'Tajawal',sans-serif;font-size:36px;font-weight:900;color:#fff;margin-bottom:16px;letter-spacing:0;line-height:1.2;background:linear-gradient(135deg,#fff 0%,#a7f3d0 50%,#5eead4 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:onbTextReveal 1s ease-out .3s both;text-shadow:0 0 40px rgba(94,234,212,.3)}
@keyframes onbTextReveal{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}

.onb-subtitle{font-size:16px;color:rgba(255,255,255,.85);line-height:1.7;margin-bottom:36px;animation:onbTextReveal 1s ease-out .5s both;font-weight:500}

/* بطاقة الميزات */
.onb-cards{display:flex;flex-direction:column;gap:14px;margin-bottom:32px;animation:onbTextReveal 1s ease-out .7s both}
.onb-card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:14px 18px;display:flex;align-items:center;gap:14px;backdrop-filter:blur(10px);transition:all .3s;text-align:start}
.onb-card:hover{background:rgba(255,255,255,.1);transform:translateY(-2px);border-color:rgba(94,234,212,.4)}
.onb-card-ico{width:46px;height:46px;background:linear-gradient(135deg,rgba(94,234,212,.2),rgba(13,148,136,.4));border:1px solid rgba(94,234,212,.3);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;box-shadow:0 4px 12px rgba(13,148,136,.3)}
.onb-card-text{flex:1;min-width:0}
.onb-card-title{font-size:14px;font-weight:800;color:#fff;margin-bottom:3px}
.onb-card-desc{font-size:12px;color:rgba(255,255,255,.65);line-height:1.5}

/* الدروع والشعارات الحكومية */
.onb-shields{display:flex;justify-content:center;gap:18px;margin-bottom:28px;flex-wrap:wrap;animation:onbTextReveal 1s ease-out .6s both}
.onb-shield{padding:8px 16px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);border-radius:99px;font-size:11.5px;font-weight:700;color:rgba(255,255,255,.85);display:inline-flex;align-items:center;gap:6px;backdrop-filter:blur(10px)}
.onb-shield-icon{font-size:14px}

/* الأزرار */
.onb-actions{display:flex;align-items:center;justify-content:center;gap:12px;animation:onbTextReveal 1s ease-out .9s both}
.onb-btn{padding:14px 30px;font-family:'Tajawal',sans-serif;font-size:15px;font-weight:800;border-radius:99px;border:none;cursor:pointer;transition:all .3s;display:inline-flex;align-items:center;gap:10px;letter-spacing:0}
.onb-btn-primary{background:linear-gradient(135deg,#0d9488 0%,#0f766e 100%);color:#fff;box-shadow:0 8px 24px rgba(13,148,136,.5),inset 0 1px 0 rgba(255,255,255,.2);position:relative;overflow:hidden}
.onb-btn-primary::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.3),transparent);animation:onbBtnShine 3s ease-in-out infinite}
@keyframes onbBtnShine{0%{left:-100%}50%,100%{left:200%}}
.onb-btn-primary:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(13,148,136,.7)}
.onb-btn-primary:active{transform:translateY(0)}

.onb-btn-final{background:linear-gradient(135deg,#fbbf24 0%,#f59e0b 50%,#d97706 100%);color:#1a0e00;box-shadow:0 8px 24px rgba(251,191,36,.5),inset 0 1px 0 rgba(255,255,255,.4),0 0 0 0 rgba(251,191,36,.4);font-size:16px;padding:16px 36px;animation:onbBtnGlow 2s ease-in-out infinite}
@keyframes onbBtnGlow{0%,100%{box-shadow:0 8px 24px rgba(251,191,36,.5),inset 0 1px 0 rgba(255,255,255,.4),0 0 0 0 rgba(251,191,36,.6)}50%{box-shadow:0 12px 32px rgba(251,191,36,.7),inset 0 1px 0 rgba(255,255,255,.4),0 0 0 14px rgba(251,191,36,0)}}

.onb-btn-back{background:rgba(255,255,255,.08);color:rgba(255,255,255,.7);border:1px solid rgba(255,255,255,.15);padding:14px 22px}
.onb-btn-back:hover{background:rgba(255,255,255,.12);color:#fff}

/* النقاط المؤشرة */
.onb-dots{display:flex;justify-content:center;gap:8px;margin-top:24px;animation:onbTextReveal 1s ease-out 1.1s both}
.onb-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.25);transition:all .4s cubic-bezier(.34,1.56,.64,1);cursor:pointer}
.onb-dot.active{background:#5eead4;width:32px;border-radius:99px;box-shadow:0 0 14px rgba(94,234,212,.6)}

/* رسوم توضيحية متحركة */
.onb-illust{width:140px;height:140px;margin:0 auto;position:relative}
.onb-illust svg{width:100%;height:100%;filter:drop-shadow(0 8px 20px rgba(94,234,212,.3))}

/* الموبايل */
@media(max-width:480px){
  .onb-content{padding:20px}
  .onb-title{font-size:28px}
  .onb-subtitle{font-size:14px}
  .onb-logo{width:130px;height:130px}
  .onb-hero{height:160px;margin-bottom:24px}
  .onb-card{padding:12px 14px;gap:12px}
  .onb-card-ico{width:40px;height:40px;font-size:19px;border-radius:12px}
  .onb-card-title{font-size:13px}
  .onb-card-desc{font-size:11px}
  .onb-btn{padding:12px 24px;font-size:14px}
  .onb-btn-final{font-size:15px;padding:14px 30px}
  .onb-shields{gap:8px}
  .onb-shield{padding:6px 12px;font-size:10.5px}
}

/* ═══════════════════════════════════════════════════════════
   📲 APP INSTALL BANNER
   ═══════════════════════════════════════════════════════════ */
.install-banner{position:fixed;bottom:80px;inset-inline-start:14px;inset-inline-end:14px;background:linear-gradient(135deg,#0f2a2a 0%,#0f766e 50%,#0d9488 100%);color:#fff;border-radius:18px;padding:14px 16px;box-shadow:0 14px 40px rgba(13,148,136,.4),0 0 0 1px rgba(94,234,212,.3);z-index:80;display:flex;align-items:center;gap:12px;animation:installSlide .5s cubic-bezier(.34,1.56,.64,1);max-width:480px;margin:0 auto;backdrop-filter:blur(10px)}
.install-banner::before{content:'';position:absolute;top:-30px;inset-inline-end:-30px;width:120px;height:120px;background:radial-gradient(circle,rgba(94,234,212,.3),transparent 70%);border-radius:50%;pointer-events:none}
@keyframes installSlide{from{opacity:0;transform:translateY(120%)}to{opacity:1;transform:none}}

@media(min-width:768px){.install-banner{inset-inline-end:20px;inset-inline-start:auto;width:380px;bottom:20px}}

.install-banner-icon{flex-shrink:0;width:48px;height:48px;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.25);border-radius:14px;display:flex;align-items:center;justify-content:center;position:relative;z-index:1}
.install-banner-content{flex:1;min-width:0;position:relative;z-index:1}
.install-banner-title{font-size:14px;font-weight:800;margin-bottom:3px;line-height:1.2}
.install-banner-desc{font-size:11.5px;color:rgba(255,255,255,.85);line-height:1.4}
.install-banner-actions{display:flex;flex-direction:column;gap:5px;flex-shrink:0;position:relative;z-index:1}
.install-banner-btn{background:#fff;color:#0f766e;border:none;padding:7px 14px;border-radius:99px;font-size:11px;font-weight:800;cursor:pointer;font-family:inherit;white-space:nowrap}
.install-banner-btn:hover{transform:translateY(-1px);box-shadow:0 4px 10px rgba(0,0,0,.15)}
.install-banner-close{background:rgba(255,255,255,.1);color:rgba(255,255,255,.7);border:none;padding:5px 10px;border-radius:99px;font-size:10px;cursor:pointer;font-family:inherit;white-space:nowrap}
.install-banner-close:hover{background:rgba(255,255,255,.2);color:#fff}

/* ═══════════════════════════════════════════════════════════
   🔔 NOTIFICATIONS BELL & DROPDOWN
   ═══════════════════════════════════════════════════════════ */
.notif-btn{position:relative;background:none;border:none;cursor:pointer;width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;transition:all .15s;font-size:18px}
.notif-btn:hover{background:var(--g100)}
html.dark .notif-btn:hover{background:var(--bg-elevated)}
.notif-dot{position:absolute;top:6px;inset-inline-end:6px;width:9px;height:9px;background:#dc2626;border:2px solid #fff;border-radius:50%;box-shadow:0 0 0 0 rgba(220,38,38,.6);animation:notifPulse 2s ease-in-out infinite}
html.dark .notif-dot{border-color:var(--bg-card)}
@keyframes notifPulse{0%,100%{box-shadow:0 0 0 0 rgba(220,38,38,.6)}50%{box-shadow:0 0 0 6px rgba(220,38,38,0)}}

.notif-dropdown{position:absolute;top:48px;inset-inline-end:8px;background:#fff;border:1px solid var(--g200);border-radius:16px;box-shadow:0 14px 40px rgba(15,42,42,.18);width:340px;max-width:calc(100vw - 28px);max-height:480px;overflow-y:auto;z-index:200;animation:notifDropIn .25s cubic-bezier(.34,1.56,.64,1)}
html.dark .notif-dropdown{background:var(--bg-card);border-color:var(--border)}
@keyframes notifDropIn{from{opacity:0;transform:translateY(-10px) scale(.95)}to{opacity:1;transform:none}}

.notif-header{padding:14px 18px 12px;border-bottom:1px solid var(--g100);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;border-radius:16px 16px 0 0;z-index:2}
html.dark .notif-header{background:var(--bg-card);border-color:var(--border-soft)}
.notif-header-title{font-size:14px;font-weight:800;color:var(--g900)}
html.dark .notif-header-title{color:var(--text-primary)}
.notif-mark-read{font-size:11px;color:var(--teal2);font-weight:700;background:none;border:none;cursor:pointer;font-family:inherit;padding:4px 8px;border-radius:6px;transition:background .15s}
.notif-mark-read:hover{background:var(--teal3)}
html.dark .notif-mark-read{color:#5eead4}

.notif-list{display:flex;flex-direction:column}
.notif-item{padding:12px 18px;display:flex;align-items:flex-start;gap:11px;border-bottom:1px solid var(--g100);transition:background .15s;cursor:pointer;position:relative}
html.dark .notif-item{border-color:var(--border-soft)}
.notif-item:last-child{border-bottom:none}
.notif-item:hover{background:var(--g50)}
html.dark .notif-item:hover{background:var(--bg-hover)}
.notif-item.unread{background:linear-gradient(90deg,rgba(13,148,136,.08) 0%,transparent 100%)}
html.dark .notif-item.unread{background:linear-gradient(90deg,rgba(94,234,212,.08) 0%,transparent 100%)}
.notif-item.unread::before{content:'';position:absolute;top:50%;inset-inline-start:6px;transform:translateY(-50%);width:6px;height:6px;background:#0d9488;border-radius:50%}
html.dark .notif-item.unread::before{background:#5eead4}

.notif-ico{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:17px;background:var(--teal3);color:var(--teal2)}
html.dark .notif-ico{background:rgba(94,234,212,.15);color:#5eead4}
.notif-ico.success{background:#dcfce7;color:#16a34a}
html.dark .notif-ico.success{background:rgba(34,197,94,.15);color:#86efac}
.notif-ico.warning{background:#fef3c7;color:#d97706}
html.dark .notif-ico.warning{background:rgba(245,158,11,.15);color:#fbbf24}
.notif-ico.danger{background:#fee2e2;color:#dc2626}
html.dark .notif-ico.danger{background:rgba(239,68,68,.15);color:#fca5a5}

.notif-body{flex:1;min-width:0}
.notif-text{font-size:12.5px;font-weight:600;color:var(--g800);line-height:1.5;margin-bottom:2px}
html.dark .notif-text{color:var(--text-primary)}
.notif-time{font-size:10.5px;color:var(--g400)}
html.dark .notif-time{color:var(--text-muted)}

.notif-empty{padding:36px 20px;text-align:center;color:var(--g400);font-size:12.5px}
.notif-empty-ico{font-size:36px;margin-bottom:8px;opacity:.5}

.feed-card{background:#fff;border:1px solid var(--g200);border-radius:var(--r16);overflow:hidden;margin-bottom:18px;box-shadow:var(--sh)}

.feed-header{padding:14px 18px 12px;border-bottom:1px solid var(--g100);display:flex;align-items:center;gap:10px}

html.dark .feed-ico.warning{background:rgba(245,158,11,.15);color:#fbbf24}

.feed-text{font-size:12.5px;font-weight:600;color:var(--g800);line-height:1.55}

/* ═══════════════════════════════════════════════════════════
   🚀 NEW SELLER ONBOARDING (Dashboard widget)
   ═══════════════════════════════════════════════════════════ */
.seller-onb{background:linear-gradient(135deg,#0f2a2a 0%,#0d9488 100%);color:#fff;border-radius:20px;padding:24px;margin-bottom:20px;position:relative;overflow:hidden;box-shadow:0 14px 36px rgba(13,148,136,.3)}
.seller-onb::before{content:'';position:absolute;top:-60px;inset-inline-end:-60px;width:200px;height:200px;background:radial-gradient(circle,rgba(94,234,212,.25),transparent 70%);border-radius:50%}
.seller-onb::after{content:'';position:absolute;bottom:-40px;inset-inline-start:-40px;width:150px;height:150px;background:radial-gradient(circle,rgba(255,255,255,.1),transparent 70%);border-radius:50%}
.seller-onb-content{position:relative;z-index:1}
.seller-onb-header{display:flex;align-items:center;gap:14px;margin-bottom:18px}
.seller-onb-emoji{font-size:36px;animation:wave 2s ease-in-out infinite;transform-origin:70% 70%}
@keyframes wave{0%,100%{transform:rotate(0)}10%,30%{transform:rotate(14deg)}20%,40%{transform:rotate(-8deg)}50%{transform:rotate(0)}}
.seller-onb-title{font-size:18px;font-weight:900;margin-bottom:4px;line-height:1.2}
.seller-onb-subtitle{font-size:12.5px;color:rgba(255,255,255,.85);line-height:1.5}
.seller-onb-progress{height:6px;background:rgba(255,255,255,.15);border-radius:99px;overflow:hidden;margin-bottom:16px}

.seller-onb-steps{display:flex;flex-direction:column;gap:10px}

.seller-onb-step:hover{background:rgba(255,255,255,.15);transform:translateY(-1px);border-color:rgba(94,234,212,.4)}

.seller-onb-step.done .seller-onb-step-num{background:#22c55e;border-color:#22c55e}

.seller-onb-step-title{font-size:13px;font-weight:800;margin-bottom:1px}
.seller-onb-step-desc{font-size:11px;color:rgba(255,255,255,.75);line-height:1.4}
.seller-onb-step-arrow{font-size:18px;opacity:.6;flex-shrink:0}
.seller-onb-step.done .seller-onb-step-arrow{display:none}

/* ═══════════════════════════════════════════════════════════
   🧮 PUBLIC CALCULATOR (محذوفة)
   ═══════════════════════════════════════════════════════════ */

/* ═══════════════════════════════════════════════════════════════════════
   🌌 QASTNI CINEMATIC UI SYSTEM v2.0 — مستوى عالمي
   ═══════════════════════════════════════════════════════════════════════ */

/* ═══ Mesh Gradient Background — خلفية متحركة أسطورية ═══ */
.mesh-bg{position:fixed;inset:0;z-index:-1;pointer-events:none;overflow:hidden}
.mesh-bg::before{
  content:'';
  position:absolute;
  inset:-50%;
  background:
    radial-gradient(at 27% 37%,#ccfbf1 0,transparent 50%),
    radial-gradient(at 97% 21%,#a7f3d0 0,transparent 50%),
    radial-gradient(at 52% 99%,#5eead4 0,transparent 50%),
    radial-gradient(at 10% 29%,#0d9488 0,transparent 50%),
    radial-gradient(at 97% 96%,#0f766e 0,transparent 50%),
    radial-gradient(at 33% 50%,#fef3c7 0,transparent 50%),
    radial-gradient(at 79% 53%,#5eead4 0,transparent 50%);
  filter:blur(100px) saturate(1.5);
  opacity:.18;
  animation:meshShift 30s ease-in-out infinite alternate;
}
@keyframes meshShift{
  0%{transform:translate(0,0) rotate(0deg) scale(1)}
  33%{transform:translate(-3%,2%) rotate(2deg) scale(1.05)}
  66%{transform:translate(3%,-2%) rotate(-2deg) scale(.95)}
  100%{transform:translate(0,0) rotate(0deg) scale(1)}
}

html.dark .mesh-bg::before{
  background:
    radial-gradient(at 27% 37%,#0d9488 0,transparent 50%),
    radial-gradient(at 97% 21%,#0f766e 0,transparent 50%),
    radial-gradient(at 52% 99%,#5eead4 0,transparent 50%),
    radial-gradient(at 10% 29%,#134e4a 0,transparent 50%),
    radial-gradient(at 97% 96%,#0a3838 0,transparent 50%),
    radial-gradient(at 33% 50%,#fbbf24 0,transparent 50%),
    radial-gradient(at 79% 53%,#5eead4 0,transparent 50%);
  opacity:.12;
}

/* ═══ Floating Particles — جزيئات ذهبية متساقطة ═══ */
.particles-bg{position:fixed;inset:0;z-index:-1;pointer-events:none;overflow:hidden}
.particle{
  position:absolute;
  width:4px;height:4px;
  background:radial-gradient(circle,rgba(94,234,212,.9),rgba(94,234,212,0));
  border-radius:50%;
  filter:blur(.5px);
  box-shadow:0 0 6px rgba(94,234,212,.6);
  pointer-events:none;
}
@keyframes floatParticle{
  0%{transform:translateY(100vh) translateX(0) scale(0);opacity:0}
  10%{opacity:1;transform:translateY(80vh) translateX(20px) scale(1)}
  90%{opacity:.6}
  100%{transform:translateY(-10vh) translateX(var(--drift,-50px)) scale(.5);opacity:0}
}

/* ═══ Glassmorphism Cards — البطاقات الزجاجية ═══ */
.glass{
  background:rgba(255,255,255,.65);
  backdrop-filter:blur(20px) saturate(1.8);
  -webkit-backdrop-filter:blur(20px) saturate(1.8);
  border:1px solid rgba(255,255,255,.3);
  box-shadow:
    0 8px 32px rgba(15,42,42,.08),
    inset 0 1px 0 rgba(255,255,255,.6);
}
html.dark .glass{
  background:rgba(15,31,31,.55);
  border-color:rgba(94,234,212,.15);
  box-shadow:
    0 8px 32px rgba(0,0,0,.4),
    inset 0 1px 0 rgba(94,234,212,.1);
}

.glass-strong{
  background:rgba(255,255,255,.85);
  backdrop-filter:blur(28px) saturate(2);
  -webkit-backdrop-filter:blur(28px) saturate(2);
  border:1px solid rgba(255,255,255,.4);
}
html.dark .glass-strong{
  background:rgba(15,31,31,.78);
  border-color:rgba(94,234,212,.18);
}

/* ═══ 3D Tilt Effect — البطاقات تطلع بـ 3D ═══ */
.card-tilt{
  transform-style:preserve-3d;
  transition:transform .4s cubic-bezier(.34,1.56,.64,1),box-shadow .4s ease;
  will-change:transform;
}
.card-tilt:hover{
  transform:translateY(-6px) scale(1.01);
}
@media(hover:hover){
  .card-tilt:hover{
    box-shadow:
      0 20px 60px -15px rgba(13,148,136,.25),
      0 0 0 1px rgba(94,234,212,.2);
  }
}

/* ═══ Cinematic Buttons — أزرار سينمائية ═══ */
.btn-cinema{
  position:relative;
  overflow:hidden;
  background:linear-gradient(135deg,#0d9488 0%,#0f766e 100%);
  color:#fff;
  border:none;
  padding:14px 28px;
  border-radius:14px;
  font-weight:800;
  font-size:14px;
  cursor:pointer;
  font-family:inherit;
  box-shadow:
    0 8px 24px rgba(13,148,136,.35),
    inset 0 1px 0 rgba(255,255,255,.25),
    inset 0 -2px 0 rgba(0,0,0,.1);
  transition:all .3s cubic-bezier(.34,1.56,.64,1);
  letter-spacing:0;
  display:inline-flex;
  align-items:center;
  gap:8px;
  isolation:isolate;
}
.btn-cinema::before{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(135deg,#5eead4 0%,#0d9488 100%);
  opacity:0;
  transition:opacity .3s;
  z-index:-1;
}
.btn-cinema::after{
  content:'';
  position:absolute;
  top:0;
  left:-100%;
  width:60%;
  height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.4),transparent);
  transform:skewX(-20deg);
  transition:left .6s ease;
  z-index:1;
}
.btn-cinema:hover{
  transform:translateY(-2px);
  box-shadow:
    0 12px 32px rgba(13,148,136,.5),
    inset 0 1px 0 rgba(255,255,255,.35);
}
.btn-cinema:hover::before{opacity:1}
.btn-cinema:hover::after{left:100%}
.btn-cinema:active{transform:translateY(0) scale(.98)}

.btn-gold{
  background:linear-gradient(135deg,#fbbf24 0%,#f59e0b 50%,#d97706 100%);
  color:#1a0e00;
  box-shadow:
    0 8px 24px rgba(245,158,11,.4),
    inset 0 1px 0 rgba(255,255,255,.4);
}
.btn-gold:hover{
  box-shadow:
    0 12px 36px rgba(245,158,11,.6),
    inset 0 1px 0 rgba(255,255,255,.5);
}

/* ═══ Hero Section — الجزء العلوي الفخم ═══ */
.cinema-hero{
  position:relative;
  padding:32px 24px 28px;
  margin:-24px -16px 24px;
  background:
    radial-gradient(circle at 30% 0%,rgba(94,234,212,.15) 0%,transparent 50%),
    linear-gradient(180deg,rgba(204,251,241,.4) 0%,transparent 100%);
  border-radius:0 0 32px 32px;
  overflow:hidden;
}
html.dark .cinema-hero{
  background:
    radial-gradient(circle at 30% 0%,rgba(94,234,212,.1) 0%,transparent 50%),
    linear-gradient(180deg,rgba(13,148,136,.08) 0%,transparent 100%);
}
.cinema-hero::before{
  content:'';
  position:absolute;
  top:-50%;
  inset-inline-end:-30%;
  width:400px;
  height:400px;
  background:radial-gradient(circle,rgba(94,234,212,.18),transparent 70%);
  border-radius:50%;
  animation:heroFloat 8s ease-in-out infinite;
  pointer-events:none;
}
@keyframes heroFloat{
  0%,100%{transform:translate(0,0) scale(1)}
  50%{transform:translate(-30px,20px) scale(1.1)}
}
.cinema-hero-badge{
  display:inline-flex;
  align-items:center;
  gap:7px;
  padding:6px 13px;
  background:linear-gradient(135deg,rgba(94,234,212,.2),rgba(13,148,136,.15));
  border:1px solid rgba(94,234,212,.3);
  border-radius:99px;
  font-size:11px;
  font-weight:800;
  color:var(--teal2);
  margin-bottom:14px;
  backdrop-filter:blur(10px);
  position:relative;
  overflow:hidden;
}
html.dark .cinema-hero-badge{
  color:#5eead4;
  background:linear-gradient(135deg,rgba(94,234,212,.15),rgba(13,148,136,.1));
}
.cinema-hero-badge::before{
  content:'';
  position:absolute;
  top:0;left:-100%;
  width:50%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.5),transparent);
  animation:badgeShine 3s linear infinite;
}
@keyframes badgeShine{0%{left:-100%}100%{left:200%}}

.cinema-hero-title{
  font-size:32px;
  font-weight:900;
  line-height:1.15;
  letter-spacing:0;
  background:linear-gradient(135deg,#0f172a 0%,#0f766e 50%,#0d9488 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  margin-bottom:8px;
  animation:heroTitleReveal 1s cubic-bezier(.34,1.56,.64,1);
}
html.dark .cinema-hero-title{
  background:linear-gradient(135deg,#f0fdfa 0%,#5eead4 50%,#a7f3d0 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
}
@keyframes heroTitleReveal{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:none}
}
.cinema-hero-subtitle{
  font-size:15px;
  color:var(--text-secondary);
  line-height:1.6;
  font-weight:500;
  animation:heroTitleReveal 1s cubic-bezier(.34,1.56,.64,1) .2s both;
}

@media(max-width:480px){
  .cinema-hero{padding:24px 18px 22px;margin:-12px -8px 20px;border-radius:0 0 24px 24px}
  .cinema-hero-title{font-size:26px}
  .cinema-hero-subtitle{font-size:13.5px}
}

/* ═══ Cinematic Stats — البطاقات الإحصائية الفخمة ═══ */
.cinema-stats{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:14px;
  margin-bottom:24px;
}
@media(max-width:768px){.cinema-stats{grid-template-columns:1fr 1fr;gap:10px}}

.cinema-stat{
  position:relative;
  padding:18px 16px;
  border-radius:18px;
  background:#fff;
  border:1px solid var(--border);
  overflow:hidden;
  transition:all .35s cubic-bezier(.34,1.56,.64,1);
  cursor:pointer;
  isolation:isolate;
}
html.dark .cinema-stat{
  background:var(--bg-card);
  border-color:var(--border);
}
.cinema-stat::before{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(135deg,var(--stat-color,#0d9488)/10 0%,transparent 60%);
  opacity:.08;
  z-index:-1;
}
.cinema-stat::after{
  content:'';
  position:absolute;
  top:-50%;
  inset-inline-end:-30%;
  width:140px;
  height:140px;
  background:radial-gradient(circle,var(--stat-color,#0d9488),transparent 70%);
  border-radius:50%;
  opacity:.1;
  transition:all .4s ease;
  z-index:-1;
}
.cinema-stat:hover{
  transform:translateY(-4px);
  border-color:var(--stat-color,#0d9488);
  box-shadow:
    0 14px 40px -10px rgba(13,148,136,.25),
    0 0 0 1px rgba(94,234,212,.2);
}
.cinema-stat:hover::after{
  transform:scale(1.4);
  opacity:.2;
}

.cinema-stat-icon{
  width:42px;height:42px;
  border-radius:13px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  margin-bottom:12px;
  background:linear-gradient(135deg,var(--stat-color,#0d9488),var(--stat-color2,#0f766e));
  color:#fff;
  box-shadow:0 6px 16px var(--stat-shadow,rgba(13,148,136,.3));
  transition:transform .3s;
}
.cinema-stat:hover .cinema-stat-icon{
  transform:scale(1.1) rotate(-5deg);
}

.cinema-stat-value{
  font-size:28px;
  font-weight:900;
  color:var(--text-primary);
  line-height:1;
  letter-spacing:-.5px;
  margin-bottom:4px;
  font-feature-settings:'tnum';
  background:linear-gradient(135deg,var(--text-primary),var(--stat-color,#0d9488));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
}

.cinema-stat-label{
  font-size:12px;
  font-weight:700;
  color:var(--text-muted);
  letter-spacing:0;
}

.cinema-stat-trend{
  position:absolute;
  top:14px;
  inset-inline-end:14px;
  font-size:10.5px;
  font-weight:800;
  padding:3px 8px;
  border-radius:99px;
  background:var(--gr100);
  color:var(--gr600);
  display:inline-flex;
  align-items:center;
  gap:3px;
}
html.dark .cinema-stat-trend{background:rgba(34,197,94,.15);color:#86efac}

@media(max-width:480px){
  .cinema-stat{padding:14px 12px;border-radius:16px}
  .cinema-stat-icon{width:36px;height:36px;font-size:17px;border-radius:11px;margin-bottom:9px}
  .cinema-stat-value{font-size:23px}
  .cinema-stat-label{font-size:10.5px}
}

/* ═══ Cinematic Section Header ═══ */
.cinema-shdr{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin:24px 0 14px;
  padding:0 4px;
}
.cinema-shdr-title{
  font-size:18px;
  font-weight:900;
  color:var(--text-primary);
  display:flex;
  align-items:center;
  gap:10px;
  letter-spacing:0;
}
.cinema-shdr-icon{
  width:32px;height:32px;
  border-radius:10px;
  background:linear-gradient(135deg,#0d9488,#0f766e);
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:15px;
  box-shadow:0 4px 12px rgba(13,148,136,.3);
}
.cinema-shdr-action{
  font-size:12px;
  font-weight:700;
  color:var(--teal2);
  background:none;
  border:none;
  cursor:pointer;
  font-family:inherit;
  padding:6px 12px;
  border-radius:8px;
  transition:all .15s;
  display:inline-flex;
  align-items:center;
  gap:4px;
}
html.dark .cinema-shdr-action{color:#5eead4}
.cinema-shdr-action:hover{background:var(--teal3);transform:translateX(-2px)}
html.dark .cinema-shdr-action:hover{background:rgba(94,234,212,.1)}

/* ═══ Cinematic Deal Cards ═══ */
.cinema-deal{
  position:relative;
  background:#fff;
  border:1px solid var(--border);
  border-radius:18px;
  padding:16px 18px;
  margin-bottom:11px;
  cursor:pointer;
  transition:all .35s cubic-bezier(.34,1.56,.64,1);
  overflow:hidden;
  isolation:isolate;
  display:flex;
  align-items:center;
  gap:13px;
}
html.dark .cinema-deal{background:var(--bg-card);border-color:var(--border)}
.cinema-deal::before{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(135deg,rgba(94,234,212,.05) 0%,transparent 60%);
  opacity:0;
  transition:opacity .3s;
  z-index:-1;
}
.cinema-deal:hover{
  transform:translateY(-3px);
  border-color:rgba(94,234,212,.4);
  box-shadow:
    0 14px 32px -8px rgba(13,148,136,.2),
    0 0 0 1px rgba(94,234,212,.15);
}
.cinema-deal:hover::before{opacity:1}

.cinema-deal-avatar{
  width:46px;height:46px;
  border-radius:14px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:900;
  color:#fff;
  font-size:16px;
  flex-shrink:0;
  box-shadow:0 6px 14px rgba(0,0,0,.12);
  position:relative;
  transition:transform .3s;
}
.cinema-deal:hover .cinema-deal-avatar{transform:rotate(-5deg) scale(1.05)}

.cinema-deal-body{flex:1;min-width:0}
.cinema-deal-name{
  font-size:14px;
  font-weight:800;
  color:var(--text-primary);
  margin-bottom:3px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.cinema-deal-meta{
  font-size:11.5px;
  color:var(--text-muted);
  font-weight:600;
  display:flex;
  align-items:center;
  gap:6px;
}
.cinema-deal-side{text-align:end;flex-shrink:0}
.cinema-deal-amount{
  font-size:15px;
  font-weight:900;
  color:var(--text-primary);
  letter-spacing:0;
  line-height:1.1;
  margin-bottom:3px;
}
.cinema-deal-status{
  font-size:10px;
  font-weight:800;
  padding:3px 9px;
  border-radius:99px;
  display:inline-block;
}

/* ═══ Floating Action Button — الزر العائم الثوري ═══ */
.cinema-fab{
  position:fixed;
  inset-inline-end:18px;
  bottom:90px;
  width:60px;
  height:60px;
  border-radius:50%;
  background:linear-gradient(135deg,#0d9488 0%,#0f766e 100%);
  color:#fff;
  border:none;
  font-size:28px;
  cursor:pointer;
  z-index:40;
  box-shadow:
    0 12px 32px rgba(13,148,136,.45),
    inset 0 1px 0 rgba(255,255,255,.3);
  transition:all .3s cubic-bezier(.34,1.56,.64,1);
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:inherit;
}
.cinema-fab::before{
  content:'';
  position:absolute;
  inset:-4px;
  border-radius:50%;
  background:linear-gradient(135deg,#5eead4,#0d9488);
  z-index:-1;
  opacity:0;
  filter:blur(10px);
  transition:opacity .3s;
}
.cinema-fab:hover{
  transform:scale(1.08) rotate(90deg);
  box-shadow:0 16px 40px rgba(13,148,136,.6);
}
.cinema-fab:hover::before{opacity:1}
.cinema-fab:active{transform:scale(.95)}
@media(min-width:769px){.cinema-fab{bottom:24px}}

/* ═══ Counter Animation Helper ═══ */
.cinema-counter{
  display:inline-block;
  font-variant-numeric:tabular-nums;
  font-feature-settings:'tnum';
}

/* ═══ Page Transitions السينمائية ═══ */
@keyframes pageEnter{
  from{opacity:0;transform:translateY(20px) scale(.98)}
  to{opacity:1;transform:none}
}
.page:not(.hidden){animation:pageEnter .5s cubic-bezier(.34,1.56,.64,1)}

/* ═══ Number Counter Animation ═══ */
@keyframes counterPulse{
  0%{transform:scale(1)}
  50%{transform:scale(1.06)}
  100%{transform:scale(1)}
}
.counter-update{animation:counterPulse .4s ease}

/* ═══ Cinematic Loading Skeleton (محسّن) ═══ */
.sk-cinema{
  position:relative;
  overflow:hidden;
  background:linear-gradient(90deg,
    var(--g100) 0%,
    var(--g50) 25%,
    rgba(94,234,212,.15) 50%,
    var(--g50) 75%,
    var(--g100) 100%);
  background-size:300% 100%;
  animation:cinemaShimmer 2s ease-in-out infinite;
  border-radius:12px;
}
@keyframes cinemaShimmer{
  0%{background-position:200% 0}
  100%{background-position:-200% 0}
}
html.dark .sk-cinema{
  background:linear-gradient(90deg,
    var(--bg-elevated) 0%,
    var(--bg-card) 25%,
    rgba(94,234,212,.08) 50%,
    var(--bg-card) 75%,
    var(--bg-elevated) 100%);
  background-size:300% 100%;
}

/* ═══ Cinematic Welcome — رسالة الترحيب الفخمة ═══ */
.cinema-welcome{
  position:relative;
  display:flex;
  align-items:center;
  gap:14px;
  margin-bottom:6px;
}
.cinema-welcome-emoji{
  font-size:36px;
  display:inline-block;
  animation:wave 3s ease-in-out infinite;
  transform-origin:70% 70%;
}
.cinema-welcome-text{flex:1;min-width:0}

/* ═══ Sparkle Decoration ═══ */
.sparkle{position:relative}
.sparkle::after{
  content:'✨';
  position:absolute;
  top:-6px;inset-inline-end:-12px;
  font-size:14px;
  animation:sparkleFloat 2s ease-in-out infinite;
}
@keyframes sparkleFloat{
  0%,100%{transform:translateY(0) rotate(0deg);opacity:.7}
  50%{transform:translateY(-4px) rotate(15deg);opacity:1}
}

/* ═══ Hover Glow Effects ═══ */
.glow-on-hover{position:relative;transition:all .3s}
.glow-on-hover::after{
  content:'';
  position:absolute;
  inset:-2px;
  background:linear-gradient(135deg,#5eead4,#0d9488,#5eead4);
  background-size:200% 200%;
  border-radius:inherit;
  z-index:-1;
  opacity:0;
  filter:blur(8px);
  transition:opacity .3s;
  animation:glowMove 3s linear infinite;
}
.glow-on-hover:hover::after{opacity:.7}
@keyframes glowMove{
  0%{background-position:0% 50%}
  100%{background-position:200% 50%}
}

/* ═══ Cinematic Bottom Nav (محسّن جداً) ═══ */
.bottom-nav.cinema{
  background:rgba(255,255,255,.85);
  backdrop-filter:blur(28px) saturate(2);
  -webkit-backdrop-filter:blur(28px) saturate(2);
  border-top:1px solid rgba(255,255,255,.6);
  box-shadow:0 -8px 32px rgba(15,42,42,.08),inset 0 1px 0 rgba(255,255,255,.7);
}
html.dark .bottom-nav.cinema{
  background:rgba(15,31,31,.85);
  border-top-color:rgba(94,234,212,.15);
  box-shadow:0 -8px 32px rgba(0,0,0,.4),inset 0 1px 0 rgba(94,234,212,.08);
}

/* ═══ Live Activity Pulse (للأشياء الحية) ═══ */
.live-pulse{position:relative}
.live-pulse::before{
  content:'';
  position:absolute;
  width:8px;height:8px;
  background:#22c55e;
  border-radius:50%;
  inset-inline-start:-14px;
  top:50%;
  transform:translateY(-50%);
  box-shadow:0 0 0 0 rgba(34,197,94,.6);
  animation:livePulse 2s ease-in-out infinite;
}
@keyframes livePulse{
  0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,.6)}
  50%{box-shadow:0 0 0 6px rgba(34,197,94,0)}
}

/* ═══ Cinematic Card Hover Tilt (3D) ═══ */
@media(hover:hover) and (min-width:769px){
  .tilt-card{
    transform-style:preserve-3d;
    perspective:1000px;
  }
  .tilt-card:hover{
    transform:perspective(1000px) rotateX(2deg) rotateY(-2deg) translateY(-4px);
  }
}

/* ═══ Smooth Reveal Animations ═══ */
@keyframes fadeUp{
  from{opacity:0;transform:translateY(15px)}
  to{opacity:1;transform:none}
}
.reveal-1{animation:fadeUp .6s cubic-bezier(.34,1.56,.64,1) .1s both}
.reveal-2{animation:fadeUp .6s cubic-bezier(.34,1.56,.64,1) .2s both}
.reveal-3{animation:fadeUp .6s cubic-bezier(.34,1.56,.64,1) .3s both}
.reveal-4{animation:fadeUp .6s cubic-bezier(.34,1.56,.64,1) .4s both}
.reveal-5{animation:fadeUp .6s cubic-bezier(.34,1.56,.64,1) .5s both}

/* ═══ Cinema Topbar (محسّن) ═══ */
.topbar.cinema{
  background:rgba(255,255,255,.7);
  backdrop-filter:blur(28px) saturate(1.8);
  -webkit-backdrop-filter:blur(28px) saturate(1.8);
  border-bottom:1px solid rgba(94,234,212,.15);
  box-shadow:0 1px 4px rgba(15,42,42,.04);
}
html.dark .topbar.cinema{
  background:rgba(15,31,31,.7);
  border-bottom-color:rgba(94,234,212,.1);
}

/* ═══ Beautiful Empty States ═══ */
.cinema-empty{
  text-align:center;
  padding:48px 24px;
  position:relative;
  overflow:hidden;
}
.cinema-empty-icon{
  font-size:64px;
  margin-bottom:14px;
  display:inline-block;
  filter:drop-shadow(0 8px 20px rgba(94,234,212,.4));
  animation:emptyFloat 4s ease-in-out infinite;
}
@keyframes emptyFloat{
  0%,100%{transform:translateY(0) rotate(0deg)}
  50%{transform:translateY(-10px) rotate(5deg)}
}
.cinema-empty-title{
  font-size:17px;
  font-weight:800;
  color:var(--text-primary);
  margin-bottom:6px;
}
.cinema-empty-desc{
  font-size:13px;
  color:var(--text-muted);
  line-height:1.5;
  max-width:300px;
  margin:0 auto;
}

/* ═══════════════════════════════════════════════════════════════════════
   🎬 CINEMATIC AUTH SCREEN — صفحة تسجيل الدخول السينمائية الخرافية
   ═══════════════════════════════════════════════════════════════════════ */
.cinema-auth{
  min-height:100vh;
  min-height:100dvh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
  position:relative;
  overflow:hidden;
  background:#0a1414;
}

/* الخلفية متعددة الطبقات */
.cinema-auth-bg{
  position:absolute;
  inset:0;
  z-index:0;
  pointer-events:none;
  overflow:hidden;
}
.cinema-auth-bg::before{
  content:'';
  position:absolute;
  inset:-50%;
  background:
    radial-gradient(at 27% 37%,#0d9488 0,transparent 50%),
    radial-gradient(at 97% 21%,#0f766e 0,transparent 50%),
    radial-gradient(at 52% 99%,#5eead4 0,transparent 50%),
    radial-gradient(at 10% 29%,#134e4a 0,transparent 50%),
    radial-gradient(at 97% 96%,#0a3838 0,transparent 50%),
    radial-gradient(at 33% 50%,#fbbf24 0,transparent 50%),
    radial-gradient(at 79% 53%,#5eead4 0,transparent 50%);
  filter:blur(120px) saturate(1.8);
  opacity:.5;
  animation:authMeshShift 25s ease-in-out infinite alternate;
}
@keyframes authMeshShift{
  0%{transform:translate(0,0) rotate(0deg) scale(1)}
  33%{transform:translate(-3%,2%) rotate(2deg) scale(1.05)}
  66%{transform:translate(3%,-2%) rotate(-2deg) scale(.95)}
  100%{transform:translate(0,0) rotate(0deg) scale(1)}
}

/* شبكة هندسية خفيفة (grid pattern) */
.cinema-auth-grid{
  position:absolute;
  inset:0;
  z-index:1;
  pointer-events:none;
  background-image:
    linear-gradient(rgba(94,234,212,.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(94,234,212,.04) 1px,transparent 1px);
  background-size:50px 50px;
  mask-image:radial-gradient(ellipse at center,black 30%,transparent 80%);
  -webkit-mask-image:radial-gradient(ellipse at center,black 30%,transparent 80%);
}

/* جسيمات متطايرة */
.cinema-auth-orbs{
  position:absolute;
  inset:0;
  z-index:1;
  pointer-events:none;
  overflow:hidden;
}
.cinema-auth-orb{
  position:absolute;
  border-radius:50%;
  filter:blur(40px);
  opacity:.5;
  animation:orbFloat 20s ease-in-out infinite;
}
.cinema-auth-orb:nth-child(1){
  width:300px;height:300px;
  background:radial-gradient(circle,#5eead4,transparent);
  top:10%;left:10%;
  animation-delay:0s;
}
.cinema-auth-orb:nth-child(2){
  width:400px;height:400px;
  background:radial-gradient(circle,#0d9488,transparent);
  bottom:10%;inset-inline-end:5%;
  animation-delay:-7s;
}
.cinema-auth-orb:nth-child(3){
  width:250px;height:250px;
  background:radial-gradient(circle,#fbbf24,transparent);
  top:50%;inset-inline-start:50%;
  animation-delay:-14s;
  opacity:.3;
}
@keyframes orbFloat{
  0%,100%{transform:translate(0,0) scale(1)}
  33%{transform:translate(50px,-30px) scale(1.1)}
  66%{transform:translate(-30px,50px) scale(.95)}
}

/* البطاقة السينمائية الرئيسية */
.cinema-auth-card{
  position:relative;
  z-index:10;
  width:100%;
  max-width:480px;
  background:rgba(15,31,31,.55);
  backdrop-filter:blur(40px) saturate(1.8);
  -webkit-backdrop-filter:blur(40px) saturate(1.8);
  border:1px solid rgba(94,234,212,.18);
  border-radius:32px;
  overflow:hidden;
  box-shadow:
    0 32px 80px -20px rgba(0,0,0,.6),
    0 0 0 1px rgba(94,234,212,.08),
    inset 0 1px 0 rgba(255,255,255,.08);
  animation:authCardEntry 1.2s cubic-bezier(.34,1.56,.64,1);
}
@keyframes authCardEntry{
  0%{opacity:0;transform:translateY(40px) scale(.92);filter:blur(20px)}
  60%{opacity:1;filter:blur(0)}
  100%{transform:translateY(0) scale(1);filter:blur(0)}
}

/* الإطار المضيء حول البطاقة */
.cinema-auth-card::before{
  content:'';
  position:absolute;
  inset:-2px;
  border-radius:34px;
  padding:2px;
  background:linear-gradient(135deg,
    rgba(94,234,212,.6) 0%,
    rgba(13,148,136,.3) 25%,
    rgba(251,191,36,.4) 50%,
    rgba(94,234,212,.3) 75%,
    rgba(94,234,212,.6) 100%);
  background-size:200% 200%;
  -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
  -webkit-mask-composite:xor;
  mask-composite:exclude;
  z-index:-1;
  animation:borderGlow 4s linear infinite;
  pointer-events:none;
  opacity:.7;
}
@keyframes borderGlow{
  0%{background-position:0% 50%}
  100%{background-position:200% 50%}
}

/* الـ Header الفخم */
.cinema-auth-hero{
  padding:36px 32px 26px;
  text-align:center;
  position:relative;
  background:linear-gradient(180deg,rgba(13,148,136,.15) 0%,transparent 100%);
  border-bottom:1px solid rgba(94,234,212,.1);
  overflow:hidden;
}
.cinema-auth-hero::before{
  content:'';
  position:absolute;
  top:-50%;
  left:-50%;
  width:200%;
  height:200%;
  background:radial-gradient(circle at center,rgba(94,234,212,.15),transparent 50%);
  animation:heroPulse 4s ease-in-out infinite;
  pointer-events:none;
}
@keyframes heroPulse{
  0%,100%{opacity:.5;transform:scale(1)}
  50%{opacity:1;transform:scale(1.1)}
}

/* الشعار المتوهج */
.cinema-auth-logo{
  position:relative;
  display:inline-block;
  margin-bottom:14px;
  animation:logoEntry 1.5s cubic-bezier(.34,1.56,.64,1) .3s both;
}
@keyframes logoEntry{
  0%{opacity:0;transform:scale(0) rotate(-180deg)}
  60%{transform:scale(1.15) rotate(20deg)}
  100%{opacity:1;transform:scale(1) rotate(0deg)}
}
.cinema-auth-logo::before{
  content:'';
  position:absolute;
  inset:-20px;
  background:radial-gradient(circle,rgba(94,234,212,.5),transparent 70%);
  filter:blur(20px);
  animation:logoGlow 3s ease-in-out infinite;
  z-index:-1;
}
@keyframes logoGlow{
  0%,100%{transform:scale(1);opacity:.6}
  50%{transform:scale(1.3);opacity:1}
}
.cinema-auth-logo svg{
  filter:drop-shadow(0 0 24px rgba(94,234,212,.7));
}

/* العنوان بـ gradient */
.cinema-auth-title{
  font-size:36px;
  font-weight:900;
  margin-bottom:6px;
  letter-spacing:0;
  background:linear-gradient(135deg,#fff 0%,#a7f3d0 50%,#5eead4 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  text-shadow:0 0 40px rgba(94,234,212,.3);
  animation:titleReveal 1s ease-out .5s both;
}
@keyframes titleReveal{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:none}
}

.cinema-auth-subtitle{
  font-size:14px;
  color:rgba(255,255,255,.7);
  font-weight:500;
  line-height:1.6;
  animation:titleReveal 1s ease-out .7s both;
}

/* شارات الثقة */
.cinema-auth-shields{
  display:flex;
  justify-content:center;
  gap:8px;
  margin-top:14px;
  flex-wrap:wrap;
  animation:titleReveal 1s ease-out .9s both;
}
.cinema-auth-shield{
  padding:5px 11px;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(94,234,212,.2);
  border-radius:99px;
  font-size:10.5px;
  font-weight:700;
  color:rgba(255,255,255,.85);
  display:inline-flex;
  align-items:center;
  gap:5px;
  backdrop-filter:blur(10px);
  transition:all .25s;
}
.cinema-auth-shield:hover{
  background:rgba(94,234,212,.1);
  border-color:rgba(94,234,212,.4);
  transform:translateY(-1px);
}

/* Tabs الفخمة */
.cinema-auth-tabs{
  display:flex;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(94,234,212,.1);
  border-radius:14px;
  padding:4px;
  margin:24px 32px 0;
  position:relative;
  z-index:2;
  animation:titleReveal 1s ease-out 1.1s both;
}
.cinema-auth-tab{
  flex:1;
  padding:11px 14px;
  background:none;
  border:none;
  border-radius:11px;
  font-size:13px;
  font-weight:800;
  color:rgba(255,255,255,.5);
  cursor:pointer;
  font-family:inherit;
  transition:all .3s cubic-bezier(.34,1.56,.64,1);
  position:relative;
  letter-spacing:0;
}
.cinema-auth-tab.active{
  background:linear-gradient(135deg,#0d9488 0%,#0f766e 100%);
  color:#fff;
  box-shadow:
    0 4px 14px rgba(13,148,136,.4),
    inset 0 1px 0 rgba(255,255,255,.2);
}
.cinema-auth-tab:hover:not(.active){
  color:rgba(255,255,255,.85);
}

/* Body — حقول الإدخال */
.cinema-auth-body{
  padding:24px 32px 32px;
  position:relative;
}

/* Field Group السينمائي */
.cinema-fg{
  margin-bottom:14px;
  position:relative;
  animation:fieldReveal .6s ease-out both;
}
.cinema-fg.delay-1{animation-delay:.2s}
.cinema-fg.delay-2{animation-delay:.3s}
.cinema-fg.delay-3{animation-delay:.4s}
.cinema-fg.delay-4{animation-delay:.5s}
.cinema-fg.delay-5{animation-delay:.6s}
@keyframes fieldReveal{
  from{opacity:0;transform:translateX(-10px)}
  to{opacity:1;transform:none}
}

.cinema-fl{
  display:block;
  font-size:11.5px;
  font-weight:700;
  color:rgba(255,255,255,.65);
  margin-bottom:6px;
  letter-spacing:0;
  display:flex;
  align-items:center;
  gap:6px;
}
.cinema-fl-req{color:#fbbf24;font-weight:900}

/* الحقل نفسه */
.cinema-fc{
  width:100%;
  padding:13px 16px;
  background:rgba(255,255,255,.05);
  border:1.5px solid rgba(94,234,212,.15);
  border-radius:12px;
  color:#fff;
  font-size:14.5px;
  font-family:inherit;
  outline:none;
  transition:all .25s ease;
  font-weight:500;
  -webkit-text-fill-color:#fff;
}
.cinema-fc::placeholder{
  color:rgba(255,255,255,.3);
  font-weight:400;
}
.cinema-fc:hover{
  background:rgba(255,255,255,.08);
  border-color:rgba(94,234,212,.3);
}
.cinema-fc:focus{
  background:rgba(255,255,255,.1);
  border-color:#5eead4;
  box-shadow:
    0 0 0 4px rgba(94,234,212,.12),
    0 4px 20px rgba(13,148,136,.15);
  transform:translateY(-1px);
}

/* Autofill على Chrome */
.cinema-fc:-webkit-autofill,
.cinema-fc:-webkit-autofill:hover,
.cinema-fc:-webkit-autofill:focus{
  -webkit-box-shadow:0 0 0 100px rgba(13,148,136,.15) inset;
  -webkit-text-fill-color:#fff;
  caret-color:#fff;
}

/* صف من الحقول */
.cinema-frow{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:11px;
}

/* رسالة الخطأ */
.cinema-err{
  background:linear-gradient(135deg,rgba(220,38,38,.15),rgba(220,38,38,.08));
  border:1px solid rgba(220,38,38,.3);
  color:#fca5a5;
  padding:11px 14px;
  border-radius:11px;
  font-size:12.5px;
  font-weight:600;
  margin-bottom:14px;
  animation:errShake .5s cubic-bezier(.36,.07,.19,.97);
}
@keyframes errShake{
  0%,100%{transform:translateX(0)}
  20%,60%{transform:translateX(-4px)}
  40%,80%{transform:translateX(4px)}
}

/* الزر السينمائي الرئيسي */
.cinema-btn-main{
  width:100%;
  padding:15px 24px;
  background:linear-gradient(135deg,#0d9488 0%,#0f766e 100%);
  color:#fff;
  border:none;
  border-radius:14px;
  font-size:15px;
  font-weight:800;
  cursor:pointer;
  font-family:inherit;
  position:relative;
  overflow:hidden;
  isolation:isolate;
  letter-spacing:0;
  box-shadow:
    0 8px 24px rgba(13,148,136,.45),
    inset 0 1px 0 rgba(255,255,255,.25);
  transition:all .3s cubic-bezier(.34,1.56,.64,1);
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  margin-top:6px;
}
.cinema-btn-main::before{
  content:'';
  position:absolute;
  top:0;left:-100%;
  width:60%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.4),transparent);
  transform:skewX(-20deg);
  animation:btnShine 3s ease-in-out infinite;
  z-index:1;
}
@keyframes btnShine{
  0%,100%{left:-100%}
  50%{left:200%}
}
.cinema-btn-main:hover{
  transform:translateY(-2px);
  box-shadow:
    0 14px 32px rgba(13,148,136,.6),
    inset 0 1px 0 rgba(255,255,255,.35);
}
.cinema-btn-main:active{transform:translateY(0) scale(.98)}
.cinema-btn-main:disabled{
  opacity:.7;
  cursor:not-allowed;
  transform:none;
}

/* الـ Footer */
.cinema-auth-foot{
  text-align:center;
  padding:18px 24px;
  font-size:11px;
  color:rgba(255,255,255,.4);
  border-top:1px solid rgba(94,234,212,.08);
  background:rgba(0,0,0,.15);
  font-weight:500;
  line-height:1.6;
}
.cinema-auth-foot strong{
  color:rgba(94,234,212,.9);
  font-weight:700;
}

/* زر تبديل اللغة */
.cinema-lang-switch{
  position:absolute;
  top:18px;
  inset-inline-end:18px;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(94,234,212,.2);
  color:rgba(255,255,255,.85);
  padding:6px 14px;
  border-radius:99px;
  font-size:11px;
  font-weight:800;
  cursor:pointer;
  font-family:inherit;
  backdrop-filter:blur(10px);
  z-index:11;
  transition:all .2s;
}
.cinema-lang-switch:hover{
  background:rgba(94,234,212,.15);
  border-color:rgba(94,234,212,.4);
  color:#fff;
}

/* Mobile */
@media(max-width:480px){
  .cinema-auth{padding:14px}
  .cinema-auth-card{border-radius:24px}
  .cinema-auth-hero{padding:30px 22px 22px}
  .cinema-auth-title{font-size:28px}
  .cinema-auth-subtitle{font-size:13px}
  .cinema-auth-tabs{margin:18px 22px 0;padding:3px}
  .cinema-auth-tab{padding:10px 12px;font-size:12.5px}
  .cinema-auth-body{padding:18px 22px 24px}
  .cinema-fc{padding:12px 14px;font-size:14px}
  .cinema-frow{grid-template-columns:1fr;gap:0}
  .cinema-frow .cinema-fg{margin-bottom:14px}
  .cinema-btn-main{padding:13px 20px;font-size:14px}
  .cinema-auth-shields{gap:6px}
  .cinema-auth-shield{padding:4px 9px;font-size:9.5px}
}

/* ═══════ FAQ PAGE STYLES ═══════ */
.faq-modal{background:#fff;border-radius:var(--r20);box-shadow:var(--shl);width:100%;max-width:480px;max-height:92vh;overflow-y:auto;animation:slideUp .3s ease;position:relative}
html.dark .faq-modal{background:var(--bg-card);border:1px solid var(--border)}
.faq-hero{background:linear-gradient(135deg,#0f2a2a,#0f766e);padding:30px 22px 32px;text-align:center;color:#fff;position:relative;overflow:hidden;border-radius:var(--r20) var(--r20) 0 0}
.faq-hero::before{content:'';position:absolute;top:-50px;right:-50px;width:180px;height:180px;background:radial-gradient(circle,rgba(94,234,212,.18),transparent 70%);border-radius:50%}
.faq-close{position:absolute;top:14px;inset-inline-start:14px;width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.15);color:#fff;border:none;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;z-index:5}
.faq-close:hover{background:rgba(255,255,255,.25)}
.faq-hero-ico{width:54px;height:54px;background:#fff;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;margin-bottom:10px;position:relative;z-index:2;box-shadow:0 6px 18px rgba(0,0,0,.15)}
.faq-hero h2{font-size:22px;font-weight:900;margin:0;position:relative;z-index:2;color:#fff}
html.dark .faq-hero h2{color:#5eead4}
.faq-hero p{font-size:12px;color:rgba(255,255,255,.78);margin:5px 0 0;position:relative;z-index:2}

.faq-search{margin:-22px 18px 14px;background:#fff;border-radius:14px;padding:11px 16px;box-shadow:0 8px 22px rgba(15,42,42,.12);display:flex;align-items:center;gap:10px;position:relative;z-index:5;color-scheme:light}
html.dark .faq-search{background:var(--bg-elevated);border:1px solid var(--border);box-shadow:0 8px 22px rgba(0,0,0,.5);color-scheme:dark}
.faq-search input{flex:1;border:none;background:transparent;font-size:13.5px;font-family:inherit;outline:none;color:#0f172a;-webkit-text-fill-color:#0f172a}
html.dark .faq-search input{color:#f0fdfa;-webkit-text-fill-color:#f0fdfa}
.faq-search input::placeholder{color:#94a3b8}
html.dark .faq-search input::placeholder{color:#6b8888}
.faq-search-ico{font-size:15px;color:#94a3b8}
html.dark .faq-search-ico{color:#5eead4}

.faq-cats{display:flex;gap:7px;padding:0 18px 14px;overflow-x:auto;flex-wrap:wrap}
.faq-cat{padding:6px 13px;font-size:12px;font-weight:700;background:#fff;border:1px solid #e2e8f0;border-radius:99px;cursor:pointer;color:#475569;font-family:inherit;transition:all .15s;white-space:nowrap}
html.dark .faq-cat{background:var(--bg-elevated);border-color:var(--border);color:#a7c4c2}
.faq-cat:hover{border-color:#0d9488;color:#0d9488}
html.dark .faq-cat:hover{border-color:#5eead4;color:#5eead4}
.faq-cat.active{background:#0d9488;color:#fff;border-color:#0d9488}
html.dark .faq-cat.active{background:rgba(94,234,212,.18);color:#5eead4;border-color:#5eead4}

.faq-list{margin:0 18px;border-radius:14px;border:1px solid #e2e8f0;overflow:hidden;background:#fff}
html.dark .faq-list{background:var(--bg-card);border-color:var(--border)}
.faq-item{border-bottom:1px solid #f1f5f9}
html.dark .faq-item{border-color:var(--border-soft)}
.faq-item:last-child{border-bottom:none}
.faq-q{padding:14px 16px;display:flex;justify-content:space-between;align-items:flex-start;gap:10px;cursor:pointer;background:transparent;border:none;width:100%;font-family:inherit;text-align:start;transition:background .15s}
.faq-q:hover{background:#fafbfc}
html.dark .faq-q:hover{background:rgba(20,184,166,.06)}
.faq-q-text{font-size:13px;font-weight:700;color:#0f172a;flex:1;line-height:1.55}
html.dark .faq-q-text{color:#f0fdfa}
.faq-q-ico{flex-shrink:0;width:24px;height:24px;border-radius:7px;background:#f0fdfa;color:#0d9488;display:inline-flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;transition:all .25s;margin-top:1px}
html.dark .faq-q-ico{background:rgba(94,234,212,.15);color:#5eead4}
.faq-item.open .faq-q-ico{background:#0d9488;color:#fff;transform:rotate(180deg)}
html.dark .faq-item.open .faq-q-ico{background:#5eead4;color:#0a1414}
.faq-a{max-height:0;overflow:hidden;transition:max-height .35s ease,padding .35s ease;padding:0 16px;font-size:12.5px;color:#475569;line-height:1.75}
html.dark .faq-a{color:#a7c4c2}
.faq-item.open .faq-a{max-height:1000px;padding:0 16px 14px}
.faq-a b{color:#0f172a;font-weight:800}
html.dark .faq-a b{color:#5eead4}
.faq-a ul,.faq-a ol{margin:6px 0 0;padding-inline-start:18px}
.faq-a li{margin-bottom:3px}

.faq-tag{display:inline-block;padding:2px 8px;font-size:9.5px;font-weight:800;border-radius:5px;background:#ccfbf1;color:#0f766e;margin-inline-end:7px;letter-spacing:.3px}
html.dark .faq-tag{background:rgba(94,234,212,.15);color:#5eead4;border:1px solid rgba(94,234,212,.25)}

.faq-cta{margin:14px 18px 18px;background:linear-gradient(135deg,#0f766e,#0d9488);border-radius:14px;padding:18px;color:#fff;text-align:center}
html.dark .faq-cta{background:linear-gradient(135deg,#0a2828,#0d3838);border:1px solid var(--border)}
.faq-cta-title{font-size:14px;font-weight:800;margin-bottom:5px}
html.dark .faq-cta-title{color:#5eead4}
.faq-cta-desc{font-size:11.5px;color:rgba(255,255,255,.85);margin-bottom:11px}
html.dark .faq-cta-desc{color:#a7c4c2}
.faq-cta-btn{display:inline-block;background:#fff;color:#0f766e;padding:9px 20px;border-radius:10px;font-size:12px;font-weight:800;text-decoration:none;border:none;font-family:inherit;cursor:pointer;transition:all .15s}
.faq-cta-btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.15)}
html.dark .faq-cta-btn{background:#5eead4;color:#0a1414}
html.dark .faq-cta-btn:hover{background:#7af5e0}

.faq-empty{padding:30px 20px;text-align:center;color:#94a3b8;font-size:13px}

/* About Hero gradient — adapt to dark */
html.dark .about-hero{background:linear-gradient(135deg,#0d2828 0%,#0a1f1f 100%)!important}
html.dark .about-hero h2{color:#5eead4!important}
html.dark .about-hero p{color:var(--text-secondary)!important}
html.dark .about-feature{border-color:var(--border-soft)!important}
html.dark .about-feature .ftit{color:var(--text-primary)!important}
html.dark .about-feature .fdesc{color:var(--text-secondary)!important}
html.dark .about-feature .fico{background:var(--bg-elevated);color:#5eead4}
html.dark .about-body p{color:var(--text-secondary)!important}

/* Logo on white circle — keep teal even in dark mode (consistent with brand) */
html.dark .about-hero div[style*="background:#fff"]{background:#fff!important}
html.dark .about-hero div[style*="background:#fff"] svg{color:#0d9488!important}

/* Warning/Disclaimer banner — adapt to dark */
html.dark .disc{background:#3a2d12;border-color:#5c4520;color:#fde68a}

/* Golden/amber inline-styled subscription cards on profile */
html.dark .card[style*="#fffbeb"]{background:linear-gradient(135deg,#3a2d12 0%,var(--bg-card) 60%)!important;border-color:#5c4520!important}
html.dark .card[style*="#fffbeb"] div[style*="color:var(--g900)"]{color:#fde68a!important}
html.dark .card[style*="#fffbeb"] div[style*="color:var(--g600)"]{color:#a89b7a!important}
html.dark .card[style*="#fffbeb"] strong[style*="color:#d97706"]{color:#fbbf24!important}

/* Red/expired inline-styled cards */
html.dark .card[style*="#fef2f2"]{background:linear-gradient(135deg,#2a1010 0%,var(--bg-card) 60%)!important;border-color:#5c2020!important}
html.dark .card[style*="#fef2f2"] div[style*="color:var(--g900)"]{color:#fca5a5!important}
html.dark .card[style*="#fef2f2"] div[style*="color:var(--g600)"]{color:#a87878!important}

/* Inline golden notes (e.g., warning boxes inside detail page) */
html.dark div[style*="background:linear-gradient(135deg,#fffbeb,#fff)"],
html.dark div[style*="background:linear-gradient(135deg,#fffbeb 0%,#fff 100%)"]{background:linear-gradient(135deg,#3a2d12,var(--bg-card))!important;border-color:#5c4520!important;color:#fde68a!important}
html.dark div[style*="background:linear-gradient(135deg,#fffbeb,#fff)"] *,
html.dark div[style*="background:linear-gradient(135deg,#fffbeb 0%,#fff 100%)"] *{color:#fde68a!important}

/* Tip/info boxes (.feebox) */
html.dark .feebox{background:var(--bg-elevated);border-color:var(--border)}
html.dark .feebox .txt{color:var(--text-secondary)}

/* Progress track */
html.dark .ptrack{background:var(--bg-hover)}

/* Card headers borders */
html.dark .chdr{border-color:var(--border-soft);background:transparent}
html.dark .cfoot{border-color:var(--border-soft);background:var(--bg-elevated)}

/* Profile/credit-limit divider lines */
html.dark .card div[style*="border-top:1px solid var(--g100)"]{border-color:var(--border-soft)!important}
html.dark .card div[style*="border-bottom:1px solid var(--g100)"]{border-color:var(--border-soft)!important}

/* Star/rating empty colors */
html.dark .ival,html.dark .ilbl{color:inherit}

/* Logo color adapts to theme — teal in light mode, lighter teal/mint in dark mode */
html.dark .qlogo-wrap{color:#5eead4!important}
html.dark svg[viewbox="0 0 120 120"][color],
html.dark svg[viewBox="0 0 120 120"][style*="#0d9488"]{color:#5eead4!important}
/* Override inline color style on logo SVGs in dark mode */
html.dark .sb-top svg,
html.dark .pmod-logo svg,
html.dark .menu-hdr svg{color:#5eead4!important}
/* Universal: any SVG using currentColor with our 12-rect signature */
html.dark svg g[fill="currentColor"]{color:#5eead4}

/* Theme toggle switch */
.theme-toggle{width:42px;height:24px;background:var(--g300);border-radius:12px;position:relative;flex-shrink:0;transition:background .2s;margin-inline-start:auto}
.theme-knob{width:18px;height:18px;background:#fff;border-radius:50%;position:absolute;top:3px;inset-inline-start:3px;transition:all .25s cubic-bezier(.4,0,.2,1);box-shadow:0 2px 6px rgba(0,0,0,.15)}
html.dark .theme-toggle{background:var(--teal2)}
html.dark .theme-knob{inset-inline-start:21px}

/* اسمح بتحديد النص في الحقول والمناطق التي يحتاج المستخدم نسخها */

  -webkit-user-select:text;
  -moz-user-select:text;
  -ms-user-select:text;
  user-select:text
}

/* QASTNI LOGO ANIMATION: rotate + radial converge + shine */
.qlogo-wrap{position:relative;display:inline-flex;align-items:center;justify-content:center}
.qlogo-wrap svg{width:100%;height:100%;animation:qrot 3.6s linear infinite}
.qlogo-wrap .qp{transform-origin:0 0;animation:qconverge 3.6s cubic-bezier(.55,0,.45,1) infinite}
@keyframes qrot{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes qconverge{
  0%,30%   {transform:rotate(var(--a)) translateY(0) rotate(calc(-1 * var(--a)))}
  47%,53%  {transform:rotate(var(--a)) translateY(38px) rotate(calc(-1 * var(--a)))}
  70%,100% {transform:rotate(var(--a)) translateY(0) rotate(calc(-1 * var(--a)))}
}
.qshine{position:absolute;top:50%;left:50%;width:55px;height:55px;margin:-27px 0 0 -27px;border-radius:50%;background:radial-gradient(circle,#fff 0%,rgba(204,251,241,.55) 40%,transparent 70%);animation:qflash 3.6s ease-in-out infinite;pointer-events:none;filter:blur(3px)}
@keyframes qflash{
  0%,40%{opacity:0;transform:scale(.2)}
  48%{opacity:1;transform:scale(1.5)}
  56%{opacity:.5;transform:scale(2.2)}
  65%,100%{opacity:0;transform:scale(.2)}
}
.qlogo-wrap.sm .qshine{width:22px;height:22px;margin:-11px 0 0 -11px}

.text-sm{font-size:12px}.text-xs{font-size:11px}.text-m{color:var(--g500)}.fw7{font-weight:700}
.ptit{font-size:20px;font-weight:800;color:var(--g900);margin-bottom:3px}
.psub{font-size:12.5px;color:var(--g500);margin-bottom:20px;line-height:1.5}
.shdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:12px}
