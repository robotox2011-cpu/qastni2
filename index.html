// إنشاء إشعارات تلقائية بناءً على الأحداث
function generateAutoNotifs(){
  if(!CU||!DEALS)return
  const now=Date.now()
  const lastCheck=parseInt(localStorage.getItem('qastni_last_notif_check')||'0')

  // إشعارات للصفقات الواردة الجديدة (Pending)
  DEALS.filter(d=>d.buyer_email===CU.email&&d.status==='pending'&&new Date(d.created_at).getTime()>lastCheck).forEach(d=>{
    addNotif(
      isAr()?`📥 وصلك عرض تقسيط جديد من <strong>${san(d.seller_name||d.seller_email)}</strong>`:`New offer from ${san(d.seller_name)}`,
      'info','📥'
    )
  })

  // إشعار للأقساط القادمة خلال 3 أيام
  const threeDays=3*24*60*60*1000
  DEALS.filter(d=>d.status==='active'&&(d.buyer_email===CU.email||d.buyer_id===CU.id)).forEach(d=>{
    const upcomingPays=(d.payments||[]).filter(p=>!p.is_paid)
    upcomingPays.forEach(p=>{
      const dueTime=new Date(p.due_date).getTime()
      const diff=dueTime-now
      if(diff>0&&diff<=threeDays){
        const exists=_notifs.some(n=>n.id&&n.id.toString().includes(p.id))
        if(!exists){
          const days=Math.ceil(diff/(24*60*60*1000))
          addNotif(
            isAr()?`⏰ موعد قسط <strong>${fmtSAR(p.amount+(p.platform_fee||0))}</strong> خلال ${days} ${days===1?'يوم':'أيام'}`:`Payment ${fmtSAR(p.amount)} due in ${days}d`,
            'warning','⏰'
          )
        }
      }
    })
  })

  localStorage.setItem('qastni_last_notif_check',now.toString())
}

// 📰 ACTIVITY FEED
// ═══════════════════════════════════════════════
function getActivityFeed(){
  if(!DEALS||!CU)return []
  const items=[]
  const now=Date.now()

  DEALS.forEach(d=>{
    const isBuyer=d.buyer_id===CU.id||d.buyer_email===CU.email
    const isSeller=d.seller_id===CU.id||d.seller_email===CU.email
    const otherName=isBuyer?(d.seller_name||d.seller_email):(d.buyer_name||d.buyer_email)

    // إنشاء الصفقة
    items.push({
      time:new Date(d.created_at).getTime(),
      type:'deal',
      ico:'📋',
      text:isAr()
        ?(isSeller?`أنشأت عرض تقسيط لـ <strong>${san(otherName)}</strong>`:`وصلك عرض تقسيط من <strong>${san(otherName)}</strong>`)
        :(isSeller?`Created offer for ${san(otherName)}`:`Received offer from ${san(otherName)}`)
    })

    // قبول الصفقة
    if(d.accepted_at){
      items.push({
        time:new Date(d.accepted_at).getTime(),
        type:'success',
        ico:'✓',
        text:isAr()?`تم قبول الصفقة مع <strong>${san(otherName)}</strong>`:`Deal accepted with ${san(otherName)}`
      })
    }

    // اكتمال الصفقة
    if(d.completed_at){
      items.push({
        time:new Date(d.completed_at).getTime(),
        type:'success',
        ico:'🎉',
        text:isAr()?`اكتملت الصفقة مع <strong>${san(otherName)}</strong>`:`Deal completed with ${san(otherName)}`
      })
    }

    // المدفوعات
    ;(d.payments||[]).filter(p=>p.is_paid&&p.paid_at).forEach(p=>{
      items.push({
        time:new Date(p.paid_at).getTime(),
        type:'payment',
        ico:'💳',
        text:isAr()
          ?(isBuyer?`دفعت قسط <strong>${fmtSAR(p.amount+(p.platform_fee||0))}</strong>`:`استلمت قسط من <strong>${san(otherName)}</strong>`)
          :(isBuyer?`Paid ${fmtSAR(p.amount)}`:`Received payment from ${san(otherName)}`)
      })
    })
  })

  // ترتيب من الأحدث للأقدم
  items.sort((a,b)=>b.time-a.time)
  return items.slice(0,7)
}

function renderActivityFeed(){
  const items=getActivityFeed()
  if(items.length===0){
    return `<div class="feed-card">
      <div class="feed-header">
        <div class="feed-header-icon">📰</div>
        <div class="feed-header-title">${isAr()?'نشاطك الأخير':'Recent Activity'}</div>

// ═══════════════════════════════════════════════
// 📲 APP INSTALL BANNER
// ═══════════════════════════════════════════════
const INSTALL_KEY='qastni_install_dismissed'
const VISIT_KEY='qastni_visit_count'
let _deferredInstallPrompt=null

window.addEventListener('beforeinstallprompt',(e)=>{
  e.preventDefault()
  _deferredInstallPrompt=e
  Q.log('Install prompt available')
})

function maybeShowInstallBanner(){
  try{
    // تجاهل لو رفض المستخدم
    if(localStorage.getItem(INSTALL_KEY))return
    // تجاهل لو مفعّل أصلاً (PWA installed)
    if(window.matchMedia('(display-mode: standalone)').matches)return
    if(window.navigator.standalone)return

    // عداد الزيارات
    const visits=parseInt(localStorage.getItem(VISIT_KEY)||'0')+1
    localStorage.setItem(VISIT_KEY,visits.toString())

    // تظهر بعد الزيارة الثالثة
    if(visits<3)return

    setTimeout(()=>showInstallBanner(),3000)
  }catch(e){}
}

function showInstallBanner(){
  const b=$('install-banner')
  if(!b)return
  const isIOS=/iPhone|iPad|iPod/.test(navigator.userAgent)
  b.innerHTML=`
    <div class="install-banner-icon">${LOGO_W(28)}</div>
    <div class="install-banner-content">
      <div class="install-banner-title">${isAr()?'ثبّت قسطني كتطبيق':'Install Qastni as app'}</div>
      <div class="install-banner-desc">${isAr()?'وصول أسرع وتجربة أفخم 🚀':'Faster access & better experience 🚀'}</div>
    </div>
    <div class="install-banner-actions">
      <button class="install-banner-btn" onclick="installApp()">${isAr()?'تثبيت':'Install'}</button>
      <button class="install-banner-close" onclick="dismissInstallBanner()">${isAr()?'لاحقاً':'Later'}</button>
    </div>
  `
  b.classList.remove('hidden')
}
window.installApp=async()=>{
  if(_deferredInstallPrompt){
    _deferredInstallPrompt.prompt()
    const{outcome}=await _deferredInstallPrompt.userChoice
    if(outcome==='accepted'){
      toast(isAr()?'🎉 تم تثبيت قسطني بنجاح!':'🎉 Qastni installed!','s')
      try{localStorage.setItem(INSTALL_KEY,'1')}catch(e){}
    }
    _deferredInstallPrompt=null
    dismissInstallBanner()
  }else{
    // iOS — تعليمات يدوية
    const isIOS=/iPhone|iPad|iPod/.test(navigator.userAgent)
    if(isIOS){
      toast(isAr()?'📱 اضغط زر المشاركة في Safari ثم "أضف إلى الشاشة الرئيسية"':'📱 Tap Share in Safari, then "Add to Home Screen"','i')
    }else{
      toast(isAr()?'📱 افتح القائمة في المتصفح وابحث عن "تثبيت التطبيق"':'📱 Open browser menu and find "Install app"','i')
    }
  }
}
window.dismissInstallBanner=()=>{
  const b=$('install-banner')
  if(b){
    b.style.transform='translateY(120%)'
    b.style.transition='transform .4s ease'
    setTimeout(()=>{b.classList.add('hidden');b.style.transform=''},400)
  }
  try{localStorage.setItem(INSTALL_KEY,'1')}catch(e){}
}

// ═══════════════════════════════════════════════
// 🌌 CINEMATIC EFFECTS — التأثيرات السينمائية
// ═══════════════════════════════════════════════

// ✨ توليد الجزيئات الذهبية المتساقطة
function spawnParticles(count=15){
  const bg=$('particles-bg')
  if(!bg)return
  bg.innerHTML=''
  for(let i=0;i<count;i++){
    const p=document.createElement('div')
    p.className='particle'
    const left=Math.random()*100
    const dur=15+Math.random()*15
    const delay=Math.random()*15
    const size=2+Math.random()*4
    const drift=(Math.random()-.5)*200
    const opacity=.3+Math.random()*.5
    p.style.cssText=`
      left:${left}%;
      bottom:0;
      width:${size}px;
      height:${size}px;
      opacity:${opacity};
      --drift:${drift}px;
      animation:floatParticle ${dur}s linear ${delay}s infinite;
    `
    bg.appendChild(p)
  }
}

// 🔢 Counter Animation — أرقام تعد من الصفر
function animateCounter(el,target,duration=1500,prefix='',suffix=''){
  if(!el)return
  const start=parseFloat(el.dataset.current||0)
  const startTime=performance.now()
  const range=target-start
  function update(now){
    const elapsed=now-startTime
    const progress=Math.min(elapsed/duration,1)
    // ease out cubic
    const eased=1-Math.pow(1-progress,3)
    const current=start+range*eased
    el.textContent=prefix+(target>=1000?Math.round(current).toLocaleString('en-US'):Math.round(current).toString())+suffix
    if(progress<1){
      requestAnimationFrame(update)
    }else{
      el.dataset.current=target
      el.classList.add('counter-update')
      setTimeout(()=>el.classList.remove('counter-update'),400)
    }
  }
  requestAnimationFrame(update)
}

// 🎨 3D Tilt Effect (للديسكتوب فقط)
function attachTiltEffects(){
  if(window.innerWidth<769)return
  document.querySelectorAll('.cinema-stat,.cinema-deal').forEach(card=>{
    if(card.dataset.tiltAttached)return
    card.dataset.tiltAttached='1'
    card.addEventListener('mousemove',(e)=>{
      const r=card.getBoundingClientRect()
      const x=e.clientX-r.left
      const y=e.clientY-r.top
      const cx=r.width/2
      const cy=r.height/2
      const rx=((y-cy)/cy)*-3
      const ry=((x-cx)/cx)*3
      card.style.transform=`perspective(1000px) rotateX(${rx}deg) rotateY(${ry}deg) translateY(-3px)`
    })
    card.addEventListener('mouseleave',()=>{
      card.style.transform=''
    })
  })
}

// 📊 Initialize cinematic effects
function initCinematicEffects(){
  spawnParticles(15)
  // إعادة توليد الجزيئات كل 30 ثانية لتنويع الحركة
  setInterval(()=>{spawnParticles(15)},30000)
}

// تشغيل الجزيئات لما الموقع يحمّل
if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded',initCinematicEffects)
}else{
  initCinematicEffects()
}

// ═══════════════════════════════════════════════
// 🚀 SESSION INITIALIZATION
// ═══════════════════════════════════════════════
async function initSession(session){
  try{
    CU=session.user
    const{data:p,error:pe}=await sb.from('profiles').select('*').eq('id',CU.id).maybeSingle()
    if(pe)Q.warn('Profile fetch warning:',pe)
    PRF=p||{full_name:CU.user_metadata?.full_name||'',phone:CU.user_metadata?.phone||'',national_id:CU.user_metadata?.national_id||''}
    await loadDeals()

    // ═══ تحميل الإشعارات وإنشاء الإشعارات التلقائية ═══
    loadNotifs()
    generateAutoNotifs()

    buildShell()
    let savedPage='dash',savedPP={}
    try{
      const sp=sessionStorage.getItem('q_page')
      const spp=sessionStorage.getItem('q_pp')
      if(sp&&PAGES.includes(sp))savedPage=sp
      if(spp)savedPP=JSON.parse(spp)||{}
    }catch(e){}
    await nav(savedPage,savedPP)
    updNotifBadge()

    try{
      // Debounced realtime listener - فقط نحدّث البيانات بدون إعادة رسم
      let _rtDebounce=null
      _rtChannel=sb.channel('qrt_'+CU.id).on('postgres_changes',{event:'*',schema:'public',table:'deals'},()=>{
        clearTimeout(_rtDebounce)
        _rtDebounce=setTimeout(async()=>{
          try{
            await loadDeals()
            updBadge()
            generateAutoNotifs()  // ✨ إشعارات تلقائية على التحديثات
          }catch(e){Q.warn('rt refresh:',e)}
        },1500)
      }).subscribe()
    }catch(e){Q.warn('Realtime setup failed (non-critical):',e)}

    // ═══ بعد التحميل: عرض الـ Onboarding للمستخدمين الجدد + Install Banner ═══
    setTimeout(()=>{
      maybeShowOnboarding()
      maybeShowInstallBanner()
    },1200)
  }catch(e){
    Q.error('Session init failed:',e)
    _started=false
    CU=null;PRF=null;DEALS=[]
    $('app').innerHTML=getAuthHTML()
    applyLang()
    toast(isAr()?'⚠️ حدث خطأ في تحميل البيانات':'⚠️ Error loading data','e')
  }finally{
    hideSplash()
  }
}

sb.auth.onAuthStateChange((event,session)=>{
  Q.log('[auth]',event,!!session)
  if(event==='SIGNED_OUT'){
    _started=false
    CU=null;PRF=null;DEALS=[]
    if(_rtChannel){try{sb.removeChannel(_rtChannel)}catch(e){}_rtChannel=null}
    $('app').innerHTML=getAuthHTML()
    applyLang()
    return
  }
  if(event==='SIGNED_IN'&&!_started&&session){
    _started=true
    initSession(session)
  }
})

;(async()=>{
  try{
    Q.log('[boot] checking session...')
    const{data:{session}}=await sb.auth.getSession()
    Q.log('[boot] session:',!!session)
    if(session&&!_started){
      _started=true
      await initSession(session)
    }else if(!session){
      $('app').innerHTML=getAuthHTML()
      applyLang()
      hideSplash()
    }
  }catch(e){
    console.error('[boot] error:',e)
    $('app').innerHTML=getAuthHTML()
    applyLang()
    hideSplash()
  }
})()
</script>
