<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>قسطني | Qastni</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --teal:#0d9488;--teal2:#0f766e;--teal3:#ccfbf1;
  --b600:#2563eb;--b700:#1d4ed8;--b800:#1e40af;--b50:#eff6ff;--b100:#dbeafe;--b200:#bfdbfe;--b500:#3b82f6;
  --g50:#f8fafc;--g100:#f1f5f9;--g200:#e2e8f0;--g300:#cbd5e1;--g400:#94a3b8;--g500:#64748b;--g600:#475569;--g700:#334155;--g800:#1e293b;--g900:#0f172a;
  --gr50:#f0fdf4;--gr100:#dcfce7;--gr600:#16a34a;--gr700:#15803d;
  --r50:#fef2f2;--r100:#fee2e2;--r500:#ef4444;--r600:#dc2626;
  --am50:#fffbeb;--am100:#fef3c7;--am500:#f59e0b;--am600:#d97706;
  --white:#fff;
  --sh:0 1px 3px rgba(0,0,0,.07);--shm:0 4px 16px rgba(0,0,0,.09);--shl:0 12px 32px rgba(0,0,0,.11);
  --r8:8px;--r10:10px;--r12:12px;--r16:16px;--r20:20px;--r24:24px;
}
html{font-size:16px;scroll-behavior:smooth}
body{font-family:'Tajawal',sans-serif;background:var(--g50);color:var(--g900);min-height:100vh;direction:rtl;-webkit-font-smoothing:antialiased}
body.en{direction:ltr}
.hidden{display:none!important}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--teal);border-radius:10px;opacity:.5}

/* SPLASH */
#splash{position:fixed;inset:0;background:#f0fafa;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:9999;transition:opacity .5s ease}
#splash-name{font-size:20px;font-weight:900;color:var(--teal2);letter-spacing:1px}
#splash-sub{font-size:12px;color:var(--g400)}
@keyframes spinDots{to{transform:rotate(360deg)}}
.spin{animation:spinDots 2.5s linear infinite}

/* LAYOUT */
.shell{display:flex;min-height:100vh}
.sidebar{width:240px;min-width:240px;background:var(--white);border-inline-end:1px solid var(--g200);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;z-index:20;box-shadow:2px 0 8px rgba(0,0,0,.04)}
.main{flex:1;overflow-x:hidden;display:flex;flex-direction:column;min-width:0}
.topbar{background:var(--white);border-bottom:1px solid var(--g200);padding:0 22px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:15;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.page{padding:24px;flex:1}
.pi{animation:pi .22s ease}
@keyframes pi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}

/* SIDEBAR */
.sb-top{padding:16px 14px 12px;border-bottom:1px solid var(--g100);display:flex;align-items:center;gap:9px}
.sb-name{font-size:16px;font-weight:900;color:var(--teal2)}
.sb-tag{font-size:10px;color:var(--g400);margin-top:1px}
.sb-nav{padding:8px 6px;flex:1}
.sb-section{font-size:10px;font-weight:700;color:var(--g400);text-transform:uppercase;letter-spacing:.6px;padding:8px 10px 4px}
.ni{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:var(--r8);font-size:13px;font-weight:500;color:var(--g600);cursor:pointer;transition:all .14s;border:none;background:none;width:100%;text-align:inherit;margin-bottom:1px;position:relative}
.ni:hover{background:var(--teal3);color:var(--teal2)}
.ni.active{background:var(--teal3);color:var(--teal2);font-weight:700}
.ni.active::before{content:'';position:absolute;inset-inline-start:0;top:5px;bottom:5px;width:3px;background:var(--teal);border-radius:0 3px 3px 0}
.nic{font-size:15px;width:20px;text-align:center;flex-shrink:0}
.nbadge{background:var(--r500);color:#fff;font-size:10px;font-weight:700;min-width:17px;height:17px;padding:0 4px;border-radius:99px;display:flex;align-items:center;justify-content:center;margin-inline-start:auto}
.sb-foot{padding:8px 6px;border-top:1px solid var(--g100)}
.sb-user{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:var(--r10);background:var(--g50);border:1px solid var(--g200);margin-bottom:7px}
.sb-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0;color:#fff}
.sb-uname{font-size:12px;font-weight:700;color:var(--g800);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-uemail{font-size:10px;color:var(--g400);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* CARDS */
.card{background:var(--white);border:1px solid var(--g200);border-radius:var(--r16);box-shadow:var(--sh);overflow:hidden}
.chdr{padding:14px 18px 12px;border-bottom:1px solid var(--g100);display:flex;align-items:center;justify-content:space-between;gap:12px}
.chdr h2,.chdr h3{flex:1;font-size:13.5px;font-weight:700;color:var(--g800)}
.cbody{padding:16px 18px}
.cfoot{padding:12px 18px;border-top:1px solid var(--g100);background:var(--g50);border-radius:0 0 var(--r16) var(--r16)}

/* BTNS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:8px 15px;border-radius:var(--r8);font-size:12.5px;font-weight:600;font-family:inherit;cursor:pointer;border:none;transition:all .14s;white-space:nowrap;line-height:1.4}
.btn:disabled{opacity:.45;cursor:not-allowed;pointer-events:none}
.bp{background:var(--teal);color:#fff}.bp:hover{background:var(--teal2);transform:translateY(-1px)}
.bsec{background:var(--teal3);color:var(--teal2);border:1.5px solid #99f6e4}.bsec:hover{background:#a7f3d0}
.bg{background:transparent;color:var(--g600);border:1.5px solid var(--g300)}.bg:hover{background:var(--g100)}
.bd{background:var(--r50);color:var(--r600);border:1.5px solid #fca5a5}
.bs{background:var(--gr50);color:var(--gr700);border:1.5px solid #86efac}
.bsm{padding:5px 11px;font-size:11.5px;border-radius:6px}
.blg{padding:11px 22px;font-size:13.5px;border-radius:var(--r10)}
.bfull{width:100%;justify-content:center}
.lbtn{padding:4px 11px;border-radius:99px;font-size:11px;font-weight:700;cursor:pointer;border:1.5px solid var(--teal);background:var(--teal3);color:var(--teal2);transition:all .14s;font-family:inherit}

/* FORMS */
.fg{margin-bottom:14px}
.fl{display:block;font-size:11.5px;font-weight:700;color:var(--g700);margin-bottom:4px}
.req{color:var(--r600);margin-inline-start:2px}
.fc{width:100%;padding:8px 12px;border:1.5px solid var(--g300);border-radius:var(--r8);font-size:13px;font-family:inherit;color:var(--g900);background:var(--white);transition:all .14s;outline:none}
.fc:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(13,148,136,.12)}
.fc::placeholder{color:var(--g400)}
textarea.fc{resize:vertical;min-height:70px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fhint{font-size:11px;color:var(--g400);margin-top:3px}
.calcbox{background:linear-gradient(135deg,var(--teal3),#e0f2fe);border:1.5px solid #99f6e4;border-radius:var(--r10);padding:12px 15px;margin-top:5px;display:flex;align-items:center;justify-content:space-between}
.calclbl{font-size:12px;font-weight:700;color:var(--teal2)}
.calcval{font-size:20px;font-weight:900;color:var(--teal2)}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:99px;font-size:11px;font-weight:700}
.bdot{width:5px;height:5px;border-radius:50%}
.b-teal{background:var(--teal3);color:var(--teal2)}.b-teal .bdot{background:var(--teal)}
.b-green{background:var(--gr100);color:var(--gr700)}.b-green .bdot{background:var(--gr600)}
.b-red{background:var(--r100);color:var(--r600)}.b-red .bdot{background:var(--r500)}
.b-amber{background:var(--am100);color:var(--am600)}.b-amber .bdot{background:var(--am500)}
.b-gray{background:var(--g100);color:var(--g600)}.b-gray .bdot{background:var(--g400)}

/* STATS */
.sgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:22px}
.scard{background:var(--white);border:1px solid var(--g200);border-radius:var(--r16);padding:15px 16px;box-shadow:var(--sh);transition:all .14s}
.scard:hover{box-shadow:var(--shm);transform:translateY(-2px)}
.sico{width:36px;height:36px;border-radius:var(--r10);display:flex;align-items:center;justify-content:center;font-size:16px;margin-bottom:9px}
.sval{font-size:24px;font-weight:900;color:var(--g900);line-height:1}
.slbl{font-size:11px;color:var(--g500);margin-top:3px;font-weight:500}

/* DEAL CARD */
.dcard{background:var(--white);border:1px solid var(--g200);border-radius:var(--r16);padding:15px 16px;display:flex;align-items:flex-start;gap:12px;cursor:pointer;transition:all .15s;box-shadow:var(--sh);margin-bottom:9px}
.dcard:hover{border-color:var(--teal);box-shadow:var(--shm);transform:translateY(-1px)}
.dico{width:42px;height:42px;border-radius:var(--r10);background:linear-gradient(135deg,var(--teal3),#e0f2fe);display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0;border:1px solid #99f6e4}
.dbody{flex:1;min-width:0}
.dtit{font-size:13.5px;font-weight:700;color:var(--g900);margin-bottom:2px}
.dmeta{font-size:11px;color:var(--g400);margin-bottom:5px}
.dright{text-align:end;flex-shrink:0}
.dprice{font-size:14px;font-weight:800;color:var(--teal2)}
.dpsub{font-size:10px;color:var(--g400);margin-top:2px}
.ptrack{height:4px;background:var(--g100);border-radius:99px;overflow:hidden;margin-top:5px}
.pfill{height:100%;border-radius:99px;transition:width .5s;background:linear-gradient(90deg,var(--teal),var(--teal2))}
.plbl{display:flex;justify-content:space-between;font-size:10px;margin-top:3px;color:var(--g500)}

/* INFO */
.igrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.igrid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.iitem{background:var(--g50);border-radius:var(--r10);padding:10px 12px;border:1px solid var(--g200)}
.ilbl{font-size:10px;font-weight:700;color:var(--g400);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
.ival{font-size:13.5px;font-weight:700;color:var(--g900)}
.ival.teal{color:var(--teal2)}
.isub{font-size:11px;color:var(--g400);margin-top:2px}

/* TABLE */
.ptbl{width:100%;border-collapse:collapse}
.ptbl th{text-align:start;padding:9px 12px;font-size:11px;font-weight:700;color:var(--g500);background:var(--g50);border-bottom:1.5px solid var(--g200)}
.ptbl td{padding:10px 12px;font-size:12.5px;color:var(--g700);border-bottom:1px solid var(--g100);vertical-align:middle}
.ptbl tr:last-child td{border-bottom:none}
.ptbl tr.rpaid{background:linear-gradient(90deg,var(--gr50),var(--white))}
.ptbl tr.rov{background:linear-gradient(90deg,var(--am50),var(--white))}
.ptbl tbody tr:hover td{background:var(--teal3);opacity:.7}

/* TABS */
.tabbar{display:flex;gap:2px;background:var(--g100);padding:3px;border-radius:var(--r10);margin-bottom:16px;width:fit-content}
.tbn{padding:6px 13px;font-size:12px;font-weight:600;border:none;background:transparent;border-radius:var(--r8);cursor:pointer;color:var(--g500);transition:all .14s;font-family:inherit}
.tbn.active{background:var(--white);color:var(--teal2);box-shadow:var(--sh)}

/* AUTH */
.auth-screen{min-height:100vh;background:linear-gradient(145deg,#0f2a2a,#0f766e 60%,#0d9488);display:flex;align-items:center;justify-content:center;padding:20px;position:relative;overflow:hidden}
.auth-screen::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 20%,rgba(13,148,136,.3),transparent 60%);pointer-events:none}
.auth-card{background:var(--white);border-radius:var(--r24);box-shadow:0 24px 60px rgba(0,0,0,.2);width:100%;max-width:415px;overflow:hidden;position:relative;z-index:1}
.ahdr{background:linear-gradient(135deg,var(--teal2),#065f46);padding:28px 28px 24px;text-align:center}
.atitle{font-size:22px;font-weight:900;color:#fff;margin-top:5px}
.asub{font-size:12px;color:rgba(255,255,255,.65);margin-top:3px}
.atabs{display:flex;background:rgba(0,0,0,.2);border-radius:var(--r8);padding:3px;margin-top:14px}
.atab{flex:1;padding:6px;font-size:12px;font-weight:700;border:none;background:transparent;color:rgba(255,255,255,.55);border-radius:6px;cursor:pointer;transition:all .14s;font-family:inherit}
.atab.active{background:rgba(255,255,255,.2);color:#fff}
.abody{padding:24px 26px}
.afoot{padding:12px 26px;background:var(--g50);border-top:1px solid var(--g200);text-align:center;font-size:11px;color:var(--g400);line-height:1.5}
.alert{padding:10px 13px;border-radius:var(--r8);font-size:12px;font-weight:600;margin-bottom:13px;border:1px solid transparent}
.alert-d{background:var(--r50);color:var(--r600);border-color:#fca5a5}

/* MODAL */
.moverlay{position:fixed;inset:0;background:rgba(15,23,42,.6);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
.modal{background:var(--white);border-radius:var(--r20);box-shadow:var(--shl);width:100%;max-width:400px;animation:pi .2s ease}
.mhdr{padding:16px 20px 13px;border-bottom:1px solid var(--g100);display:flex;align-items:center;justify-content:space-between}
.mclose{font-size:16px;cursor:pointer;color:var(--g400);border:none;background:none;padding:3px;border-radius:6px}
.mclose:hover{background:var(--g100)}
.mbody{padding:16px 20px}
.mfoot{padding:13px 20px;border-top:1px solid var(--g100);display:flex;gap:8px;justify-content:flex-end}
.srate{font-size:28px;cursor:pointer;transition:transform .1s;opacity:.3;filter:grayscale(1)}
.srate.active,.srate:hover{opacity:1;filter:none;transform:scale(1.15)}

/* CONTRACT */
.cw{background:var(--white);border:2px solid var(--g200);border-radius:var(--r16);overflow:hidden}
.cwh{background:linear-gradient(135deg,#0f2a2a,var(--teal2));padding:22px 26px;text-align:center;color:#fff}
.cwb{padding:22px 26px}
.cwst{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--g400);margin-bottom:9px;padding-bottom:6px;border-bottom:1.5px solid var(--g100)}
.cwpar{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.cwp{background:var(--g50);border:1px solid var(--g200);border-radius:var(--r10);padding:11px 13px}
.cwpr{font-size:10px;font-weight:700;text-transform:uppercase;color:var(--g400);margin-bottom:4px}
.cwpn{font-size:13.5px;font-weight:700;color:var(--g900)}
.cwfin{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.cwfi{background:var(--teal3);border:1px solid #99f6e4;border-radius:var(--r8);padding:10px 12px}
.cwfl{font-size:10px;font-weight:700;text-transform:uppercase;color:var(--teal2);margin-bottom:3px}
.cwfv{font-size:14px;font-weight:800;color:var(--teal2)}
.cwterms{background:var(--g50);border:1px solid var(--g200);border-radius:var(--r10);padding:13px 15px;font-size:12px;color:var(--g600);line-height:1.85}
.cwterms ol{padding-inline-start:16px}
.cwsig{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:18px}
.cwsg{border-top:1.5px solid var(--g300);padding-top:7px;text-align:center;font-size:11px;color:var(--g400)}
.cwft{padding:13px 26px;background:var(--g50);border-top:2px solid var(--g200);text-align:center;font-size:11px;color:var(--g400);line-height:1.55}

/* TOAST */
.tc{position:fixed;bottom:20px;inset-inline-end:20px;z-index:300;display:flex;flex-direction:column;gap:7px;pointer-events:none}
.toast{display:flex;align-items:center;gap:8px;padding:10px 16px;border-radius:var(--r10);font-size:12.5px;font-weight:600;box-shadow:var(--shl);pointer-events:auto;min-width:210px;animation:pi .25s ease}
.t-exit{animation:tex .22s ease forwards}
@keyframes tex{to{opacity:0;transform:translateY(7px)}}
.t-s{background:linear-gradient(135deg,var(--teal2),var(--teal));color:#fff}
.t-e{background:linear-gradient(135deg,var(--r600),#b91c1c);color:#fff}
.t-i{background:linear-gradient(135deg,var(--b700),var(--b600));color:#fff}

/* UTILS */
.disc{background:var(--am50);border:1px solid #fde68a;border-radius:var(--r8);padding:9px 13px;font-size:11px;font-weight:500;color:var(--am600);margin-bottom:16px;display:flex;align-items:center;gap:7px}
.empty{text-align:center;padding:44px 20px;display:flex;flex-direction:column;align-items:center;gap:8px}
.eico{font-size:34px;opacity:.3}
.etit{font-size:14px;font-weight:700;color:var(--g700)}
.divider{height:1px;background:var(--g100);margin:13px 0}
.flex{display:flex}.aic{align-items:center}.jsb{justify-content:space-between}.jce{justify-content:flex-end}
.gap8{gap:8px}.gap10{gap:10px}.gap12{gap:12px}
.mt8{margin-top:8px}.mt12{margin-top:12px}.mt16{margin-top:16px}.mt20{margin-top:20px}
.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}.mb16{margin-bottom:16px}.mb20{margin-bottom:20px}
.text-sm{font-size:12px}.text-xs{font-size:11px}.text-m{color:var(--g500)}.fw7{font-weight:700}
.ptit{font-size:20px;font-weight:800;color:var(--g900);margin-bottom:3px}
.psub{font-size:12.5px;color:var(--g500);margin-bottom:20px;line-height:1.5}
.shdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:12px}
.stit{font-size:14px;font-weight:700;color:var(--g900)}
.tscroll{overflow-x:auto}
.spinner{width:17px;height:17px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spinDots .7s linear infinite;display:inline-block}

@media(max-width:768px){
  .sidebar{display:none}.page{padding:13px}
  .frow{grid-template-columns:1fr}.sgrid{grid-template-columns:1fr 1fr}
  .igrid,.igrid3,.cwpar,.cwfin,.cwsig{grid-template-columns:1fr}.tabbar{width:100%}
}
@media(max-width:480px){.sgrid{grid-template-columns:1fr}}
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <svg class="spin" viewBox="0 0 120 120" width="90" height="90">
    <g transform="translate(60,60)">
      <rect x="-6" y="-46" width="12" height="12" rx="3" fill="#0d9488"/>
      <rect x="-6" y="-46" width="12" height="12" rx="3" fill="#0d9488" transform="rotate(30)"/>
      <rect x="-6" y="-46" width="12" height="12" rx="3" fill="#0d9488" transform="rotate(60)"/>
      <rect x="-6" y="-46" width="12" height="12" rx="3" fill="#0d9488" transform="rotate(90)"/>
      <rect x="-6" y="-46" width="12" height="12" rx="3" fill="#0d9488" transform="rotate(120)"/>
      <rect x="-6" y="-46" width="12" height="12" rx="3" fill="#0d9488" transform="rotate(150)"/>
      <rect x="-6" y="-46" width="12" height="12" rx="3" fill="#0d9488" transform="rotate(180)"/>
      <rect x="-6" y="-46" width="12" height="12" rx="3" fill="#0d9488" transform="rotate(210)"/>
      <rect x="-6" y="-46" width="12" height="12" rx="3" fill="#0d9488" transform="rotate(240)"/>
      <rect x="-6" y="-46" width="12" height="12" rx="3" fill="#0d9488" transform="rotate(270)"/>
      <rect x="-6" y="-46" width="12" height="12" rx="3" fill="#0d9488" transform="rotate(300)"/>
      <rect x="-6" y="-46" width="12" height="12" rx="3" fill="#0d9488" transform="rotate(330)"/>
    </g>
  </svg>
  <div id="splash-name">قسطني</div>
  <div id="splash-sub">جاري التحميل...</div>
</div>

<div id="app"></div>

<!-- RATING MODAL -->
<div class="moverlay hidden" id="rmodal">
  <div class="modal">
    <div class="mhdr"><h3>⭐ تقييم الطرف الآخر</h3><button class="mclose" onclick="closeRM()">✕</button></div>
    <div class="mbody" style="text-align:center">
      <p class="text-m mb12">كيف كانت تجربتك في هذه الصفقة؟</p>
      <div style="display:flex;gap:7px;justify-content:center;margin:14px 0">

window.doLogin=async()=>{
  if(!checkRL('login',2000))return
  const em=$('l-em')?.value.trim().toLowerCase(),pw=$('l-pw')?.value
  $('lerr')?.classList.add('hidden')
  if(!em||!pw){showErr('lerr',isAr()?'يرجى ملء الحقول':'Fill fields');return}
  if(!valEmail(em)){showErr('lerr',isAr()?'البريد غير صالح':'Invalid email');return}
  const btn=$('lbtn');btn.innerHTML='<span class="spinner"></span>';btn.disabled=true

}

window.doRegister=async()=>{
  if(!checkRL('reg',3000))return
  const nm=$('r-nm')?.value.trim(),em=$('r-em')?.value.trim().toLowerCase()
  const ph=$('r-ph')?.value.trim(),ni=$('r-ni')?.value.trim()
  const pw=$('r-pw')?.value,pw2=$('r-pw2')?.value
  $('rerr')?.classList.add('hidden')
  if(!nm||!em||!pw){showErr('rerr',isAr()?'يرجى ملء الحقول المطلوبة':'Fill required fields');return}
  if(!valEmail(em)){showErr('rerr',isAr()?'البريد غير صالح':'Invalid email');return}
  if(pw.length<8){showErr('rerr',isAr()?'كلمة المرور 8 أحرف على الأقل':'Min 8 chars');return}
  if(pw!==pw2){showErr('rerr',isAr()?'كلمتا المرور غير متطابقتان':'Passwords do not match');return}
  if(nm.length<2||nm.length>100){showErr('rerr',isAr()?'الاسم غير صالح':'Invalid name');return}
  const btn=$('rbtn');btn.innerHTML='<span class="spinner"></span>';btn.disabled=true
  const{error}=await sb.auth.signUp({email:em,password:pw,options:{data:{full_name:san(nm),phone:san(ph),national_id:san(ni)}}})
  if(error){showErr('rerr',error.message);btn.innerHTML=isAr()?'إنشاء الحساب':'Create Account';btn.disabled=false;return}
  await sb.auth.signInWithPassword({email:em,password:pw})
}

// ══ NAV ══
const PT={dash:{ar:'الرئيسية',en:'Dashboard'},create:{ar:'طلب جديد',en:'New Request'},incoming:{ar:'الطلبات الواردة',en:'Incoming'},deals:{ar:'صفقاتي',en:'My Deals'},detail:{ar:'تفاصيل الصفقة',en:'Deal Details'},profile:{ar:'ملفي الشخصي',en:'My Profile'}}
const PAGES=['dash','create','incoming','deals','detail','profile']
let _pp={}

window.nav=async(p,pp={})=>{
  page=p;_pp=pp
  PAGES.forEach(x=>{document.getElementById('pg-'+x)?.classList.add('hidden');document.getElementById('ni-'+x)?.classList.remove('active')})
  document.getElementById('pg-'+p)?.classList.remove('hidden')
  document.getElementById('ni-'+p)?.classList.add('active')
  const tb=$('ptbar');if(tb)tb.textContent=isAr()?(PT[p]?.ar||p):(PT[p]?.en||p)
  updBadge()
  try{
    if(p==='dash')rDash()
    if(p==='incoming')rInc()
    if(p==='deals')rDeals()
    if(p==='detail')await rDetail(pp.id)
    if(p==='profile')await rProfile()
    if(p==='create'){const cd=$('c-date');if(cd&&!cd.value)cd.value=today()}
  }catch(e){console.error('Render error:',e)}
}

function rerender(){
  applyLang()
  const tb=$('ptbar');if(tb)tb.textContent=isAr()?(PT[page]?.ar||page):(PT[page]?.en||page)
  try{
    if(page==='dash')rDash()
    if(page==='incoming')rInc()
    if(page==='deals')rDeals()
    if(page==='profile')rProfile()
    if(page==='detail'&&_pp.id)rDetail(_pp.id)
  }catch(e){console.error('Rerender error:',e)}
}

function updBadge(){
  const n=DEALS.filter(d=>d.seller_email===CU?.email&&d.status==='pending').length
  const b=$('ibadge');if(b){b.textContent=n;b.classList.toggle('hidden',n===0)}
}

async function loadSBStars(){
  try{
    const{data}=await sb.from('ratings').select('stars').eq('to_email',CU.email)
    const el=$('sbstars');if(!el)return
    if(!data?.length){el.innerHTML=`<span style="font-size:10px;color:var(--g400)">${isAr()?'لا تقييمات':'No ratings'}</span>`;return}
    const avg=Math.round(data.reduce((s,r)=>s+r.stars,0)/data.length*10)/10
    el.innerHTML=stars(avg,data.length,11)
  }catch(e){console.warn('loadSBStars error:',e)}
}

async function loadDeals(){
  try{
    const{data,error}=await sb.from('deals').select('*,payments(*)').or(`buyer_id.eq.${CU.id},seller_email.eq.${CU.email}`).order('created_at',{ascending:false})
    if(error){console.warn('loadDeals error:',error);DEALS=[];return}
    DEALS=data||[]
  }catch(e){console.warn('loadDeals exception:',e);DEALS=[]}
}

// ══ CALC ══
window.calcI=()=>{
  const pr=parseFloat($('c-price')?.value)||0,dn=parseFloat($('c-down')?.value)||0,mo=parseInt($('c-mo')?.value)||0
  const v=$('cval'),b=$('cbrk');if(!v)return
  if(pr>0&&mo>0&&dn<pr){const r=pr-dn;v.textContent=fmtSAR(r/mo);if(b)b.textContent=`(${fmtSAR(r)} ÷ ${mo})`}
  else{v.textContent='—';if(b)b.textContent=''}
}

// ══ SUBMIT DEAL ══
window.submitDeal=async()=>{
  const se=$('c-sel')?.value.trim().toLowerCase(),it=$('c-item')?.value
  const de=$('c-desc')?.value.trim(),pr=parseFloat($('c-price')?.value)
  const dn=parseFloat($('c-down')?.value)||0,mo=parseInt($('c-mo')?.value)
  const no=$('c-notes')?.value.trim(),sd=$('c-date')?.value||today()
  if(!se||!it||!pr||!mo){toast(isAr()?'⚠️ يرجى ملء الحقول المطلوبة':'⚠️ Fill required fields','e');return}
  if(!valEmail(se)){toast(isAr()?'⚠️ البريد الإلكتروني للبائع غير صالح':'⚠️ Invalid seller email','e');return}
  if(mo<1||mo>60){toast(isAr()?'⚠️ الأشهر بين 1 و60':'⚠️ Months 1-60','e');return}
  if(!valSAR(pr)){toast(isAr()?'⚠️ السعر غير صالح':'⚠️ Invalid price','e');return}
  if(dn>=pr){toast(isAr()?'⚠️ الدفعة الأولى يجب أن تكون أقل من السعر':'⚠️ Down < total','e');return}
  if(se===CU.email){toast(isAr()?'⚠️ لا يمكنك إرسال طلب لنفسك':'⚠️ Cannot send to yourself','e');return}
  const btn=$('sbtn');btn.innerHTML='<span class="spinner"></span>';btn.disabled=true
  const inst=Math.round(((pr-dn)/mo)*100)/100
  const{data:deal,error}=await sb.from('deals').insert({
    contract_num:genCN(),buyer_id:CU.id,buyer_email:CU.email,
    buyer_name:san(PRF?.full_name||CU.email.split('@')[0]),
    seller_email:se,item:it,description:san(de),price:pr,down_payment:dn,
    months:mo,installment:inst,notes:san(no),start_date:sd,status:'pending'
  }).select().single()
  if(error){toast('⚠️ '+error.message,'e');btn.innerHTML='📤 '+(isAr()?'إرسال الطلب':'Send');btn.disabled=false;return}
  const sch=Array.from({length:mo},(_,i)=>({deal_id:deal.id,month_num:i+1,due_date:addM(sd,i+1),amount:inst,is_paid:false}))
  await sb.from('payments').insert(sch)
  ;['c-sel','c-desc','c-price','c-notes'].forEach(id=>{const el=$(id);if(el)el.value=''})
  $('c-item').value='';$('c-down').value='0';$('c-mo').value='';$('c-date').value=today();$('cval').textContent='—'
  toast(isAr()?'✅ تم إرسال الطلب بنجاح!':'✅ Request sent!','s')
  await loadDeals();nav('dash')
}

// ══ DEAL CARD ══
function empt(e,t){return`<div class="empty"><div class="eico">${e}</div><div class="etit">${t}</div></div>`}

function bCard(d){
  const iB=d.buyer_id===CU.id||d.buyer_email===CU.email
  const pay=d.payments||[],paid=pay.filter(p=>p.is_paid).length,tot=d.months||1,pct=Math.round((paid/tot)*100)
  const ot=iB?d.seller_email:d.buyer_name,rl=iB?(isAr()?'إلى:':'To:'):(isAr()?'من:':'From:')
  return`<div class="dcard" onclick="nav('detail',{id:'${d.id}'})" role="button" tabindex="0">
    <div class="dico">${ico(d.item)}</div>
    <div class="dbody">
      <div class="dtit">${san(d.item)}${d.description?' — '+san(d.description):''}</div>
      <div class="dmeta">${rl} <strong>${san(ot)}</strong> • ${fmtD(d.created_at)}</div>
      ${d.status==='active'?`<div class="plbl"><span>${paid}/${tot}</span><span>${pct}%</span></div><div class="ptrack"><div class="pfill" style="width:${pct}%"></div></div>`:''}
    </div>
    <div class="dright"><div class="dprice">${fmtSAR(d.price)}</div><div class="dpsub">${fmtSAR(d.installment)}/${isAr()?'شهر':'mo'}</div><div style="margin-top:6px">${sbdg(d.status)}</div></div>
  </div>`
}

// ══ RENDERS ══
function rDash(){
  const nm=PRF?.full_name||CU.email.split('@')[0]
  const dw=$('dwelcome');if(dw)dw.textContent=isAr()?`مرحباً، ${nm} 👋`:`Welcome, ${nm} 👋`
  const sa=$('sa');if(sa)sa.textContent=DEALS.filter(d=>d.status==='active').length
  const sd=$('sd');if(sd)sd.textContent=DEALS.filter(d=>d.status==='completed').length
  const sp=$('sp');if(sp)sp.textContent=DEALS.filter(d=>d.status==='pending').length
  const tv=DEALS.filter(d=>['active','completed'].includes(d.status)).reduce((s,d)=>s+d.price,0)
  const sv=$('sv');if(sv)sv.textContent=tv>=1000?(tv/1000).toFixed(1)+'K':tv
  const dl=$('dl');if(dl)dl.innerHTML=[...DEALS].slice(0,5).map(bCard).join('')||empt('📄',isAr()?'لا توجد صفقات بعد':'No deals yet')
}

      <div class="iitem"><div class="ilbl">${isAr()?'الدفعة الأولى':'Down'}</div><div class="ival">${fmtSAR(d.down_payment)}</div></div>

    <div class="cfoot flex jce gap10">

      <button class="btn bs bsm" onclick="respond('${d.id}','active')">✓ ${isAr()?'قبول':'Accept'}</button>

    </div>
  </div>`).join('')
}

window.filtD=f=>{
  filt=f;['all','active','pending','completed'].forEach(x=>{const id='t'+x.slice(0,2);document.getElementById(id)?.classList.toggle('active',x===f)});rDeals()
}

function rDeals(){
  let m=[...DEALS];if(filt!=='all')m=m.filter(d=>d.status===filt)
  const el=$('dealsl');if(el)el.innerHTML=m.length?m.map(bCard).join(''):empt('📋',isAr()?'لا توجد صفقات':'No deals')
}

          </div>
          <div class="cwft">${isAr()?'وثيقة صادرة من منصة قسطني للتوثيق الرقمي — لأغراض الاتفاق فقط':'Issued by Qastni digital platform — for agreement purposes only'}<br>${isAr()?'تاريخ الإصدار:':'Issued:'} ${fmtD(d.created_at)}</div>

      <div class="chdr"><h2>⭐ ${isAr()?'التقييمات المستلمة':'Reviews Received'}</h2><span class="badge b-teal">${rats.length}</span></div>

// ══ ACTIONS ══
window.respond=async(id,status)=>{
  const up={status}
  if(status==='active'){up.accepted_at=new Date().toISOString();up.seller_id=CU.id}
  else up.rejected_at=new Date().toISOString()
  const{error}=await sb.from('deals').update(up).eq('id',id)
  if(error){toast('⚠️ '+error.message,'e');return}
  await loadDeals()
  toast(status==='active'?(isAr()?'✅ تمت الموافقة على الصفقة':'✅ Deal accepted'):(isAr()?'❌ تم رفض الطلب':'❌ Request rejected'),status==='active'?'s':'e')
  updBadge();rInc()
}

window.markP=async(did,pid)=>{
  await sb.from('payments').update({is_paid:true,paid_at:new Date().toISOString()}).eq('id',pid)
  const{data:ap}=await sb.from('payments').select('is_paid').eq('deal_id',did)
  const done=ap?.every(p=>p.is_paid)
  if(done)await sb.from('deals').update({status:'completed',completed_at:new Date().toISOString()}).eq('id',did)
  await loadDeals()
  toast(done?(isAr()?'🎉 اكتملت الصفقة بالكامل!':'🎉 Deal fully completed!'):(isAr()?'💰 تم تسجيل الدفعة بنجاح':'💰 Payment recorded'),'s')
  rDetail(did)
}

window.printC=id=>{
  const el=document.getElementById('cw-'+id);if(!el)return
  const w=window.open('','_blank','width=800,height=700')
  w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Contract - قسطني</title><style>body{font-family:Tajawal,sans-serif;direction:${isAr()?'rtl':'ltr'};padding:20px;color:#0f172a;background:#fff}</style></head><body>${el.outerHTML}</body></html>`)
  w.document.close();w.focus();setTimeout(()=>w.print(),600)
}

window.openRM=(did,email)=>{RS={dealId:did,email,stars:0};document.querySelectorAll('.srate').forEach(s=>s.classList.remove('active'));$('rcomment').value='';$('rmodal').classList.remove('hidden')}
window.closeRM=()=>$('rmodal').classList.add('hidden')
window.setSR=val=>{RS.stars=val;document.querySelectorAll('.srate').forEach(s=>s.classList.toggle('active',parseInt(s.dataset.v)<=val))}
window.submitR=async()=>{
  if(!RS.stars){toast(isAr()?'⚠️ اختر عدد النجوم':'⚠️ Select stars','e');return}
  const{error}=await sb.from('ratings').insert({deal_id:RS.dealId,from_user_id:CU.id,from_email:CU.email,from_name:san(PRF?.full_name||CU.email.split('@')[0]),to_email:RS.email,stars:RS.stars,comment:san($('rcomment').value.trim())||null})
  if(error){toast('⚠️ '+error.message,'e');return}
  closeRM();toast(isAr()?'⭐ شكراً! تم إرسال تقييمك':'⭐ Rating submitted!','s')
  rDetail(RS.dealId);loadSBStars()
}

// ══ BOOT — main session initializer ══
async function initSession(session){
  try{
    CU=session.user
    // Use maybeSingle so missing profile row doesn't throw
    const{data:p,error:pe}=await sb.from('profiles').select('*').eq('id',CU.id).maybeSingle()
    if(pe)console.warn('Profile fetch warning:',pe)
    PRF=p||{full_name:CU.user_metadata?.full_name||'',phone:CU.user_metadata?.phone||'',national_id:CU.user_metadata?.national_id||''}
    await loadDeals()
    buildShell()
    await nav('dash')
    // Setup realtime channel (non-blocking)
    try{
      _rtChannel=sb.channel('qrt_'+CU.id).on('postgres_changes',{event:'*',schema:'public',table:'deals'},async()=>{
        await loadDeals();updBadge()
        if(page==='incoming')rInc()
        if(page==='dash')rDash()
        if(page==='deals')rDeals()
      }).subscribe()
    }catch(e){console.warn('Realtime setup failed (non-critical):',e)}
  }catch(e){
    console.error('Session init failed:',e)
    // Fall back to auth screen on critical failure
    _started=false
    CU=null;PRF=null;DEALS=[]
    $('app').innerHTML=getAuthHTML()
    applyLang()
    toast(isAr()?'⚠️ حدث خطأ في تحميل البيانات':'⚠️ Error loading data','e')
  }finally{
    hideSplash()
  }
}

// ══ AUTH STATE LISTENER ══
sb.auth.onAuthStateChange(async(event,session)=>{
  console.log('[auth]',event,!!session)
  if(event==='SIGNED_OUT'){
    _started=false
    CU=null;PRF=null;DEALS=[]
    if(_rtChannel){try{sb.removeChannel(_rtChannel)}catch(e){}_rtChannel=null}
    $('app').innerHTML=getAuthHTML()
    applyLang()
    hideSplash()
    return
  }
  // Only init once per session — ignore TOKEN_REFRESHED after we're started
  if(!_started&&(event==='SIGNED_IN'||event==='INITIAL_SESSION')){
    if(session){
      _started=true
      await initSession(session)
    }else{
      // No session on initial load — show auth
      $('app').innerHTML=getAuthHTML()
      applyLang()
      hideSplash()
    }
  }
})

// ══ SAFETY NET: force-hide splash if nothing happens within 6s ══
setTimeout(async()=>{
  if(_splashHidden)return
  console.warn('[boot] Safety timeout reached — forcing init')
  try{
    const{data:{session}}=await sb.auth.getSession()
    if(session&&!_started){
      _started=true
      await initSession(session)
    }else if(!_started){
      _started=true
      $('app').innerHTML=getAuthHTML()
      applyLang()
      hideSplash()
    }
  }catch(e){
    console.error('[boot] Safety net failed:',e)
    _started=true
    $('app').innerHTML=getAuthHTML()
    applyLang()
    hideSplash()
  }
},6000)
</script>
